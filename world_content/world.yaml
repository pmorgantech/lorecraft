# ---------------------------------------------------------------------------
# Transit lines — scheduled vehicles reached by `board` (not the walk graph)
# ---------------------------------------------------------------------------

transit:
  lines:
    # Harbor Ferry — runs the harbor mouth between the docks and the breakwater.
    # Weather-sensitive: grounded when the global weather turns dangerous, since
    # its deck (harbor_ferry_deck) is open to the sky (indoor: false).
    - id: harbor_ferry
      name: Harbor Ferry
      mode: ferry
      service_type: local
      vehicle_room_id: harbor_ferry_deck
      ticket_item_id: harbor_ferry_token
      weather_sensitive: true
      blocking_weather: [thunderstorm, heavy_rain, blizzard]
      stops:
        - { room_id: docks_main, sequence: 0, dwell_ticks: 5, travel_ticks: 20 }
        - { room_id: breakwater, sequence: 1, dwell_ticks: 5, travel_ticks: 0 }
