# Ashmoore — Sample World for Lorecraft Testing
#
# A small market town on the edge of a darkening wood. North of the village
# sits a forge and apothecary; south lies the old forest road that winds
# toward ruins, a rushing creek, and — deeper still — the caves beneath
# the hill where something old and cold has taken up residence.
#
# Layout (Y increases northward, X increases eastward):
#
#        alch(5,9)
#    forge(4,9)  market(5,8)
#          square(4,8)---inn(3,8)
#               |              |
#           s_gate(4,7)    cellar(3,7)
#               |
#         forest_path(4,6)---meadow(5,6)---chapel(6,5)
#         /                       |
#   mill(3,6)               creek(5,5)
#               |
#         deep_forest(4,5)
#               |
#         cave_entrance(4,4)
#               |
#         cave_tunnel(4,3)
#               |
#         cave_chamber(4,2)
#        /              \
#  alcove(3,2)       pool(5,2)

rooms:
  # -------------------------------------------------------------------------
  # AREA: town — The Village of Ashmoore
  # -------------------------------------------------------------------------

  - id: village_square
    name: The Village Square of Ashmoore
    description: >-
      Cobblestones worn smooth by a hundred years of market-day boots radiate
      outward from a mossy stone well at the centre. A weathervane shaped like
      a rearing stallion creaks overhead. The smell of fresh bread drifts from
      somewhere eastward. To the north the clash of iron rings from a forge; to
      the west a painted sign swings above the inn. The road south leads out
      through the old gate.
    map_x: 4
    map_y: 8
    area_id: town
    light_level: 1
    exits:
      - direction: north
        target_room_id: blacksmith_forge
      - direction: east
        target_room_id: market_stalls
      - direction: west
        target_room_id: wandering_crow_inn
      - direction: south
        target_room_id: south_gate

  - id: wandering_crow_inn
    name: The Wandering Crow Inn
    indoor: true
    description: >-
      Low timbers, candle-grease on every surface, and the permanent perfume of
      spilled ale. A stuffed crow mounted above the hearth regards you with
      glass eyes. The landlord — a wide man with a red nose and a wary
      expression — polishes the same tankard he has been polishing for the past
      ten years. A narrow stair descends to the cellar; the square lies back
      through the door to the east.
    map_x: 3
    map_y: 8
    area_id: town
    light_level: 1
    safe_rest: true
    exits:
      - direction: east
        target_room_id: village_square
      - direction: down
        target_room_id: inn_cellar

  - id: inn_cellar
    name: The Inn Cellar
    indoor: true
    description: >-
      Brick-arched and cool, smelling of damp earth and old barrels. Rows of
      casks line the walls, each daubed with a chalk mark. A single tallow
      stub gutters in an iron bracket, throwing long shadows. Rats have been
      here recently — you can tell by the gnawed corners of a sack of meal.
      The stair back up to the inn groans with every draft.
    map_x: 3
    map_y: 7
    area_id: town
    light_level: 1
    exits:
      - direction: up
        target_room_id: wandering_crow_inn

  - id: blacksmith_forge
    name: Forge and Hammer
    indoor: true
    description: >-
      The forge exhales a wave of heat before you even cross the threshold. A
      barrel of black water hisses where hot metal cools. Tools hang on pegs
      with a craftsman's precision: hammers graded from tack to sledge, tongs
      of every gauge, punches, drifts, and files. The anvil in the centre is
      pocked and stained with a lifetime of use. A hand-lettered sign reads
      ORDERS TAKEN, NO CREDIT. A narrow doorway north leads to the locksmith's
      gallery.
    map_x: 4
    map_y: 9
    area_id: town
    light_level: 1
    exits:
      - direction: south
        target_room_id: village_square
      - direction: east
        target_room_id: alchemist_shop
      - direction: north
        target_room_id: key_gallery

  - id: key_gallery
    name: Locksmith's Gallery
    indoor: true
    description: >-
      Pegboards and shallow trays display a confusing spread of keys, locks,
      blades, and curios — many names differ by only a word or two. The
      blacksmith's forge lies back to the south, and a low stone passage opens
      east into the vault hall.
    map_x: 4
    map_y: 10
    area_id: town
    light_level: 1
    exits:
      - direction: south
        target_room_id: blacksmith_forge
      - direction: east
        target_room_id: vault_hall

  - id: vault_hall
    name: The Vault Hall
    indoor: true
    description: >-
      A narrow stone antechamber. A heavy iron door fills the east wall, its
      lock stout and cold — it needs the right key. Two keys have been left on
      a shelf here: one plainly cut to fit, one clearly the wrong shape.
    map_x: 5
    map_y: 10
    area_id: town
    light_level: 1
    exits:
      - direction: west
        target_room_id: key_gallery
      - direction: east
        target_room_id: inner_vault
        locked: true
        key_item_id: good_key

  - id: inner_vault
    name: The Inner Vault
    indoor: true
    description: >-
      Beyond the iron door, the vault is a bare, quiet room of close-fitted
      stone. Whatever it once guarded is long gone. The only way out is back
      west through the door.
    map_x: 6
    map_y: 10
    area_id: town
    light_level: 1
    exits:
      - direction: west
        target_room_id: vault_hall

  - id: market_stalls
    name: The Market Stalls
    description: >-
      Canvas canopies in faded reds and yellows shelter half a dozen cramped
      stalls. A fishmonger haggles with a farmer over a basket of eels. Bolts
      of undyed wool lean against a cart. A child sells paper flowers nobody
      wants. The air is thick with the mingled scents of dried fish, tallow,
      and horse. North, through a gap between the stalls, you can make out the
      glass-stoppered bottles of the apothecary.
    map_x: 5
    map_y: 8
    area_id: town
    light_level: 1
    exits:
      - direction: west
        target_room_id: village_square
      - direction: north
        target_room_id: alchemist_shop

  - id: alchemist_shop
    name: "Mira's Curious Remedies"
    indoor: true
    description: >-
      The shelves climb floor to ceiling and every inch is occupied: glass
      bottles of amber, violet, and cloudy white; bundles of dried fungi
      hung from the beams; a brass scale tilted permanently to one side as
      though the world itself is slightly off-balance. A woman with ink-stained
      fingers sits at a workbench grinding something that smells of copper and
      pine. She does not look up when you enter, but she knows you are here.
    map_x: 5
    map_y: 9
    area_id: town
    light_level: 1
    exits:
      - direction: south
        target_room_id: market_stalls
      - direction: west
        target_room_id: blacksmith_forge

  - id: south_gate
    name: South Gate
    description: >-
      Two timber posts, reinforced with iron straps, mark where the town wall
      once stood. The wall itself is long gone, cannibalised for foundations
      and fence posts over the centuries, but the gate posts remain — a civic
      memory of when Ashmoore feared its neighbours. A pitted milestone reads
      ASHMOORE 0 LEAGUES in worn letters. Beyond it the road narrows to a
      rutted track and plunges south into the treeline.
    map_x: 4
    map_y: 7
    area_id: town
    light_level: 1
    exits:
      - direction: north
        target_room_id: village_square
      - direction: south
        target_room_id: forest_path

  # -------------------------------------------------------------------------
  # AREA: wilderness — The Forest and Its Margins
  # -------------------------------------------------------------------------

  - id: forest_path
    name: The Forest Road
    description: >-
      The road quickly loses confidence once it leaves the gate. Ruts fill with
      standing water; the verges are choked with bracken. Old beeches arch
      overhead and close out most of the sky. A faded set of cartwheel tracks
      leads west toward the mill. The path to the east opens briefly onto
      meadow before the forest swallows it again. Directly south the trees grow
      close and the light turns greenish and unreliable.
    map_x: 4
    map_y: 6
    area_id: wilderness
    light_level: 1
    exits:
      - direction: north
        target_room_id: south_gate
      - direction: east
        target_room_id: meadow_clearing
      - direction: west
        target_room_id: old_mill
      - direction: south
        target_room_id: deep_forest

  - id: meadow_clearing
    name: The Sunlit Meadow
    description: >-
      A gap in the canopy lets in a column of afternoon light that falls on
      a sweep of tall grass and wildflowers — cowslip, campion, and something
      purple you cannot name. A buzzard turns slow circles overhead. The
      meadow feels exposed and peaceful in a way the rest of the forest does
      not. To the south the ground drops toward the sound of rushing water
      and the outline of stone ruins visible through the trees beyond the
      creek. West returns you to the forest road.
    map_x: 5
    map_y: 6
    area_id: wilderness
    light_level: 1
    exits:
      - direction: west
        target_room_id: forest_path
      - direction: south
        target_room_id: creek_crossing

  - id: old_mill
    name: The Abandoned Mill
    description: >-
      The waterwheel is staved in, its paddles rotted to stubs. The millstone
      inside is cracked clean through the eye; it sits cockeyed on its spindle
      like a broken promise. Pigeon droppings whiten the floor and rafters. A
      smell of mould and old grain clings to the timber. Whatever fortune this
      mill once ground out has been ground out entirely. The forest road lies
      back to the east.
    map_x: 3
    map_y: 6
    area_id: wilderness
    light_level: 1
    exits:
      - direction: east
        target_room_id: forest_path

  - id: creek_crossing
    name: The Mossy Creek Crossing
    description: >-
      Flat stones, slick with moss, step across a fast brown creek that smells
      of peat and cold springs. The water is only knee-deep but it moves with
      surprising purpose. A rope, perhaps once a handrail, sags between two
      alder trees. On the far eastern bank the ground rises toward the outline
      of a stone ruin half-smothered in ivy. North lies the open meadow; the
      forest continues south. Downstream, a line of flat stones runs out to a
      small islet — passable only when the water is low.
    map_x: 5
    map_y: 5
    area_id: wilderness
    light_level: 1
    exits:
      - direction: north
        target_room_id: meadow_clearing
      - direction: east
        target_room_id: ruined_chapel
      # Tide-gated causeway (Sprint 54): opened/locked by the tide via
      # world_content/celestial.yaml — starts locked (world wakes at high water).
      - direction: south
        target_room_id: tidal_islet
        locked: true

  - id: tidal_islet
    name: The Tidal Islet
    description: >-
      A hump of grass and gullweed barely above the waterline, ringed by
      stones the creek has worn round. Debris collects here — driftwood,
      knotted line, the occasional bottle — as if the water tithes a little
      of everything it carries. When the water rises, the stepping stones
      back north drown one by one; wading the cold channel is always
      possible, if unpleasant.
    map_x: 5
    map_y: 4
    area_id: wilderness
    light_level: 1
    exits:
      # Wading back is always possible — the gate is one-way by design so the
      # rising tide never strands a player here.
      - direction: north
        target_room_id: creek_crossing

  - id: ruined_chapel
    name: The Ruined Chapel
    description: >-
      Roofless and reclaimed. Ivy has mortared the gaps where the original
      mortar failed; young birch trees grow through the nave floor. The altar
      stone is still upright, its carved relief of a wheel-within-a-wheel
      worn smooth but legible. Carved letters around the base are too eroded
      to read in full — something about remembrance and fire. A leather satchel
      lies open on the altar, its contents scattered. The creek and the meadow
      are west through the ruined doorway.
    map_x: 6
    map_y: 5
    area_id: wilderness
    light_level: 1
    exits:
      - direction: west
        target_room_id: creek_crossing

  - id: deep_forest
    name: The Deep Forest
    description: >-
      The beeches give way to older things here — oaks with trunks you could
      not encircle with both arms, their bark black with moisture. The undergrowth
      thickens. Sound dampens. Your own footsteps sound wrong, too loud or too
      quiet depending on where you step. Something luminescent pulses at the
      base of a deadfall to one side — probably just foxfire on rotting wood.
      Probably. The forest road is back north; south, the trees thin around a
      rocky hillside with a dark opening in it.
    map_x: 4
    map_y: 5
    area_id: wilderness
    light_level: 1
    exits:
      - direction: north
        target_room_id: forest_path
      - direction: south
        target_room_id: cave_entrance

  # -------------------------------------------------------------------------
  # AREA: cave — The Hill Caves
  # -------------------------------------------------------------------------

  - id: cave_entrance
    name: The Cave Mouth
    description: >-
      A crack in the hillside, widened over centuries by water and perhaps other
      things, yawns before you. The air that breathes out of it is cool and
      smells of wet limestone and something faintly mineral. Scratched into the
      rock beside the entrance, barely legible, is a word in an old dialect of
      the valley tongue — scholars have argued whether it means WARNING or
      WELCOME. A dented lantern hangs from a piton driven into the rock face.
      The forest lies back to the north; the darkness descends below.
    map_x: 4
    map_y: 4
    area_id: cave
    light_level: 1
    exits:
      - direction: north
        target_room_id: deep_forest
      - direction: down
        target_room_id: cave_tunnel

  - id: cave_tunnel
    name: The Winding Tunnel
    indoor: true
    description: >-
      The ceiling drops to shoulder height and you are obliged to watch your
      footing on the slick limestone. The tunnel is not entirely dark — a faint
      phosphorescence clings to certain patches of the wall, a pale grey-green
      that illuminates nothing but itself. Water has carved the passage smooth
      and left small formations in the corners like frozen drips. Somewhere
      below there is a sound: not quite dripping, not quite breathing. The cave
      mouth is back up behind you; the tunnel descends further south.
    map_x: 4
    map_y: 3
    area_id: cave
    light_level: 1
    exits:
      - direction: up
        target_room_id: cave_entrance
      - direction: south
        target_room_id: cave_chamber

  - id: cave_chamber
    name: The Stone Chamber
    indoor: true
    description: >-
      The tunnel opens into a natural chamber perhaps thirty feet across.
      Stalactites fringe the ceiling like stone teeth. A cold draught comes
      from somewhere to the east, carrying the faint smell of water. To the
      west a crack in the wall opens into a low-ceilinged alcove barely large
      enough to stand in. The floor of the chamber is worn smooth in the
      centre — walked, long ago, by many feet. Whatever gathered here is gone
      now. The tunnel leads back north.
    map_x: 4
    map_y: 2
    area_id: cave
    light_level: 0
    disabled_commands: []
    exits:
      - direction: north
        target_room_id: cave_tunnel
      - direction: east
        target_room_id: cave_pool
      - direction: west
        target_room_id: cave_alcove

  - id: cave_pool
    name: The Underground Pool
    indoor: true
    description: >-
      The chamber floor gives way without warning to a pool of still, perfectly
      clear water. The bottom, visible twelve feet down, is white sand and
      smooth pebbles. Something in the water glows with a cold blue light —
      not bioluminescence, not phosphorescence, something else entirely. The
      far bank is only a few yards away and the water looks fordable at the
      edges. There are no fish. There are no sounds. The chamber lies back
      to the west.
    map_x: 5
    map_y: 2
    area_id: cave
    light_level: 0
    exits:
      - direction: west
        target_room_id: cave_chamber

  - id: cave_alcove
    name: The Hidden Alcove
    indoor: true
    description: >-
      You squeeze through the crack and find yourself in a low space, the
      ceiling so close it presses on your thoughts. Someone has been here
      deliberately — a hollow scraped in the far wall holds objects laid with
      care: a folded cloth, a few coins, a pouch. Whether this was a shrine or
      a hiding place is unclear. The scratch-marks on the walls may be writing
      or may be counting. The chamber is back through the crack to the east.
    map_x: 3
    map_y: 2
    area_id: cave
    light_level: 0
    exits:
      - direction: east
        target_room_id: cave_chamber

  # -------------------------------------------------------------------------
  # AREA: cogsworth — Steampunk City (Phase 1 Foundation)
  # -------------------------------------------------------------------------

  # --- Level 2: Clock Tower Peak ---
  - id: clock_tower_peak
    name: Clock Tower Peak
    description: >-
      The spire climbs impossibly high, piercing the clouds. At its apex, the great
      clock mechanism ticks in perfect rhythm, visible through glass panels. Steam vents
      hiss from pressure regulators. Below you sprawls Cogsworth in miniature—brass rooftops,
      copper spires, smoke from a hundred chimneys. A vast city built upward and inward.
    map_x: 15
    map_y: 20
    map_z: 2
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: south
        target_room_id: clockworks_chamber
      - direction: down
        target_room_id: tower_landing_2

  - id: clockworks_chamber
    name: The Clockworks Chamber
    indoor: true
    description: >-
      Immense brass and iron gears dominate this circular chamber, each the size of a wagon wheel.
      The rhythmic ticking is deafening—a heartbeat that measures out the city's hours. Oil drips
      from bearing points. The smell of machine oil and hot metal fills your lungs. At the chamber's
      apex, the escapement clicks with metronomic precision.
    map_x: 15
    map_y: 21
    map_z: 2
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: north
        target_room_id: clock_tower_peak
      - direction: down
        target_room_id: tower_landing_2

  - id: tower_landing_2
    name: Tower Observation Deck
    indoor: true
    description: >-
      Polished brass railings line a circular platform beneath a domed glass ceiling.
      A fixed telescope points toward the distant horizon. The view is breathtaking—
      you can see three valleys from here. Safe seating areas invite quiet observation.
      Stairs descend further into the tower's depths.
    map_x: 15
    map_y: 20
    map_z: 2
    area_id: cogsworth
    light_level: 1
    safe_rest: true
    exits:
      - direction: up
        target_room_id: clock_tower_peak
      - direction: down
        target_room_id: tower_landing_1

  - id: tower_landing_1
    name: Tower Landing
    indoor: true
    description: >-
      A transition point where the tower widens into an observation gallery. Stairs
      descend further, and archways open to the academy courtyard. Below, the market
      sprawls like a chessboard of commerce and life.
    map_x: 15
    map_y: 20
    map_z: 1
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: up
        target_room_id: tower_landing_2
      - direction: down
        target_room_id: grand_plaza
      - direction: west
        target_room_id: academy_courtyard

  # --- Level 1: Academy & Residences ---
  - id: academy_courtyard
    name: Academy Courtyard
    description: >-
      A sprawling quadrangle of stone, surrounded by ivy-covered buildings. Lecture posters
      flap from notice boards. Students huddle in corners, debating invisible theories.
      Fountains fed by steam-pressure lines spray water in precise arcs. The air smells
      of brass polish and learning.
    map_x: 14
    map_y: 20
    map_z: 1
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: east
        target_room_id: library_main
      - direction: north
        target_room_id: alchemy_lab
      - direction: south
        target_room_id: artifice_workshop
      - direction: down
        target_room_id: grand_plaza
      - direction: west
        target_room_id: dormitory

  - id: library_main
    name: Academy Library
    indoor: true
    description: >-
      Soaring shelves climb toward a vaulted ceiling. Thousands of volumes—leather-bound,
      cloth-covered, ancient scrolls in brass cases—fill every space. A spiral staircase
      leads up to the second level. The smell is paper, leather, and old knowledge.
    map_x: 15
    map_y: 20
    map_z: 1
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: west
        target_room_id: academy_courtyard
      - direction: south
        target_room_id: alchemy_lab

  - id: alchemy_lab
    name: Alchemy Laboratory
    indoor: true
    description: >-
      Glass vessels bubble with colorful liquids. Alembics and retorts crowd every
      workbench. The air is thick with exotic scents—sulfur, copper, something floral
      and rare. Careful notes line the walls in copper-plate handwriting. A professor
      in singed robes tends a furnace.
    map_x: 14
    map_y: 21
    map_z: 1
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: north
        target_room_id: library_main
      - direction: west
        target_room_id: academy_courtyard
      - direction: south
        target_room_id: artifice_workshop

  - id: artifice_workshop
    name: Artifice Workshop
    indoor: true
    description: >-
      Half-built constructs stand in various states of assembly—articulated limbs,
      glass eyes, clockwork hearts. Copper wire, gears, and components clutter the benches.
      A peculiar humming emanates from a powered lathe in the corner. The workshop is
      organized chaos.
    map_x: 14
    map_y: 19
    map_z: 1
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: north
        target_room_id: alchemy_lab
      - direction: east
        target_room_id: academy_courtyard

  - id: dormitory
    name: Academy Dormitory
    indoor: true
    description: >-
      Student quarters arranged along narrow corridors. Each room holds a narrow bed,
      desk, and shelf for personal effects. A common room at the center offers a place
      to gather. The dormitory is clean, quiet, and secure.
    map_x: 13
    map_y: 20
    map_z: 1
    area_id: cogsworth
    light_level: 1
    safe_rest: true
    exits:
      - direction: east
        target_room_id: academy_courtyard

  - id: clockwork_manor
    name: Clockwork Manor
    indoor: true
    description: >-
      A wealthy merchant's townhouse, its facade ornate with brass fittings and
      mechanical details. Inside, the halls are lined with expensive furnishings.
      A heavy iron door marks the main entrance; a smaller passage connects to
      the street outside.
    map_x: 16
    map_y: 21
    map_z: 1
    area_id: cogsworth
    light_level: 1
    safe_rest: true
    exits:
      - direction: south
        target_room_id: scholar_apartments
      - direction: down
        target_room_id: market_row_west

  - id: scholar_apartments
    name: Scholar Apartments
    indoor: true
    description: >-
      Modest but comfortable apartments for faculty and advanced students. The halls are lined
      with doors, each leading to private quarters. Common areas include a study and reading room.
    map_x: 16
    map_y: 20
    map_z: 1
    area_id: cogsworth
    light_level: 1
    safe_rest: true
    exits:
      - direction: north
        target_room_id: clockwork_manor
      - direction: south
        target_room_id: academy_courtyard
      - direction: down
        target_room_id: market_row_west

  # --- Level 0: Market District ---
  - id: grand_plaza
    name: Grand Plaza
    description: >-
      The heart of Cogsworth—a sprawling square of polished stone radiating from a central
      fountain. Steam rises from geothermal vents. The city's iconic clock tower looms overhead,
      its mechanisms visible in the tower glass. Crowds bustle between market stalls, shops, and
      food vendors. The smell of commerce and industry fills the air.
    map_x: 15
    map_y: 20
    map_z: 0
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: up
        target_room_id: tower_landing_1
      - direction: north
        target_room_id: academy_courtyard
      - direction: east
        target_room_id: market_row_east
      - direction: west
        target_room_id: market_row_west
      - direction: south
        target_room_id: smithy_district
      - direction: down
        target_room_id: sewer_junction_main

  - id: market_row_east
    name: Market Row East
    description: >-
      A row of market stalls sheltered by canvas canopies in faded colors. Vendors hawk
      produce, spices, and exotic goods. The air is thick with the mingled scents of fresh
      food, spices, and coal smoke.
    map_x: 16
    map_y: 20
    map_z: 0
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: west
        target_room_id: grand_plaza
      - direction: east
        target_room_id: curiosity_shop
      - direction: south
        target_room_id: smithy_district

  - id: market_row_west
    name: Market Row West
    description: >-
      Artisan stalls line this side of the plaza—weavers, jewelers, and crafts merchants display
      their wares. The quality of goods here is noticeably higher than the eastern row.
    map_x: 14
    map_y: 20
    map_z: 0
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: east
        target_room_id: grand_plaza
      - direction: west
        target_room_id: warehouse_storage
      - direction: south
        target_room_id: smithy_district
      - direction: up
        target_room_id: scholar_apartments

  - id: smithy_district
    name: Smithy District
    description: >-
      Multiple forges operate simultaneously, their chimneys belching black smoke. The
      ring of hammers on anvils creates a rhythm that throbs through the street. The
      heat from the furnaces radiates outward. Vendors and smiths crowd the street,
      buying and selling metal goods.
    map_x: 15
    map_y: 19
    map_z: 0
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: north
        target_room_id: market_row_east
      - direction: west
        target_room_id: market_row_west
      - direction: up
        target_room_id: grand_plaza
      - direction: east
        target_room_id: curiosity_shop

  - id: curiosity_shop
    name: Curiosity Emporium
    indoor: true
    description: >-
      A cramped shop crammed with impossible things—automatons, strange mechanical devices,
      rare books, and artifacts of unclear provenance. The owner, a thin figure with knowing
      eyes, sits at a cluttered desk. Everything here has a story. Most of them are true.
    map_x: 16
    map_y: 19
    map_z: 0
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: west
        target_room_id: smithy_district
      - direction: south
        target_room_id: clockwork_tavern

  - id: clockwork_tavern
    name: The Brass Anchor Tavern
    indoor: true
    description: >-
      A merchant's tavern thick with cigar smoke and conversation. The bar is polished
      brass, the floor is sawdust and spilled ale. The clientele includes traders, artisans,
      and city officials. Food and drink are hearty and reliable.
    map_x: 16
    map_y: 18
    map_z: 0
    area_id: cogsworth
    light_level: 1
    safe_rest: true
    exits:
      - direction: north
        target_room_id: curiosity_shop
      - direction: down
        target_room_id: steam_foundry_antechamber

  - id: warehouse_storage
    name: Warehouse District
    indoor: true
    description: >-
      A cavernous storage facility filled with crates, barrels, and bundles wrapped in
      cloth. The smell of stored goods—wood, rope, canvas—fills the space. Cargo is
      sorted and organized with mechanical precision.
    map_x: 13
    map_y: 20
    map_z: 0
    area_id: cogsworth
    light_level: 1
    exits:
      - direction: east
        target_room_id: market_row_west
      - direction: north
        target_room_id: scholar_apartments

  # --- Level -1: Undercity Sewers ---
  - id: sewer_junction_main
    name: Sewer Junction
    description: >-
      A massive circular chamber where four sewers converge. Grates overhead let in dim
      light and the sound of the city above. Steam vents hiss from maintenance pipes.
      Echoing water drips from stalactites of mineral deposits. The air is damp and smells
      of industry and necessity. Wrought-iron railings run along dangerous edges.
    map_x: 15
    map_y: 20
    map_z: -1
    area_id: cogsworth
    light_level: 0
    exits:
      - direction: up
        target_room_id: grand_plaza
      - direction: north
        target_room_id: sewer_tunnel_north
      - direction: east
        target_room_id: sewer_tunnel_east
      - direction: west
        target_room_id: sewer_tunnel_west
      - direction: south
        target_room_id: sewer_tunnel_south

  - id: sewer_tunnel_north
    name: Northern Sewer Tunnel
    description: >-
      A long passage of stone and flowing water. The tunnel slopes gently downward,
      following the ancient logic of drainage. Maintenance alcoves line the walls.
      In places, the tunnel floor is slick with slime and minerals.
    map_x: 15
    map_y: 21
    map_z: -1
    area_id: cogsworth
    light_level: 0
    exits:
      - direction: south
        target_room_id: sewer_junction_main
      - direction: east
        target_room_id: sewer_tunnel_east

  - id: sewer_tunnel_east
    name: Eastern Sewer Tunnel
    description: >-
      This tunnel connects the junction to the industrial district above. The smell
      here is of coal and industry—waste products from the forges and mills. The water
      runs black in places.
    map_x: 16
    map_y: 20
    map_z: -1
    area_id: cogsworth
    light_level: 0
    exits:
      - direction: west
        target_room_id: sewer_junction_main
      - direction: north
        target_room_id: sewer_tunnel_north
      - direction: south
        target_room_id: sewer_tunnel_south

  - id: sewer_tunnel_west
    name: Western Sewer Tunnel
    description: >-
      A narrower passage connecting to the western residential district. Maintenance
      workers occasionally pass through here. The walls are marked with worn chalk—
      measurements and dates indicating regular inspections.
    map_x: 14
    map_y: 20
    map_z: -1
    area_id: cogsworth
    light_level: 0
    exits:
      - direction: east
        target_room_id: sewer_junction_main
      - direction: south
        target_room_id: sewer_tunnel_south

  - id: sewer_tunnel_south
    name: Southern Sewer Tunnel
    description: >-
      A major feeder line flowing with runoff from the smithy district above. The
      sound of rushing water echoes in this tunnel. Steam rises from hot-water lines.
    map_x: 15
    map_y: 19
    map_z: -1
    area_id: cogsworth
    light_level: 0
    exits:
      - direction: north
        target_room_id: sewer_junction_main
      - direction: west
        target_room_id: sewer_tunnel_west
      - direction: east
        target_room_id: sewer_tunnel_east

  - id: steam_foundry_antechamber
    name: Steam Foundry Antechamber
    indoor: true
    description: >-
      Heavy iron doors mark the entrance to the deep foundry below. The air here is
      already hot and shimmers with heat distortion. A sign warns of extreme temperatures.
      Workers in protective gear move carefully through this space.
    map_x: 16
    map_y: 18
    map_z: -1
    area_id: cogsworth
    light_level: 0
    exits:
      - direction: up
        target_room_id: clockwork_tavern

  # -------------------------------------------------------------------------
  # AREA: whisperwood — Ancient Forest (Phase 1 Foundation)
  #
  # Note on light_level: the engine's RoomData.light_level field is an int
  # (0 = dark / needs a light source, 1 = lit) — see src/lorecraft/world/
  # validator.py. The roadmap's fractional 0.5/0.7 "dappled" figures are
  # descriptive flavor only; every room below uses the nearest valid int
  # (1 = lit for dappled/canopy/crystal-lit rooms, 0 = dark for the
  # unlit deep cave rooms).
  # -------------------------------------------------------------------------

  # --- Forest Floor (map_z: 0) ---
  - id: whispering_clearing
    name: Whispering Clearing
    description: >-
      A perfectly round clearing at the heart of the wood, floored in soft moss and
      ringed by trees so old their bark has gone silver-grey. At its center leans a
      weathered standing stone, taller than a person, carved with spirals worn nearly
      smooth by centuries of rain. The forest here seems to hold its breath — even the
      wind moves quietly, as if not to interrupt. Trails lead away in all four directions,
      and a rope ladder climbs into the canopy far overhead.
    map_x: 30
    map_y: 30
    map_z: 0
    area_id: whisperwood
    light_level: 1
    safe_rest: true
    exits:
      - direction: north
        target_room_id: north_trail
      - direction: south
        target_room_id: south_trail
      - direction: east
        target_room_id: east_trail
      - direction: west
        target_room_id: west_trail
      - direction: up
        target_room_id: elder_tree_hub

  - id: north_trail
    name: North Trail
    description: >-
      The trail narrows as it climbs, and the canopy thickens overhead until the
      daylight arrives only in scattered coins on the forest floor. The birdsong here
      is thinner than at the clearing, and the undergrowth crowds close on either side.
      Something about the quiet makes you want to walk a little faster.
    map_x: 30
    map_y: 31
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: whispering_clearing
      - direction: north
        target_room_id: old_oak_grove

  - id: old_oak_grove
    name: Old Oak Grove
    description: >-
      Massive oaks stand in a loose ring here, their trunks wider than a wagon and
      gnarled into shapes that almost — almost — look deliberate. Roots heave up
      through the soil like the knuckles of something buried. The grey light filtering
      down through the ancient canopy has a cold, submerged quality, and the grove
      carries the unmistakable sense of being watched by something patient.
    map_x: 30
    map_y: 32
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: north_trail
      - direction: north
        target_room_id: shadow_thicket
      - direction: east
        target_room_id: twisted_hollow

  - id: twisted_hollow
    name: Twisted Hollow
    description: >-
      A short spur off the grove ends in a hollow where the roots of a dead oak have
      grown into knots and loops that defy any natural explanation. The air is
      unnaturally still, and no birds sing here. Whatever curiosity draws travelers off
      the main trail rarely lingers long once they arrive.
    map_x: 31
    map_y: 32
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: west
        target_room_id: old_oak_grove

  - id: shadow_thicket
    name: Shadow Thicket
    description: >-
      The trail all but vanishes into a wall of thorned brush and black-barked trees
      that seem to lean inward, blotting out what little light survives this far
      north. Every snapped twig sounds too loud. A narrow gap in the brush drops away
      into darkness — the mouth of a cave sinking beneath the thicket's roots. Few
      travelers report going further than this and fewer still recommend it.
    map_x: 30
    map_y: 33
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: old_oak_grove
      - direction: down
        target_room_id: cave_entrance

  - id: south_trail
    name: South Trail
    description: >-
      The trail opens gently as it heads south, the trees thinning and the light
      growing warmer with every step. Wildlife sounds change from the wary rustle of
      the deep wood to the busier hum of open country — insects, distant birdsong,
      the smell of sun-warmed grass just ahead.
    map_x: 30
    map_y: 29
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: north
        target_room_id: whispering_clearing
      - direction: south
        target_room_id: meadow_clearing

  - id: meadow_clearing
    name: Meadow Clearing
    description: >-
      A wide, sun-drenched meadow opens where the forest breaks apart. Tall grass
      ripples in the breeze, dotted with clover and the first scattered wildflowers.
      Bees drone lazily between blossoms, and the whole clearing feels like a held
      breath of summer tucked inside the older, colder wood behind you.
    map_x: 30
    map_y: 28
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: north
        target_room_id: south_trail
      - direction: south
        target_room_id: wildflower_glade
      - direction: west
        target_room_id: fern_hollow

  - id: fern_hollow
    name: Fern Hollow
    description: >-
      A shaded pocket just off the meadow, floor to canopy in soft green ferns that
      brush against your legs as you walk. Water beads on every frond after rain and
      never quite seems to dry. It is a quiet, unremarkable, entirely peaceful place
      to sit and do nothing for a while.
    map_x: 29
    map_y: 28
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: east
        target_room_id: meadow_clearing

  - id: wildflower_glade
    name: Wildflower Glade
    description: >-
      Color explodes across this glade in a riot of blossoms — violet, gold, and
      deep crimson blooms crowd every open patch of ground. Butterflies drift between
      them in unhurried loops. Of everywhere the forest has to offer, this may be the
      single most beautiful spot, and it knows it.
    map_x: 30
    map_y: 27
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: north
        target_room_id: meadow_clearing
      - direction: south
        target_room_id: babbling_stream

  - id: babbling_stream
    name: Babbling Stream
    description: >-
      A clear, cold stream chatters over smooth stones here, cutting a shallow
      channel through mossy banks. Sunlight sparkles on the moving water, and small
      fish dart between the rocks. It is the kind of place that makes a very
      convincing argument for stopping to rest.
    map_x: 30
    map_y: 26
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: north
        target_room_id: wildflower_glade

  - id: east_trail
    name: East Trail
    description: >-
      A thin mist clings to the ground along this trail no matter the hour, curling
      around exposed roots and pooling in the hollows. The trees here grow in oddly
      deliberate rows, as if planted rather than grown, and the trail forks ahead
      toward two very different kinds of strange.
    map_x: 31
    map_y: 30
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: west
        target_room_id: whispering_clearing
      - direction: north
        target_room_id: monolith_grove
      - direction: south
        target_room_id: mushroom_circle

  - id: monolith_grove
    name: Monolith Grove
    description: >-
      A cluster of standing stones rises from the mist here, each taller than the
      standing stone at the clearing and etched with spirals, angular script, and
      symbols that match nothing in any book you've read. The stones hum faintly if
      you press an ear to them — or perhaps that's only the wind finding the gaps.
    map_x: 31
    map_y: 31
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: east_trail

  - id: mushroom_circle
    name: Mushroom Circle
    description: >-
      A near-perfect ring of pale mushrooms grows here, spaced with a regularity
      that unsettles more than it charms. Old stories call these fairy rings and
      warn against stepping inside after dusk. By daylight it looks harmless enough —
      almost.
    map_x: 31
    map_y: 29
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: north
        target_room_id: east_trail

  - id: west_trail
    name: West Trail
    description: >-
      The trail west carries a faint, out-of-place sound on the wind — the creak of
      old timber, the groan of rusted iron. Nature is doing its slow work of reclaiming
      whatever lies ahead, but hasn't quite finished the job.
    map_x: 29
    map_y: 30
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: east
        target_room_id: whispering_clearing
      - direction: north
        target_room_id: old_lumber_mill
      - direction: south
        target_room_id: flooded_quarry

  - id: old_lumber_mill
    name: Old Lumber Mill
    description: >-
      A collapsed timber mill sags under decades of moss and creeping vine, its
      waterwheel long stilled and half-swallowed by the forest floor. Saw blades
      have rusted into lace. Someone worked hard here once, and then, for reasons
      lost to time, simply stopped. The melancholy is almost a physical weight.
    map_x: 29
    map_y: 31
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: west_trail

  - id: flooded_quarry
    name: Flooded Quarry
    description: >-
      An old stone quarry has filled with dark, still water, its cut walls dropping
      sheer beneath the surface with no visible bottom. The edges are slick stone,
      unmarked and unguarded — a careless step here would be a very long way down.
    map_x: 29
    map_y: 29
    map_z: 0
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: north
        target_room_id: west_trail

  # --- Canopy City (map_z: 1) ---
  - id: elder_tree_hub
    name: Elder Tree Hub
    description: >-
      A vast, hollowed elder tree forms the heart of the treetop settlement, its
      inner walls smoothed by generations of hands and carved with growth-rings of
      lantern-hooks and shelving. Rope bridges radiate outward from its many
      doorways toward the platforms beyond, swaying gently in the wind. Wind chimes
      made of bone and glass sound softly overhead.
    map_x: 30
    map_y: 30
    map_z: 1
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: down
        target_room_id: whispering_clearing
      - direction: north
        target_room_id: weaver_platform
      - direction: south
        target_room_id: hunter_lodge
      - direction: east
        target_room_id: merchant_branch
      - direction: west
        target_room_id: healer_nest

  - id: weaver_platform
    name: Weaver's Platform
    description: >-
      A broad platform lashed between three great boughs, strung overhead with
      looms and hanging skeins of dyed thread that sway like slow-motion banners.
      Feathers, seeds, and woven scraps litter the floor. The whole platform smells
      of cedar and fresh dye.
    map_x: 30
    map_y: 31
    map_z: 1
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: elder_tree_hub

  - id: hunter_lodge
    name: Hunter's Lodge
    description: >-
      A sturdy lodge built into the fork of an ancient bough, hung with coiled
      rope, traveling packs, and the antlers of animals long since released back to
      the wood. A banked fire pit smokes gently in one corner. It is the safest,
      most solid-feeling place in the whole treetop settlement.
    map_x: 30
    map_y: 29
    map_z: 1
    area_id: whisperwood
    light_level: 1
    safe_rest: true
    exits:
      - direction: north
        target_room_id: elder_tree_hub

  - id: merchant_branch
    name: Merchant Branch
    description: >-
      A wide bough has been decked over with planking to form a trading post, its
      rails hung with woven baskets, coils of rope, and small clay jars of honey
      and salve. Wind-worn banners mark out stalls that shift and reopen with the
      seasons.
    map_x: 31
    map_y: 30
    map_z: 1
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: west
        target_room_id: elder_tree_hub

  - id: healer_nest
    name: Healer's Nest
    description: >-
      A round, nest-like chamber woven from supple branches and lined with dried
      moss, hung with bundles of drying herbs and rows of small clay jars. The air
      is thick with the green, bitter smell of tonics in the making. It feels like
      being tucked inside something alive.
    map_x: 29
    map_y: 30
    map_z: 1
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: east
        target_room_id: elder_tree_hub

  # --- Cave System: Level -1 ---
  - id: cave_entrance
    name: Cave Entrance
    indoor: true
    description: >-
      A narrow gap beneath the thicket's roots widens into a low stone mouth,
      cool air sighing out of the dark. Ancient root-tendrils have grown down
      through cracks in the ceiling, groping blindly toward the black water
      somewhere below. The forest's noise vanishes the moment you step inside.
    map_x: 30
    map_y: 33
    map_z: -1
    area_id: whisperwood
    light_level: 0
    exits:
      - direction: up
        target_room_id: shadow_thicket
      - direction: north
        target_room_id: limestone_passage

  - id: limestone_passage
    name: Limestone Passage
    indoor: true
    description: >-
      The passage narrows between walls of pale, water-carved limestone, ribbed
      with drip-formed ridges. Stalactites hang low enough to catch an unwary
      head, and every footstep and breath returns as a soft echo from somewhere
      deeper in.
    map_x: 30
    map_y: 34
    map_z: -1
    area_id: whisperwood
    light_level: 0
    exits:
      - direction: south
        target_room_id: cave_entrance
      - direction: north
        target_room_id: crystal_cavern

  - id: crystal_cavern
    name: Crystal Cavern
    indoor: true
    description: >-
      The passage opens without warning into a vast chamber lit by its own
      light — clusters of pale, bioluminescent crystal jut from every wall and
      ceiling, casting a soft blue-green glow across still pools and glittering
      mineral veins. It is the most beautiful place in the entire cave system,
      and clearly, from the carefully arranged stones near its center, someone
      lives here.
    map_x: 30
    map_y: 35
    map_z: -1
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: south
        target_room_id: limestone_passage
      - direction: east
        target_room_id: underground_lake
      - direction: down
        target_room_id: deep_passage

  - id: underground_lake
    name: Underground Lake
    indoor: true
    description: >-
      A broad, shallow lake fills this chamber, its surface lit by the crystal
      glow spilling in from the cavern behind you. Pale, eyeless fish glide
      beneath the surface, and the far shore is lost in shadow. Ripples spread
      from unseen movement somewhere out in the dark water.
    map_x: 31
    map_y: 35
    map_z: -1
    area_id: whisperwood
    light_level: 1
    exits:
      - direction: west
        target_room_id: crystal_cavern

  # --- Cave System: Level -2 ---
  - id: deep_passage
    name: Deep Passage
    indoor: true
    description: >-
      The way down narrows sharply, the air turning colder and heavier with
      every step. The bioluminescent glow of the cavern above fades quickly
      here, giving way to true, absolute dark. The silence has a weight to it,
      like the whole mountain is listening.
    map_x: 30
    map_y: 35
    map_z: -2
    area_id: whisperwood
    light_level: 0
    exits:
      - direction: up
        target_room_id: crystal_cavern
      - direction: east
        target_room_id: bone_chamber

  - id: bone_chamber
    name: Bone Chamber
    indoor: true
    description: >-
      A wide chamber floored in fine white silt, littered with the bones and
      fossils of creatures no living scholar could name. Ribcages the size of
      market stalls curve up out of the ground like the frames of collapsed
      buildings. A heavy stone door, carved with the same spirals as the
      standing stone above, is set into the eastern wall.
    map_x: 31
    map_y: 35
    map_z: -2
    area_id: whisperwood
    light_level: 0
    exits:
      - direction: west
        target_room_id: deep_passage
      - direction: east
        target_room_id: sealed_vault
        locked: true
        key_item_id: vault_root_key

  - id: sealed_vault
    name: Sealed Vault
    indoor: true
    description: >-
      Beyond the stone door, the vault is a small, close chamber, its walls
      carved floor to ceiling with the same spiral script found throughout the
      forest above. Whatever the vault was built to hold is long gone, but the
      carvings themselves feel like the real treasure — a message left by
      whoever raised the standing stones, waiting a very long time to be read.
    map_x: 32
    map_y: 35
    map_z: -2
    area_id: whisperwood
    light_level: 0
    exits:
      - direction: west
        target_room_id: bone_chamber

  # -------------------------------------------------------------------------
  # AREA: port_veridian — Coastal Settlement (Phase 1 Foundation)
  # -------------------------------------------------------------------------

  # --- Docks (central hub) ---
  - id: docks_main
    name: Docks Main
    description: >-
      The beating heart of Port Veridian. Cargo cranes creak overhead, hauling
      netted pallets from the holds of tall-masted traders. Dock workers shout
      over each other in a dozen accents, rolling barrels and hefting crates
      down worn gangplanks. Gulls wheel and scream above the pilings, and the
      salt air carries tar, brine, and fish.
    map_x: 35
    map_y: 30
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: north
        target_room_id: docks_north
      - direction: south
        target_room_id: docks_south
      - direction: west
        target_room_id: warehouse_district
      - direction: east
        target_room_id: harbor_promenade

  - id: docks_north
    name: North Dock
    description: >-
      The newer of the two loading docks, its timbers still pale and unweathered.
      Coils of fresh rope hang from iron cleats, and a chalk board nailed to a
      post lists incoming ships by name and berth number. A path curves west
      toward the sound of a rope-maker's wheel, and north toward the shipyard's
      scaffolding.
    map_x: 35
    map_y: 31
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: south
        target_room_id: docks_main
      - direction: north
        target_room_id: shipyard
      - direction: west
        target_room_id: rope_walk

  - id: docks_south
    name: South Dock
    description: >-
      The older, weather-beaten dock, its pilings green with algae below the
      waterline. Fishing skiffs are tied up two and three deep, and drying
      lines strung between posts flutter with the day's laundry. The path
      south leads toward the fisherfolk's homes.
    map_x: 35
    map_y: 29
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: north
        target_room_id: docks_main
      - direction: south
        target_room_id: fisherfolk_quarter

  # --- Shipyard cluster ---
  - id: shipyard
    name: Port Veridian Shipyard
    description: >-
      A half-finished hull looms on wooden scaffolding, ribs of raw timber
      exposed to the sky. Sawdust and wood shavings carpet the ground, and
      the rhythmic knock of caulking mallets echoes off the surrounding
      warehouses. Rolls of canvas sailcloth are stacked against a shed wall.
    map_x: 35
    map_y: 32
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: south
        target_room_id: docks_north
      - direction: east
        target_room_id: drydock
      - direction: north
        target_room_id: shipyard_office

  - id: drydock
    name: Drydock
    description: >-
      A stripped hull rests in a cradle of timber props, its planking pried
      open for repair. Salvaged fittings — cleats, deadeyes, corroded
      chainplates — are sorted into crates for reuse. The smell of tar and
      wet wood is thick here.
    map_x: 36
    map_y: 32
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: west
        target_room_id: shipyard

  - id: shipyard_office
    name: Shipyard Office
    indoor: true
    description: >-
      A cramped, cluttered office papered with hull plans and shipping
      manifests. A single oil lamp burns low over a desk buried under
      unpaid invoices. Everything smells faintly of pitch.
    map_x: 34
    map_y: 32
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: south
        target_room_id: shipyard

  - id: rope_walk
    name: The Rope Walk
    description: >-
      A long, narrow yard where hemp fibers are twisted into cordage on a
      creaking wheel-and-drum contraption. Coils of finished rope hang from
      pegs along the fence in graduated thicknesses, from twine to hawser.
    map_x: 34
    map_y: 31
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: east
        target_room_id: docks_north

  # --- Fisherfolk quarter ---
  - id: fisherfolk_quarter
    name: Fisherfolk Quarter
    description: >-
      A cluster of weathered cottages huddled close together, their roofs
      patched with tar-paper and driftwood. Nets are strung between houses
      to dry, and the smell of fish and woodsmoke hangs in the air. Children
      chase each other between the wash-lines.
    map_x: 35
    map_y: 28
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: north
        target_room_id: docks_south
      - direction: west
        target_room_id: fisherfolk_row
      - direction: east
        target_room_id: fisherfolk_dock

  - id: fisherfolk_row
    name: Fisherfolk Row
    description: >-
      A narrow lane between leaning cottages, strung overhead with lines of
      salted fish set out to cure. Old-timers sit on stoops mending gear,
      trading gossip in low voices. A side path leads down toward the
      net-mending yard.
    map_x: 34
    map_y: 28
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: east
        target_room_id: fisherfolk_quarter
      - direction: south
        target_room_id: net_mending_yard

  - id: fisherfolk_dock
    name: Fisherfolk's Landing
    description: >-
      A small private pier where the fisherfolk's own boats are moored,
      little more than dinghies compared to the traders at the main docks.
      Buckets of the day's catch sit in the shade, packed with kelp to keep
      cool.
    map_x: 36
    map_y: 28
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: west
        target_room_id: fisherfolk_quarter

  - id: net_mending_yard
    name: Net-Mending Yard
    description: >-
      An open yard strewn with tangled nets in every stage of repair. Wooden
      needles threaded with tarred twine lie in baskets, and floats of cork
      and glass are sorted into crates by size. The steady click of shuttle
      needles never quite stops.
    map_x: 34
    map_y: 27
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: north
        target_room_id: fisherfolk_row

  # --- Warehouse district ---
  - id: warehouse_district
    name: Warehouse District
    description: >-
      Rows of squat timber warehouses stand shoulder to shoulder, their loading
      doors thrown open to receive cargo from the docks. Handcarts rattle over
      cobbles rutted by decades of iron-shod wheels. A heavy padlocked door to
      the north stands apart from the rest — clearly guarding something more
      valuable than fish crates.
    map_x: 33
    map_y: 30
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: east
        target_room_id: docks_main
      - direction: north
        target_room_id: warehouse_north
        locked: true
        key_item_id: warehouse_vault_key
      - direction: south
        target_room_id: warehouse_south
      - direction: west
        target_room_id: customs_house

  - id: warehouse_north
    name: Locked Warehouse
    indoor: true
    description: >-
      A private storeroom, cooler and darker than the others. Crates here
      bear no merchant's mark, only a stenciled number. Whatever is stored
      in this warehouse, someone has gone to considerable trouble to keep
      it under lock and key.
    map_x: 33
    map_y: 31
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: south
        target_room_id: warehouse_district

  - id: warehouse_south
    name: Warehouse Floor
    indoor: true
    description: >-
      A cavernous storage hall stacked to the rafters with crated trade
      goods bound for the city. A clerk's ledger desk sits near the door,
      untended. Dust motes drift through shafts of light from high, grimy
      windows.
    map_x: 33
    map_y: 29
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: north
        target_room_id: warehouse_district

  - id: customs_house
    name: Customs House
    indoor: true
    description: >-
      A small, stuffy office where an overworked clerk stamps manifests and
      levies tariffs on incoming cargo. Shelves of ledgers line the walls,
      each labeled by year. A brass scale for weighing goods sits on the
      counter.
    map_x: 32
    map_y: 30
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: east
        target_room_id: warehouse_district

  # --- Harbor promenade, tavern, market ---
  - id: harbor_promenade
    name: Harbor Promenade
    description: >-
      A cobbled walkway running along the waterline, popular with off-duty
      sailors and townsfolk alike. Benches face the harbor, and a row of
      lampposts wait for dusk. The lighthouse is visible to the east, its
      beam not yet needed in the daylight.
    map_x: 37
    map_y: 30
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: west
        target_room_id: docks_main
      - direction: north
        target_room_id: fishmonger_stall
      - direction: south
        target_room_id: maritime_tavern
      - direction: east
        target_room_id: breakwater

  - id: fishmonger_stall
    name: Fishmonger's Stall
    description: >-
      A weathered wooden stall heaped with the morning's catch, laid out on
      crushed ice and beds of kelp. The fishmonger calls out prices in a
      hoarse, practiced sing-song, waving off the gulls circling for scraps.
    map_x: 37
    map_y: 31
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: south
        target_room_id: harbor_promenade

  - id: maritime_tavern
    name: The Salted Anchor
    indoor: true
    description: >-
      A low-beamed tavern thick with pipe smoke and the smell of frying fish.
      Fishing nets and ship's lanterns hang from the rafters as decoration,
      and a mounted swordfish presides over the bar. Sailors of every stripe
      trade stories over tankards of dark rum.
    map_x: 37
    map_y: 29
    map_z: 0
    area_id: port_veridian
    light_level: 1
    safe_rest: true
    exits:
      - direction: north
        target_room_id: harbor_promenade
      - direction: down
        target_room_id: tavern_cellar

  - id: tavern_cellar
    name: Salted Anchor Cellar
    indoor: true
    description: >-
      A cool stone cellar beneath the tavern, lined with casks of rum and
      barrels of salted provisions. A single lantern swings gently from a
      hook, though no draft explains the motion. Old crew manifests are
      tacked to a support post, their ink long faded.
    map_x: 37
    map_y: 28
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: up
        target_room_id: maritime_tavern

  # --- Lighthouse & shoreline ---
  - id: breakwater
    name: The Breakwater
    description: >-
      A long spine of fitted stone blocks stretches out into the harbor
      mouth, waves breaking white against its seaward face. The wind is
      sharper out here, and spray mists everything within reach. The
      lighthouse rises at the far end.
    map_x: 38
    map_y: 30
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: west
        target_room_id: harbor_promenade
      - direction: east
        target_room_id: lighthouse
      - direction: south
        target_room_id: tide_pools

  - id: lighthouse
    name: Port Veridian Lighthouse
    indoor: true
    description: >-
      A whitewashed stone tower rises high above the breakwater, its great
      lamp housed behind thick glass at the top of a tightly spiraling
      stair. Charts of the coastline and shipping lanes cover every wall of
      the ground floor, marked with pins and notes in a careful hand.
    map_x: 39
    map_y: 30
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: west
        target_room_id: breakwater

  - id: tide_pools
    name: Tide Pools
    description: >-
      A shelf of dark rock pocked with shallow pools, left behind by the
      retreating tide. Anemones and small crabs shelter in the shadows, and
      the rock is scattered with fragments of sea glass, tumbled smooth by
      years in the surf.
    map_x: 38
    map_y: 29
    map_z: 0
    area_id: port_veridian
    light_level: 1
    exits:
      - direction: north
        target_room_id: breakwater

# ---------------------------------------------------------------------------
# Items
# ---------------------------------------------------------------------------

items:
  # --- Inn & Cellar ---
  - id: carved_mug
    name: Carved Wooden Mug
    description: >-
      A hefty mug cut from a single piece of elm. The handle is carved into
      the shape of a crow mid-flight. It smells of ale and the years.
    takeable: true
    tradeable: true
    value: 8
    category: trade_good

  - id: sea_glass_pendant
    name: Sea-Glass Pendant
    description: >-
      A thumb-sized shard of green glass, tumbled smooth by years in the
      creek and knotted into a loop of tarred cord. Held to the light, a
      faint crescent flaw floats in the glass like a moon behind cloud.
    takeable: true
    tradeable: true
    value: 12
    category: trade_good

  - id: tallow_candle
    name: Tallow Candle
    description: >-
      A squat, yellowish candle of rendered tallow. It would give decent light
      for an hour or two before guttering. It smells exactly as bad as you
      would expect.
    takeable: true
    tradeable: true
    value: 4
    category: trade_good

  - id: old_blanket
    name: Moth-Eaten Wool Blanket
    description: >-
      Heavy wool in a faded tartan pattern, more hole than blanket in the
      corners. Still warm enough to matter on a cold night. The moths have
      had the best of it, but there is plenty left for a human.
    takeable: true
    tradeable: true

  - id: cellar_key
    name: Cellar Key
    description: >-
      An iron key, stubby and thick, with a loop handle. The bow is stamped
      with a crow silhouette — the inn's mark. It is heavier than it looks.
    takeable: true
    tradeable: false

  - id: cask_stopper
    name: Wooden Cask Stopper
    description: >-
      A turned wooden bung for a barrel. Smells of old wine. Someone has
      scratched a tally into the side: fifteen marks in groups of five.
    takeable: true
    tradeable: true

  # --- Blacksmith ---
  - id: iron_tongs
    name: Heavy Iron Tongs
    description: >-
      Blacksmith's tongs, each arm the length of your forearm. The gripping
      jaws are carbon-blackened and bear the shallow impressions of a thousand
      iron bars. Not a weapon, exactly, but you would not want to be struck
      by them.
    takeable: true
    tradeable: true

  - id: horseshoe
    name: Freshly Forged Horseshoe
    description: >-
      Still warm to the touch. The iron is smooth where the hammer flattened it
      and pocked where it was punched for nails. There is something satisfying
      about its heft and its curve — a small, useful perfection.
    takeable: true
    tradeable: true

  - id: sharpening_stone
    name: Sharpening Stone
    description: >-
      A rectangular whetstone, fine-grained, worn concave from years of use.
      One end is darker where oil has soaked in. It would put a decent edge
      on a blade, given patience and a steady hand.
    takeable: true
    tradeable: true

  # --- Market & Alchemist ---
  - id: dried_herbs
    name: Bundle of Dried Herbs
    description: >-
      A hand-tied bundle of something aromatic — rosemary, perhaps, or one of
      the wild hill herbs the valley folk use for cooking and curing alike.
      Brittle. Pungent. The exact species are unclear to anyone who did not
      pick them themselves.
    takeable: true
    tradeable: true
    value: 12
    category: trade_good

  - id: copper_coin
    name: Worn Copper Coin
    description: >-
      A copper coin so handled that the face is a smooth oval and the legend
      is entirely gone. It is still legal tender in the valley — the assay
      mark on the edge is intact — but it has clearly passed through a great
      many hands to reach this cobblestone.
    takeable: true
    tradeable: true

  # --- Locksmith's Gallery (disambiguation test set) ---
  - id: red_key
    name: Red Key
    description: A small key painted crimson.
    takeable: true
    tradeable: true

  - id: iron_key
    name: Iron Key
    description: A plain iron key, unadorned.
    takeable: true
    tradeable: true

  - id: rusty_iron_key
    name: Rusty Iron Key
    description: An iron key thick with orange rust.
    takeable: true
    tradeable: true

  - id: steel_key
    name: Steel Key
    description: A bright steel key, recently cut.
    takeable: true
    tradeable: true

  - id: cage_key
    name: Cage Key
    description: A delicate key for a cage latch.
    takeable: true
    tradeable: true
    usable_with:
      - cage_lock

  - id: cage_lock
    name: Cage Lock
    description: A small brass lock still mounted on a cage hasp.
    takeable: true
    tradeable: true

  # Vault-door puzzle (Sprint 50 P3.3). The vault hall's east exit is locked
  # with key_item_id: good_key, so only the Good Key opens it; the Bad Key is a
  # deliberate non-matching decoy. Obvious names on purpose.
  - id: good_key
    name: Good Key
    description: A sturdy iron key, freshly cut to fit the vault hall's east door.
    takeable: true
    tradeable: true

  - id: bad_key
    name: Bad Key
    description: A bent, rusted key that clearly fits nothing here.
    takeable: true
    tradeable: true

  # Equippable armor example (Sprint 50 P4.2). slot=head + wearable makes it a
  # valid `wear`/`remove` target; equipping moves it out of the loose inventory.
  - id: equippable_helmet
    name: Equippable Helmet
    description: A plain iron helmet, sized to wear on your head.
    takeable: true
    tradeable: true
    slot: head
    wearable: true

  - id: rusty_iron_sword
    name: Rusty Iron Sword
    description: A short sword eaten through with rust.
    takeable: true
    tradeable: true
    aliases:
      - blade
      - shortsword

  - id: red_rose
    name: Red Rose
    description: A silk rose, unnaturally perfect.
    takeable: true
    tradeable: true

  - id: cracked_vial
    name: Cracked Glass Vial
    description: >-
      A small glass vial, thumb-sized, with a crack running diagonally across
      the belly. Whatever it held is long gone. The glass is old — you can
      tell by the slight green tint and the bubbles caught inside the walls
      when you hold it to the light.
    takeable: true
    tradeable: true

  - id: curious_powder
    name: Pinch of Blue Powder
    description: >-
      A twist of paper containing a small amount of deep blue powder. It
      smells faintly of copper and lavender and gives off a faint heat. The
      paper is labelled in a small precise hand: DO NOT INHALE and a symbol
      that might be a warning or might be a recipe.
    takeable: true
    tradeable: true

  # --- Forest & Wilderness ---
  - id: worn_boot
    name: Single Worn Leather Boot
    description: >-
      One boot, left foot, the sole nearly worn through at the heel. The
      upper has been oiled repeatedly and is still sound. Its companion is
      nowhere in evidence. It suggests a story you are probably better off
      not knowing.
    takeable: true
    tradeable: true

  - id: strange_mushroom
    name: Foxfire Mushroom
    description: >-
      A pale, waxy mushroom that gives off a cool green light — foxfire,
      bioluminescence from the mycelium network in the deadfall where it
      grows. It is not toxic (you think), but it is unusual. The light is
      faint but real; in a dark room it would be just visible.
    takeable: true
    tradeable: true

  - id: iridescent_feather
    name: Iridescent Feather
    description: >-
      A large feather, perhaps a foot long, that shifts from green to blue
      to a deep purple depending on the angle. No bird you know of sheds
      feathers like this. It is perfectly intact, as though it fell from a
      living wing moments ago. It is inexplicably warm.
    takeable: true
    tradeable: true

  - id: mossy_stone
    name: Smooth Mossy Stone
    description: >-
      A palm-sized stone from the creek bed, rounded by centuries of water.
      One face is covered in a mat of vivid green moss that refuses to dry
      out. It sits cool and damp in the hand. Perfectly ordinary. You keep
      picking it up anyway.
    takeable: true
    tradeable: true

  - id: torn_page
    name: Torn Journal Page
    description: >-
      A water-stained page torn from a small journal. The ink has run in
      places but most of the text survives: a personal account of something
      seen at the creek crossing on a night with no moon. The account breaks
      off mid-sentence. The handwriting grows larger and less careful toward
      the end.
    takeable: true
    tradeable: true

  - id: silver_locket
    name: Tarnished Silver Locket
    description: >-
      An oval locket on a broken chain, tarnished to near-black. The clasp
      is stiff from disuse but opens with patient pressure to reveal a tiny
      painted portrait — a woman, middle-aged, with dark eyes and a very
      slight smile. There is no inscription. Someone left this here on purpose.
    takeable: true
    tradeable: true

  # Sprint 55 context-attached commands: a non-takeable altar carries a `read`
  # verb, available only in the Ruined Chapel where the altar stands.
  - id: chapel_altar
    name: Altar Stone
    aliases: [altar, relief, inscription, carving]
    description: >-
      The upright altar stone, its carved relief of a wheel-within-a-wheel
      worn smooth but legible. Eroded letters ring the base.
    takeable: false
    tradeable: false
    context_commands:
      read:
        aliases: [study]
        help: read the altar's worn inscription
        say: >-
          You trace the wheel-within-a-wheel and piece out the eroded words:
          "...remembrance and fire... the tide remembers what the moon forgets."
        side_effects:
          set_flags: ["lore:chapel_wheel"]

  - id: millstone_shard
    name: Millstone Shard
    description: >-
      A curved fragment of the old millstone, perhaps eight inches across.
      The upper face still has the furrow-grooves cut by the millwright; the
      underside is rough grey granite. Too heavy to be much use as anything,
      but somehow impossible to put down entirely without feeling you should
      have kept it.
    takeable: true
    tradeable: true

  - id: rusted_saw
    name: Rusted Handsaw
    description: >-
      A short-handled crosscut saw, its blade orange with surface rust. The
      teeth are still sharp beneath the rust. The handle is cracked but the
      wood has not split all the way through. With cleaning and oiling it
      might work again. Right now it would work for a weapon in a pinch.
    takeable: true
    tradeable: true

  # --- Cave ---
  - id: old_lantern
    name: Dented Oil Lantern
    description: >-
      A tin lantern with a pierced-tin shade, dented on one side. The oil
      reservoir is nearly empty but not quite. The wick is charred at the
      top but could catch. In the dark of the cave below it might mean the
      difference between navigation and disaster.
    takeable: true
    tradeable: true

  - id: bone_fragment
    name: Gnawed Bone Fragment
    description: >-
      A short section of bone, perhaps from a rabbit or a small goat, clean
      and pale. The ends are gnawed, but not by any tool — by teeth. Whatever
      ate this here in the tunnel did so in the dark.
    takeable: true
    tradeable: true

  - id: cave_mushroom
    name: Pale Cave Mushroom
    description: >-
      A mushroom that has never seen light, white as chalk, with a cap as
      wide as your palm. The gills are a very faint blue. It has no smell
      at all, which is itself strange. Valley herb-lore holds that a mushroom
      without smell is a mushroom without mercy.
    takeable: true
    tradeable: true

  - id: iron_dagger
    name: Crude Iron Dagger
    description: >-
      A short blade, more wedge than edge, clearly hammered out by someone
      with iron but not much skill. The handle is wrapped in cord that has
      stiffened over time. It would do damage, but it would take effort,
      and it would not do it quietly.
    takeable: true
    tradeable: true

  - id: glowing_crystal
    name: Pool Crystal
    description: >-
      A fist-sized piece of raw crystal pulled from the shallows of the
      underground pool. It is translucent and deep blue and gives off a
      cold, steady light — not bright enough to read by, but bright enough
      to know where your hands are. It feels like holding a piece of still
      water that has forgotten to be wet.
    takeable: true
    tradeable: true

  - id: leather_pouch
    name: Weathered Leather Pouch
    description: >-
      A drawstring pouch of oiled leather, the kind a traveller would wear
      under their shirt. It is old and the leather has stiffened but it has
      not cracked. The inside smells of old copper and something sweet and
      resinous. Whatever was stored here was stored with care.
    takeable: true
    tradeable: true

  - id: ancient_coin
    name: Ancient Gold Coin
    description: >-
      A gold coin twice as thick as modern minting, stamped with a profile
      that matches no monarch in any history of the valley. The face is
      proud, severe, and completely unrecognisable. The reverse shows the
      wheel-within-a-wheel symbol from the chapel altar. It is warm in your
      hand even in this cold place.
    takeable: true
    tradeable: false

  # --- Scavenger-hunt trinkets (Sprint 48) ---
  # Definitions only; placed into the world only while the Harvest Trinket
  # hunt (world_content/hunts.yaml) is running.
  - id: trinket_acorn
    name: Gilded Acorn
    description: >-
      A little acorn dipped in gold leaf, light as the real thing. One of the
      Harvest Festival trinkets, lost about town.
    takeable: true
    tradeable: false

  - id: trinket_bell
    name: Tiny Brass Bell
    description: >-
      A brass bell no bigger than a thimble, with a bright, clear ring. One of
      the Harvest Festival trinkets.
    takeable: true
    tradeable: false

  - id: trinket_ribbon
    name: Faded Harvest Ribbon
    description: >-
      A length of russet ribbon, sun-faded and frayed at the ends. One of the
      Harvest Festival trinkets.
    takeable: true
    tradeable: false

  # --- Cogsworth: Weapons (Phase 1) ---
  - id: iron_sword_cog
    name: Steel-Forged Sword
    description: >-
      A blade of blue steel, forged in the depths of Cogsworth's foundry. The
      metal still holds faint warmth from the anvil. The pommel is wrapped in
      leather and set with a small brass gear.
    takeable: true
    tradeable: true
    value: 60
    category: weapon
    quality: fine

  - id: brass_dagger_cog
    name: Brass Dagger
    description: >-
      A small blade of polished brass, sharp enough to be dangerous. The hilt
      is wrapped with copper wire for grip. More ornamental than practical,
      but still deadly in trained hands.
    takeable: true
    tradeable: true
    value: 25
    category: weapon
    quality: common

  - id: mechanical_wrench
    name: Mechanical Wrench
    description: >-
      A tool more than a weapon, but weighted like a club. Industrial craftsmanship
      marks every edge. Could crack bone as easily as it tightens a bolt.
    takeable: true
    tradeable: true
    value: 15
    category: trade_good

  # --- Cogsworth: Armor (Phase 1) ---
  - id: leather_coat_cog
    name: Reinforced Leather Coat
    description: >-
      A heavy leather coat reinforced with brass buckles and studs. The leather
      is tooled with geometric patterns reminiscent of clock gears.
    takeable: true
    tradeable: true
    value: 45
    category: armor
    quality: fine

  - id: brass_helm
    name: Polished Brass Helm
    description: >-
      A helmet of bright brass, polished to mirror shine. The visor can be raised
      or lowered. A small gear-shaped emblem is mounted on the crown.
    takeable: true
    tradeable: true
    value: 35
    category: armor
    quality: fine

  - id: scholar_robes_cog
    name: Indigo Scholar Robes
    description: >-
      Academic robes in deep indigo, trimmed with silver thread. The hem is
      embroidered with mathematical symbols. Once worn by an Academy professor.
    takeable: true
    tradeable: true
    value: 20
    category: trade_good

  # --- Cogsworth: Light Sources & Tools ---
  - id: oil_lantern
    name: Brass Oil Lantern
    description: >-
      A polished brass lantern with multiple panes of clear glass. Designed to
      shed maximum light with minimal oil consumption. The mechanical shutter
      can be precisely adjusted.
    takeable: true
    tradeable: true
    value: 30
    category: trade_good

  - id: brass_key_tower
    name: Tower Maintenance Key
    description: >-
      A large brass key etched with clock-tower symbols. This is a working key
      used by the tower's maintenance staff.
    takeable: true
    tradeable: false

  - id: lockpicks_set
    name: Lockpick Set
    description: >-
      A set of finely crafted lockpicks in a leather case. Each tool is precisely
      shaped and balanced. The mark of a master craftsman from Cogsworth's finest
      locksmith workshop.
    takeable: true
    tradeable: true
    value: 40
    category: trade_good

  - id: copper_wire_coil
    name: Copper Wire Coil
    description: >-
      A tightly wound coil of pure copper wire, half a yard in length. Valuable
      for both craft work and electrical experiments. Very flexible.
    takeable: true
    tradeable: true
    value: 12
    category: trade_good

  - id: gear_small_brass
    name: Small Brass Gear
    description: >-
      A precision-cut gear of polished brass, about the size of your palm. It's
      perfectly balanced and would mesh precisely with other gears. A curious
      souvenir or valuable component.
    takeable: true
    tradeable: true
    value: 18
    category: trade_good

  # --- Cogsworth: Trade Goods & Consumables ---
  - id: oil_can_industrial
    name: Industrial Oil Can
    description: >-
      A sealed metal can of high-grade machine oil. The label bears Cogsworth's
      seal and a date stamp from this year. Essential for machinery maintenance.
    takeable: true
    tradeable: true
    value: 8
    category: trade_good

  - id: ale_brass_barrel
    name: Cogsworth Ale
    description: >-
      A tankard of dark, robust ale brewed in a Cogsworth brewery. The flavor
      has notes of copper and smoke. Warming and potent.
    takeable: true
    tradeable: true
    value: 5
    category: trade_good

  - id: mechanical_components
    name: Bag of Mechanical Components
    description: >-
      A cloth bag filled with bolts, springs, small gears, and screws. Useful
      for tinkerers and craftspeople. The exact contents are a bit mysterious.
    takeable: true
    tradeable: true
    value: 22
    category: trade_good

  # --- Cogsworth: Rare/Collectible ---
  - id: pocket_watch_cogsworth
    name: Cogsworth Pocket Watch
    description: >-
      An intricate pocket watch with a face of white enamel and hands of gold.
      The case is engraved with the city's skyline. It keeps perfect time,
      synchronized with the great clock tower above.
    takeable: true
    tradeable: true
    value: 150
    category: trade_good
    quality: superior

  - id: blueprint_scroll
    name: Rolled Blueprint
    description: >-
      A tightly rolled scroll of technical drawings—architectural plans for
      some wing of the Academy. The ink is precise and the measurements exact.
      Valuable to the right collector.
    takeable: true
    tradeable: true
    value: 50
    category: trade_good

  # --- Whisperwood: forest-themed items (Phase 1) ---
  - id: silverleaf_herb
    name: Silverleaf Sprig
    description: >-
      A sprig of broad, silver-backed leaves with a sharp, clean scent. Herbalists
      prize it for tonics and poultices; it grows thick in sunlit clearings.
    takeable: true
    tradeable: true
    value: 6
    category: trade_good

  - id: moonspore_mushroom
    name: Cluster of Moonspore Mushrooms
    description: >-
      Pale, faintly luminous mushrooms that grow in tight clusters, said to sprout
      only where fairy rings have stood. They give off a cool, silvery light
      in full darkness.
    takeable: true
    tradeable: true
    value: 10
    category: trade_good

  - id: faewrought_token
    name: Faewrought Token
    description: >-
      A small wooden disc, carved on both faces with spirals too fine and too
      regular for any hand tool you recognize. It is warm to the touch, and
      seems to turn very slightly to face whoever is looking at it.
    takeable: true
    tradeable: true
    value: 15
    category: trade_good
    quality: fine

  - id: luminous_cavern_crystal
    name: Luminous Cavern Crystal
    description: >-
      A fist-sized shard of pale blue-green crystal, broken from a cluster deep
      in the caves below the forest. It glows faintly of its own accord, bright
      enough to read by in a truly dark room.
    takeable: true
    tradeable: true
    value: 40
    category: trade_good
    light: 1

  - id: standing_stone_rubbing
    name: Standing-Stone Rubbing
    description: >-
      A sheet of bark-paper pressed against carved stone and rubbed with charcoal
      until the spiral script beneath emerged in ghostly white lines. Whoever made
      this was trying very hard to remember something.
    takeable: true
    tradeable: false
    category: trade_good

  - id: driftwood_talisman
    name: Driftwood Talisman
    description: >-
      A small charm whittled from grey, water-smoothed driftwood salvaged from
      the old lumber mill's ruin. Simple, unpolished work, but carried with
      obvious care by whoever left it behind.
    takeable: true
    tradeable: true
    value: 8
    category: trade_good

  - id: streamworn_agate
    name: Streamworn Agate
    description: >-
      A smooth, banded stone pulled from the bed of a clear forest stream, its
      surface polished glass-smooth by years of moving water. Bands of amber
      and grey swirl through its center.
    takeable: true
    tradeable: true
    value: 5
    category: trade_good

  - id: vault_root_key
    name: Root-Bound Iron Key
    description: >-
      An old iron key, its bow wrapped and fused with a living root grown
      slowly around the metal over what must have been decades. It still turns
      freely despite its strange growth, as though the forest itself decided
      to keep it safe rather than let it rust.
    takeable: true
    tradeable: false

  # --- Port Veridian: nautical/maritime items (Phase 1) ---
  - id: coil_of_rope
    name: Coil of Rope
    description: >-
      A tightly wound coil of tarred hemp rope, thick as a thumb. Sturdy
      enough for hauling cargo or lashing down a deck load in a storm.
    takeable: true
    tradeable: true
    value: 6
    category: trade_good

  - id: fishing_net
    name: Fishing Net
    description: >-
      A wide net of tarred twine, weighted along one edge with lead sinkers
      and buoyed along the other with cork floats. A few knots are still
      being mended.
    takeable: true
    tradeable: true
    value: 10
    category: trade_good

  - id: salted_fish
    name: Salted Fish
    description: >-
      A split, salted fillet, dried stiff and silvery. Keeps for months at
      sea without spoiling, though it could use a good soak before eating.
    takeable: true
    tradeable: true
    value: 3
    category: food

  - id: sea_glass_shard
    name: Sea-Glass Shard
    description: >-
      A frosted shard of green glass, tumbled smooth and rounded by years
      in the surf. Worthless as trade goods, but pretty enough to pocket.
    takeable: true
    tradeable: true
    value: 5
    category: trade_good

  - id: ship_salvage_scrap
    name: Ship Salvage Scrap
    description: >-
      A bundle of scavenged fittings — bent deadeyes, a corroded cleat, a
      length of chain — pried from a wreck and sorted for reuse. Useful raw
      material for anyone handy with a forge.
    takeable: true
    tradeable: true
    value: 14
    category: trade_good

  - id: trade_goods_crate
    name: Crate of Trade Goods
    description: >-
      A stout wooden crate, nailed shut and stenciled with a merchant's mark.
      Whatever cargo it carries, it has already changed hands more than once.
    takeable: true
    tradeable: true
    value: 20
    category: trade_good

  - id: warehouse_vault_key
    name: Warehouse Vault Key
    description: >-
      A heavy iron key, cold to the touch, stamped with a number rather than
      a name. It fits the padlocked door on the north side of the warehouse
      district.
    takeable: true
    tradeable: false

  - id: spiced_rum
    name: Spiced Rum
    description: >-
      A dark, syrupy rum poured from an unlabeled bottle behind the bar.
      Tastes of molasses, clove, and something the tavern keeper won't name.
    takeable: true
    tradeable: true
    value: 6
    category: drink

  - id: hardtack_biscuit
    name: Hardtack Biscuit
    description: >-
      A dense, unleavened biscuit, baked hard enough to survive a long
      voyage. Best softened in stew or coffee before attempting to bite it.
    takeable: true
    tradeable: true
    value: 2
    category: food

  - id: chowder_bowl
    name: Bowl of Fish Chowder
    description: >-
      A steaming bowl of thick, creamy chowder, packed with chunks of fish
      and potato. A tavern specialty, and worth the walk to the docks alone.
    takeable: true
    tradeable: true
    value: 4
    category: food

  - id: captains_spyglass
    name: Captain's Spyglass
    description: >-
      A brass spyglass, its lenses carefully kept despite the tarnish on
      its casing. Extended, it brings the horizon sharply into focus — a
      lighthouse keeper's most trusted tool.
    takeable: true
    tradeable: true
    value: 45
    category: trade_good
    quality: fine

