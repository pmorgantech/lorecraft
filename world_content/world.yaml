    takeable: true
    tradeable: true
    value: 10
    category: trade_good

  - id: salted_fish
    name: Salted Fish
    description: >-
      A split, salted fillet, dried stiff and silvery. Keeps for months at
      sea without spoiling, though it could use a good soak before eating.
    takeable: true
    tradeable: true
    value: 3
    category: food

