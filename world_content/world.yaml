# ---------------------------------------------------------------------------
# Dialogue, NPCs, Quests — starter social content for Ashmoore playtesting
# ---------------------------------------------------------------------------

dialogue_trees:
  - id: innkeeper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Welcome to the Wandering Crow! What can I do for you?
        side_effects: {}
        choices:
          - label: Any news around town?
            next_node: town_news
          # Moon-gated lore beat (Sprint 54): visible only under a full moon
          # via the celestial feature's moon_phase_is dialogue condition.
          - label: The moon is full tonight. Does the creek really change with it?
            moon_phase_is: full
            next_node: moon_lore
          - label: Nothing, thanks.
            side_effects:
              end_dialogue: true
      moon_lore:
        text: >-
          Mira lowers her voice. "Full moon pulls the water hard. At low
          water there's a path of stones below the creek crossing — leads
          out to a little islet. The creek leaves things there. Mind the
          rise coming back; the stones drown quick."
        side_effects:
          set_flags:
            - lore:moonlit_tides
        choices:
          - label: I'll have a look. Thank you, Mira.
            side_effects:
              end_dialogue: true
      town_news:
        text: >-
          Strange lights have been seen near the market stalls at night.
          Nobody dares investigate.
        side_effects:
          set_flags:
            - heard_rumor
          start_quest: investigate_lights
        choices:
          - label: I'll look into it.
            next_node: farewell_quest
          - label: Sounds dangerous. Goodbye.
            side_effects:
              end_dialogue: true
      farewell_quest:
        text: Be careful out there. Come back safe.
        side_effects:
          end_dialogue: true
        choices: []

  # --- Cogsworth NPCs ---
  - id: clockmaster_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The tower keeps Cogsworth on time. A responsibility that admits no error.
          What brings you to the clockworks?
        side_effects: {}
        choices:
          - label: Tell me about the tower.
            next_node: tower_lore
          - label: Can I help with maintenance?
            next_node: maintenance_quest
          - label: Just looking around.
            side_effects:
              end_dialogue: true
      tower_lore:
        text: >-
          This tower has marked the hours for three centuries without fail. Every gear,
          every escapement, every balance wheel is a work of precision. The mechanism is
          alive in its own way—it breathes with steam and speaks in ticks.
        side_effects: {}
        choices:
          - label: That's fascinating.
            side_effects:
              end_dialogue: true
      maintenance_quest:
        text: >-
          The eastern bearing is wearing thin. If you can bring me brass shavings from
          the smithy district, I can repack the bearing properly. It's dangerous work if
          the tower stops.
        side_effects:
          start_quest: repair_tower_bearing
        choices:
          - label: I'll find those shavings for you.
            next_node: quest_accepted
          - label: That sounds risky. Never mind.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: Good. The smiths always have shavings. Return here when you have them.
        side_effects:
          end_dialogue: true

  - id: blacksmith_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          You've got an eye for good steel, or you wouldn't be here. What can I forge for you?
        side_effects: {}
        choices:
          - label: Show me your wares.
            next_node: browse_shop
          - label: Do you take commissions?
            next_node: commission_work
          - label: Just browsing.
            side_effects:
              end_dialogue: true
      browse_shop:
        text: >-
          I've got iron, steel, and a few pieces I'm particularly proud of. Everything
          here can take an edge sharp enough to split hairs. Fair prices too.
        side_effects: {}
        choices:
          - label: I'll look around.
            side_effects:
              end_dialogue: true
      commission_work:
        text: >-
          I take commissions for special work. Bring me rare materials and coin, and
          I'll craft something that'll outlast you. That's the Cogsworth promise.
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true

  - id: dealer_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Everything here has a story. Most of them are true. Everything has a price—
          and all prices are negotiable.
        side_effects: {}
        choices:
          - label: What's your stock?
            next_node: browse_curiosities
          - label: I'm looking for something specific.
            next_node: hunting
          - label: I'm just looking.
            side_effects:
              end_dialogue: true
      browse_curiosities:
        text: >-
          Rare automatons, books from before the kingdom, artifacts of unknown purpose.
          If it's strange and valuable, I probably have it or can find it.
        side_effects: {}
        choices:
          - label: Fascinating. What else do you have?
            side_effects:
              end_dialogue: true
      hunting:
        text: >-
          Tell me what you seek, and I'll tell you if I have it or if it can be found.
          The rarer the item, the more interesting the price negotiation.
        side_effects: {}
        choices:
          - label: I'll think about it.
            side_effects:
              end_dialogue: true

npcs:
  - id: innkeeper
    name: Mira the Innkeeper
    description: >-
      A stout woman who surveys the room with a practiced eye.
    home_room_id: wandering_crow_inn
    current_room_id: wandering_crow_inn
    dialogue_tree_id: innkeeper_dialogue
    behavior: defensive
    # Scripting engine A2 demo: an `encounter` trigger — fires when a player enters the inn
    # while Mira is here, narrating a line to the room. Walk west from the village square.
    triggers:
      - on: encounter
        do:
          - narrate_room: "Mira glances up from behind the counter and gives you a nod of welcome."
    # Sprint 55: an NPC-carried context verb — available only where Mira is.
    context_commands:
      tip:
        help: leave Mira a small tip at the counter
        say: >-
          You leave a few coins on the counter. Mira pockets them with a
          nod and a knowing half-smile.
        side_effects:
          set_flags: [tipped_mira]
    shop:
      name: The Wandering Crow's Counter
      buys_categories: [trade_good]
      sell_ratio: 0.5
      starting_coins: 300
      stock:
        - item_id: carved_mug
          quantity: 8
        - item_id: tallow_candle
          quantity: 15
        - item_id: dried_herbs
          quantity: -1
    bank:
      name: The Wandering Crow's Strongbox

  # -------------------------------------------------------------------------
  # AREA: cogsworth — Steampunk City (Phase 1 Foundation)
  # -------------------------------------------------------------------------

  - id: clockmaster_grimlock
    name: Clockmaster Grimlock
    description: >-
      An elderly human with oil-stained robes and a single gear-shaped monocle. His
      eyes are sharp, his bearing precise. He has the demeanor of someone for whom
      time is not a negotiable commodity.
    home_room_id: clock_tower_peak
    current_room_id: clock_tower_peak
    dialogue_tree_id: clockmaster_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "The Clockmaster glances up from his work, scrutinizing you with mechanical precision."

  - id: blacksmith_thorne
    name: Blacksmith Thorne
    description: >-
      A broad-shouldered dwarf with soot-stained hands and hammer-calluses. His beard
      is braided with copper wire. The heat of the forge follows him like an aura.
    home_room_id: smithy_district
    current_room_id: smithy_district
    dialogue_tree_id: blacksmith_dialogue
    behavior: defensive
    shop:
      name: Thorne's Smithy
      buys_categories: [weapon, armor, trade_good]
      sell_ratio: 0.6
      starting_coins: 500
      stock:
        - item_id: iron_sword_cog
          quantity: 3
        - item_id: brass_dagger_cog
          quantity: 5
        - item_id: leather_coat_cog
          quantity: 2
        - item_id: brass_helm
          quantity: 2
        - item_id: mechanical_wrench
          quantity: -1
    triggers:
      - on: encounter
        do:
          - narrate_room: "The smithy's proprietor looks up from his work, hammer held loosely."

  - id: dealer_vex
    name: Dealer Vex
    description: >-
      A rail-thin merchant with ink-stained fingers and a knowing smile. His eyes seem
      to catalog everything they see, assessing value both material and immaterial.
      A collector of impossible things.
    home_room_id: curiosity_shop
    current_room_id: curiosity_shop
    dialogue_tree_id: dealer_dialogue
    behavior: defensive
    shop:
      name: Dealer Vex's Emporium
      buys_categories: [trade_good, armor, weapon]
      sell_ratio: 0.7
      starting_coins: 1000
      stock:
        - item_id: pocket_watch_cogsworth
          quantity: 1
        - item_id: blueprint_scroll
          quantity: 2
        - item_id: lockpicks_set
          quantity: 1
        - item_id: copper_wire_coil
          quantity: -1
        - item_id: gear_small_brass
          quantity: -1
    triggers:
      - on: encounter
        do:
          - narrate_room: "The dealer's eyes flicker in your direction, assessing."

