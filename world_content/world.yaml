    takeable: true
    tradeable: true
    value: 50
    category: trade_good

  # --- Whisperwood: forest-themed items (Phase 1) ---
  - id: silverleaf_herb
    name: Silverleaf Sprig
    description: >-
      A sprig of broad, silver-backed leaves with a sharp, clean scent. Herbalists
      prize it for tonics and poultices; it grows thick in sunlit clearings.
    takeable: true
    tradeable: true
    value: 6
    category: trade_good

  - id: moonspore_mushroom
    name: Cluster of Moonspore Mushrooms
    description: >-
      Pale, faintly luminous mushrooms that grow in tight clusters, said to sprout
      only where fairy rings have stood. They give off a cool, silvery light
      in full darkness.
    takeable: true
    tradeable: true
    value: 10
    category: trade_good

  - id: faewrought_token
    name: Faewrought Token
    description: >-
      A small wooden disc, carved on both faces with spirals too fine and too
      regular for any hand tool you recognize. It is warm to the touch, and
      seems to turn very slightly to face whoever is looking at it.
    takeable: true
    tradeable: true
    value: 15
    category: trade_good
    quality: fine

  - id: luminous_cavern_crystal
    name: Luminous Cavern Crystal
    description: >-
      A fist-sized shard of pale blue-green crystal, broken from a cluster deep
