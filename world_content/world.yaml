# ---------------------------------------------------------------------------
# Dialogue, NPCs, Quests — starter social content for Ashmoore playtesting
# ---------------------------------------------------------------------------

dialogue_trees:
  - id: innkeeper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Welcome to the Wandering Crow! What can I do for you?
        side_effects: {}
        choices:
          - label: Any news around town?
            next_node: town_news
          # Moon-gated lore beat (Sprint 54): visible only under a full moon
          # via the celestial feature's moon_phase_is dialogue condition.
          - label: The moon is full tonight. Does the creek really change with it?
            moon_phase_is: full
            next_node: moon_lore
          - label: Nothing, thanks.
            side_effects:
              end_dialogue: true
      moon_lore:
        text: >-
          Mira lowers her voice. "Full moon pulls the water hard. At low
          water there's a path of stones below the creek crossing — leads
          out to a little islet. The creek leaves things there. Mind the
          rise coming back; the stones drown quick."
        side_effects:
          set_flags:
            - lore:moonlit_tides
        choices:
          - label: I'll have a look. Thank you, Mira.
            side_effects:
              end_dialogue: true
      town_news:
        text: >-
          Strange lights have been seen near the market stalls at night.
          Nobody dares investigate.
        side_effects:
          set_flags:
            - heard_rumor
          start_quest: investigate_lights
        choices:
          - label: I'll look into it.
            next_node: farewell_quest
          - label: Sounds dangerous. Goodbye.
            side_effects:
              end_dialogue: true
      farewell_quest:
        text: Be careful out there. Come back safe.
        side_effects:
          end_dialogue: true
        choices: []

  # --- Cogsworth NPCs ---
  - id: clockmaster_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The tower keeps Cogsworth on time. A responsibility that admits no error.
          What brings you to the clockworks?
        side_effects: {}
        choices:
          - label: Tell me about the tower.
            next_node: tower_lore
          - label: Can I help with maintenance?
            next_node: maintenance_quest
          - label: Just looking around.
            side_effects:
              end_dialogue: true
      tower_lore:
        text: >-
          This tower has marked the hours for three centuries without fail. Every gear,
          every escapement, every balance wheel is a work of precision. The mechanism is
          alive in its own way—it breathes with steam and speaks in ticks.
        side_effects: {}
        choices:
          - label: That's fascinating.
            side_effects:
              end_dialogue: true
      maintenance_quest:
        text: >-
          The eastern bearing is wearing thin. If you can bring me brass shavings from
          the smithy district, I can repack the bearing properly. It's dangerous work if
          the tower stops.
        side_effects:
          start_quest: repair_tower_bearing
        choices:
          - label: I'll find those shavings for you.
            next_node: quest_accepted
          - label: That sounds risky. Never mind.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: Good. The smiths always have shavings. Return here when you have them.
        side_effects:
          end_dialogue: true

  - id: blacksmith_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          You've got an eye for good steel, or you wouldn't be here. What can I forge for you?
        side_effects: {}
        choices:
          - label: Show me your wares.
            next_node: browse_shop
          - label: Do you take commissions?
            next_node: commission_work
          - label: Just browsing.
            side_effects:
              end_dialogue: true
      browse_shop:
        text: >-
          I've got iron, steel, and a few pieces I'm particularly proud of. Everything
          here can take an edge sharp enough to split hairs. Fair prices too.
        side_effects: {}
        choices:
          - label: I'll look around.
            side_effects:
              end_dialogue: true
      commission_work:
        text: >-
          I take commissions for special work. Bring me rare materials and coin, and
          I'll craft something that'll outlast you. That's the Cogsworth promise.
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true

  - id: dealer_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Everything here has a story. Most of them are true. Everything has a price—
          and all prices are negotiable.
        side_effects: {}
        choices:
          - label: What's your stock?
            next_node: browse_curiosities
          - label: I'm looking for something specific.
            next_node: hunting
          - label: I'm just looking.
            side_effects:
              end_dialogue: true
      browse_curiosities:
        text: >-
          Rare automatons, books from before the kingdom, artifacts of unknown purpose.
          If it's strange and valuable, I probably have it or can find it.
        side_effects: {}
        choices:
          - label: Fascinating. What else do you have?
            side_effects:
              end_dialogue: true
      hunting:
        text: >-
          Tell me what you seek, and I'll tell you if I have it or if it can be found.
          The rarer the item, the more interesting the price negotiation.
        side_effects: {}
        choices:
          - label: I'll think about it.
            side_effects:
              end_dialogue: true

  # --- Whisperwood NPCs ---
  - id: ranger_elena_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Elena looks up from a coil of rope, her wolf-grey eye tracking you head to
          foot. The other eye is missing entirely, the socket closed over an old
          scar that pulls the corner of her mouth into a permanent half-frown. "Not
          many wander this deep without a reason. What brings you to the clearing?"
        side_effects: {}
        choices:
          - label: Tell me about this forest.
            next_node: forest_lore
          - label: Any work for someone new to these woods?
            next_node: quest_offer
          - label: Just passing through.
            side_effects:
              end_dialogue: true
      forest_lore:
        text: >-
          "Four trails, four moods," she says, nodding toward the paths radiating
          from the clearing. "North gets dark fast — mind the thicket. South's
          gentle, good walking. East plays tricks on you near the stones. West...
          west just makes you sad. Old mill, flooded quarry. Something happened
          there once and the forest hasn't forgotten it."
        side_effects: {}
        choices:
          - label: Thanks for the warning.
            side_effects:
              end_dialogue: true
      quest_offer:
        text: >-
          "Truth is, nobody's properly mapped these trails in a generation. I know
          them by feel, not by any chart worth trusting. Walk them for me — the old
          oak grove, the wildflower glade, the monolith stones, the mill — and come
          back and tell me what you find. I'll make it worth your time."
        side_effects:
          start_quest: map_forest_trails
        choices:
          - label: I'll map the trails for you.
            next_node: quest_accepted
          - label: Maybe another time.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          "Good. Start at the old oak grove, north of here — you'll know it when
          the light goes strange. Come back safe."
        side_effects:
          end_dialogue: true

  - id: geomancer_shard_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A figure sits cross-legged among the crystal clusters, skin threaded through
          with faint veins of the same blue-green light. Shard does not open their
          eyes. "The stone remembers what the root forgets, and the root remembers
          what the stone forgets. You are neither, and yet you are here. Speak."
        side_effects: {}
        choices:
          - label: What are you doing down here?
            next_node: hermit_lore
          - label: Tell me about the sealed door east of here.
            next_node: vault_lore
          - label: I'll leave you to your work.
            side_effects:
              end_dialogue: true
      hermit_lore:
        text: >-
          "Listening. The crystal grows a hair's width in a hundred years, and in
          that hair's width it carries every word ever spoken near it. I am merely
          patient enough to hear the echo." A faint smile. "You are not patient.
          That is not an insult. It is an observation."
        side_effects: {}
        choices:
          - label: Tell me about the sealed door east of here.
            next_node: vault_lore
          - label: I should go.
            side_effects:
              end_dialogue: true
      vault_lore:
        text: >-
          "The bone chamber holds a door the forest itself locked, long before your
          kind or mine kept histories. The key was left where the light lives —
          you may already have passed it. What waits beyond is not treasure. It is
          a message. Whether you can read it is your affair, not mine."
        side_effects:
          start_quest: the_sealed_vault
        choices:
          - label: I'll see what's inside.
            next_node: quest_accepted
          - label: Not today.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          "East of the bone chamber, then. Bring nothing you are not willing to
          leave behind — the forest is generous, but it does not give without
          asking something in return."
        side_effects:
          end_dialogue: true

  # --- Port Veridian dialogue trees (Phase 1) ---
  - id: captain_iris_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The docks never sleep, and neither do I. What do you need — cargo,
          a berth, or just directions?
        side_effects: {}
        choices:
          - label: Tell me about the cargo work.
            next_node: cargo_talk
          - label: Any news from the sea?
            next_node: port_news
          - label: Just passing through.
            side_effects:
              end_dialogue: true
      cargo_talk:
        text: >-
          Every crate that comes off those ships needs to be logged, sorted,
          and moved before the next hull ties up. I could use another set of
          hands who can tell a manifest from a mess. Interested?
        side_effects:
          start_quest: manage_cargo_shipments
        choices:
          - label: I'll lend a hand.
            next_node: quest_accepted
          - label: Maybe another time.
            side_effects:
              end_dialogue: true
      port_news:
        text: >-
          Trade's been good since the spring thaw. Word is a warehouse on
          the north row has been locked up tight for weeks — nobody's saying
          why, and I haven't got the key to ask.
        side_effects:
          set_flags:
            - lore:port_veridian_trade
        choices:
          - label: Interesting. Thanks, Captain.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          Good. Start by getting a feel for the warehouses — mind the locked
          one, that's not your business yet.
        side_effects:
          end_dialogue: true

  - id: sal_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Welcome to the Salted Anchor. Sit, drink, and if you're lucky I'll
          tell you a tale worth the coin.
        side_effects: {}
        choices:
          - label: What's the tale tonight?
            next_node: story_exchange
          - label: What are you selling?
            next_node: browse_shop
          - label: Is it true the tide runs strange under a full moon?
            moon_phase_is: full
            next_node: moon_lore
          - label: Just resting here, thanks.
            side_effects:
              end_dialogue: true
      story_exchange:
        text: >-
          Sal leans on the bar. "Heard tell of a wreck out past the
          breakwater — cargo still down there, if you believe the drunks who
          swear they've seen the mast at low tide."
        side_effects:
          set_flags:
            - lore:sal_wreck_tale
        choices:
          - label: I'll keep an eye out.
            side_effects:
              end_dialogue: true
      browse_shop:
        text: >-
          Rum, chowder, hardtack — whatever keeps a sailor upright. Prices
          are fair, and I don't water the rum, whatever they say.
        side_effects: {}
        choices:
          - label: I'll look at your stock.
            side_effects:
              end_dialogue: true
      moon_lore:
        text: >-
          Sal's voice drops. "Full moon tide pulls hard past the breakwater
          — pools open up around the tide pools that you won't see any other
          night. Just don't get caught out there when it turns."
        side_effects:
          set_flags:
            - lore:port_veridian_moon_tide
        choices:
          - label: Thanks for the warning, Sal.
            side_effects:
              end_dialogue: true

  - id: lighthouse_keeper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The lamp's been lit every night for thirty years and it'll be lit
          tonight too. What brings you up all those stairs?
        side_effects: {}
        choices:
          - label: Tell me about the currents.
            next_node: navigation_lore
          - label: Do you need a scout?
            next_node: scouting_quest
          - label: Just admiring the view.
            side_effects:
              end_dialogue: true
      navigation_lore:
        text: >-
          The channel looks clear from up here, but there's a sandbar that
          shifts with every storm. More than one captain's learned that the
          hard way. I chart what I can, but the sea doesn't hold still.
        side_effects:
          set_flags:
            - lore:port_veridian_currents
        choices:
          - label: Good to know.
            side_effects:
              end_dialogue: true
      scouting_quest:
        text: >-
          As it happens — I could use someone to walk the shoreline and tell
          me what the last storm turned up. My knees aren't what they were.
        side_effects:
          start_quest: scout_coastal_waters
        choices:
          - label: I'll scout the shoreline for you.
            next_node: quest_accepted
          - label: Not right now.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          Much obliged. Start at the tide pools — the sea always leaves
          something behind.
        side_effects:
          end_dialogue: true

  - id: shipwright_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Careful where you step — half this yard is scaffolding and the
          other half is splinters. What can I do for you?
        side_effects: {}
        choices:
          - label: Show me your salvage.
            next_node: browse_salvage
          - label: Can you repair ships?
            next_node: repair_talk
          - label: Just looking.
            side_effects:
              end_dialogue: true
      browse_salvage:
        text: >-
          Everything in that drydock came off a wreck or a scrapped hull.
          Good fittings, if you know what to do with them. Cheaper than
          buying new from the city smiths.
        side_effects: {}
        choices:
          - label: I'll take a look.
            side_effects:
              end_dialogue: true
      repair_talk:
        text: >-
          Given enough timber, tar, and time, I can put most anything back
          to sea-worthy. This yard's been under construction longer than
          I'd like to admit — good help is hard to find in a port town.
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true

npcs:
  - id: innkeeper
    name: Mira the Innkeeper
    description: >-
      A stout woman who surveys the room with a practiced eye.
    home_room_id: wandering_crow_inn
    current_room_id: wandering_crow_inn
    dialogue_tree_id: innkeeper_dialogue
    behavior: defensive
    # Scripting engine A2 demo: an `encounter` trigger — fires when a player enters the inn
    # while Mira is here, narrating a line to the room. Walk west from the village square.
    triggers:
      - on: encounter
        do:
          - narrate_room: "Mira glances up from behind the counter and gives you a nod of welcome."
    # Sprint 55: an NPC-carried context verb — available only where Mira is.
    context_commands:
      tip:
        help: leave Mira a small tip at the counter
        say: >-
          You leave a few coins on the counter. Mira pockets them with a
          nod and a knowing half-smile.
        side_effects:
          set_flags: [tipped_mira]
    shop:
      name: The Wandering Crow's Counter
      buys_categories: [trade_good]
      sell_ratio: 0.5
      starting_coins: 300
      stock:
        - item_id: carved_mug
          quantity: 8
        - item_id: tallow_candle
          quantity: 15
        - item_id: dried_herbs
          quantity: -1
    bank:
      name: The Wandering Crow's Strongbox

  # -------------------------------------------------------------------------
  # AREA: cogsworth — Steampunk City (Phase 1 Foundation)
  # -------------------------------------------------------------------------

  - id: clockmaster_grimlock
    name: Clockmaster Grimlock
    description: >-
      An elderly human with oil-stained robes and a single gear-shaped monocle. His
      eyes are sharp, his bearing precise. He has the demeanor of someone for whom
      time is not a negotiable commodity.
    home_room_id: clock_tower_peak
    current_room_id: clock_tower_peak
    dialogue_tree_id: clockmaster_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "The Clockmaster glances up from his work, scrutinizing you with mechanical precision."

  - id: blacksmith_thorne
    name: Blacksmith Thorne
    description: >-
      A broad-shouldered dwarf with soot-stained hands and hammer-calluses. His beard
      is braided with copper wire. The heat of the forge follows him like an aura.
    home_room_id: smithy_district
    current_room_id: smithy_district
    dialogue_tree_id: blacksmith_dialogue
    behavior: defensive
    shop:
      name: Thorne's Smithy
      buys_categories: [weapon, armor, trade_good]
      sell_ratio: 0.6
      starting_coins: 500
      stock:
        - item_id: iron_sword_cog
          quantity: 3
        - item_id: brass_dagger_cog
          quantity: 5
        - item_id: leather_coat_cog
          quantity: 2
        - item_id: brass_helm
          quantity: 2
        - item_id: mechanical_wrench
          quantity: -1
    triggers:
      - on: encounter
        do:
          - narrate_room: "The smithy's proprietor looks up from his work, hammer held loosely."

  - id: dealer_vex
    name: Dealer Vex
    description: >-
      A rail-thin merchant with ink-stained fingers and a knowing smile. His eyes seem
      to catalog everything they see, assessing value both material and immaterial.
      A collector of impossible things.
    home_room_id: curiosity_shop
    current_room_id: curiosity_shop
    dialogue_tree_id: dealer_dialogue
    behavior: defensive
    shop:
      name: Dealer Vex's Emporium
      buys_categories: [trade_good, armor, weapon]
      sell_ratio: 0.7
      starting_coins: 1000
      stock:
        - item_id: pocket_watch_cogsworth
          quantity: 1
        - item_id: blueprint_scroll
          quantity: 2
        - item_id: lockpicks_set
          quantity: 1
        - item_id: copper_wire_coil
          quantity: -1
        - item_id: gear_small_brass
          quantity: -1
    triggers:
      - on: encounter
        do:
          - narrate_room: "The dealer's eyes flicker in your direction, assessing."

  # -------------------------------------------------------------------------
  # AREA: whisperwood — Ancient Forest (Phase 1 Foundation)
  # -------------------------------------------------------------------------

  - id: ranger_elena
    name: Ranger Elena
    description: >-
      A lean, weathered woman in forest-green leathers, a longbow slung across her
      back. One eye is a pale wolf-grey; the other socket is closed over, marked by
      a scar that pulls faintly at her mouth. She moves through the clearing like
      she's memorized every root and stone in it.
    home_room_id: whispering_clearing
    current_room_id: whispering_clearing
    dialogue_tree_id: ranger_elena_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "Elena's grey eye finds you immediately, tracking your approach across the clearing."

  - id: geomancer_shard
    name: Geomancer Shard
    description: >-
      A crystal-touched sage who sits so still among the cavern's glowing clusters
      that they are easy to mistake for another formation. Faint veins of
      blue-green light trace beneath their skin, pulsing gently in time with the
      crystals around them. They speak rarely, and never plainly.
    home_room_id: crystal_cavern
    current_room_id: crystal_cavern
    dialogue_tree_id: geomancer_shard_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "Shard's eyes open slowly, crystal-flecked and unhurried, and fix on you."

  # -------------------------------------------------------------------------
  # AREA: port_veridian — Coastal Settlement (Phase 1 Foundation)
  # -------------------------------------------------------------------------

  - id: captain_iris
    name: Captain Iris
    description: >-
      A weathered woman in a long oilskin coat, a boarding manifest tucked
      permanently under one arm. She watches the loading crews with a
      hawk's eye and misses nothing that crosses her docks.
    home_room_id: docks_main
    current_room_id: docks_main
    dialogue_tree_id: captain_iris_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "Captain Iris looks up from her manifest, sizing you up in a glance."

  - id: tavern_keeper_sal
    name: Tavern Keeper Sal
    description: >-
      A broad, sun-browned man with a laugh that carries across the room and
      a scar over one eyebrow he'll explain differently every time you ask.
      He knows every rumor that passes through the Salted Anchor.
    home_room_id: maritime_tavern
    current_room_id: maritime_tavern
    dialogue_tree_id: sal_dialogue
    behavior: defensive
    shop:
      name: The Salted Anchor's Bar
      buys_categories: [food, drink, trade_good]
      sell_ratio: 0.5
      starting_coins: 300
      stock:
        - item_id: spiced_rum
          quantity: -1
        - item_id: hardtack_biscuit
          quantity: -1
        - item_id: chowder_bowl
          quantity: 10
        - item_id: salted_fish
          quantity: 6
    triggers:
      - on: encounter
        do:
          - narrate_room: "Sal raises a tankard in greeting from behind the bar."

  - id: lighthouse_keeper
    name: The Lighthouse Keeper
    description: >-
      A spare, quiet woman with sun-creased eyes fixed permanently on the
      horizon. She speaks little and watches much, as if the sea might
      change its mind the moment she looks away.
    home_room_id: lighthouse
    current_room_id: lighthouse
    dialogue_tree_id: lighthouse_keeper_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "The Keeper turns from the window, spyglass still in hand."

  - id: shipwright_calloway
    name: Shipwright Mara Calloway
    description: >-
      A wiry, sun-freckled woman with sawdust permanently caught in her
      braid. She talks about hulls the way other people talk about old
      friends, and squints at every plank like it's lied to her before.
    home_room_id: shipyard
    current_room_id: shipyard
    dialogue_tree_id: shipwright_dialogue
    behavior: defensive
    shop:
      name: Calloway's Salvage
      buys_categories: [trade_good]
      sell_ratio: 0.6
      starting_coins: 400
      stock:
        - item_id: ship_salvage_scrap
          quantity: -1
        - item_id: trade_goods_crate
          quantity: 5
        - item_id: coil_of_rope
          quantity: -1
    triggers:
      - on: encounter
        do:
          - narrate_room: "Calloway glances up from the half-built hull, a caulking mallet in hand."

