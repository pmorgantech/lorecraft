    description: >-
      A long pole ending in a broad, barbed steel hook, meant for hauling a heavy
      catch over the gunwale. In a tight spot on a crowded dock, it has ended
      more than one dispute that had nothing to do with fish.
    takeable: true
    tradeable: true
    slot: main_hand
    weight: 2.0
    value: 20
    category: weapon

  - id: rigging_knife
    name: Rigging Knife
    description: >-
      A stubby, sheepsfoot-bladed knife on a lanyard, its blunt tip meant to
      keep a sailor from stabbing himself when the deck heaves. It parts wet
      rope in a single draw and lives on every working seaman's belt.
    takeable: true
    tradeable: true
    slot: off_hand
    weight: 0.5
    value: 14
    category: weapon

  - id: whalers_harpoon
    name: Whaler's Harpoon
    description: >-
      A long iron harpoon with a toggling barb and a hank of line still knotted
      to its ring. It is far too much weapon for anything that walks on land,
      which is exactly why it hangs where the tavern's rowdiest can see it.
    takeable: true
    tradeable: true
    slot: main_hand
    weight: 4.0
    value: 35
    category: weapon

  - id: belaying_pin_club
    name: Belaying Pin
    description: >-
      A turned length of hardwood that belongs in a pin-rail, holding a line
      fast — but every sailor knows its second use. Smooth, blunt, and always
      conveniently to hand when a bar-room disagreement turns physical.
    takeable: true
    tradeable: true
    slot: off_hand
    weight: 1.5
    value: 10
    category: weapon

  # --- P2.2 Cogsworth: Armor (smithy & foundry) ---
  - id: chainmail_hauberk_cog
    name: Riveted Chainmail Hauberk
    description: >-
      A knee-length shirt of riveted iron rings, each link closed by hand at a
      Cogsworth bench. It hangs with a heavy, liquid weight and whispers like
      coins when you move. Proof against a slash, if not a good clean thrust.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 12.0
    value: 80
    category: armor
    quality: fine

  - id: iron_plate_cuirass
    name: Iron Plate Cuirass
    description: >-
      A breast-and-back of hammered iron plate, articulated at the sides with
      sliding lames so a wearer can still draw breath and swing. It is
      punishingly heavy and stops nearly everything short of a foundry press.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 18.0
    value: 120
    category: armor
    quality: superior

  - id: studded_leather_jerkin
    name: Studded Leather Jerkin
    description: >-
      A sleeveless jerkin of thick boiled leather set with rows of iron studs.
      Light, quiet, and cheap enough that half the market district's hired
      muscle wears one under their coats.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 6.0
    value: 40
    category: armor

  - id: brass_scale_shirt_cog
    name: Brass Scale Shirt
    description: >-
      A shirt of small overlapping brass scales laced onto a leather backing,
      each scale catching the light like a fish's flank. More showy than a plain
      hauberk, and favored by those who like to be seen surviving.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 10.0
    value: 70
    category: armor
    quality: fine

  - id: brass_gauntlets
    name: Articulated Brass Gauntlets
    description: >-
      A pair of gauntlets built from dozens of hinged brass plates, so finely
      jointed you could still pick a lock while wearing them. The maker signed
      the cuff of the left one in a hand almost too small to read.
    takeable: true
    tradeable: true
    slot: hands
    wearable: true
    weight: 2.0
    value: 32
    category: armor
    quality: fine

  - id: iron_greaves
    name: Iron Greaves
    description: >-
      Shin-guards of shaped iron, buckled at the calf with worn leather straps.
      They are dented along the front where they have already done their job at
      least once for whoever wore them last.
    takeable: true
    tradeable: true
    slot: legs
    wearable: true
    weight: 5.0
    value: 35
    category: armor

  - id: steel_sabatons
    name: Steel Sabatons
    description: >-
      Segmented steel foot-armor that clanks like a dropped toolbox and turns a
      stubbed toe into someone else's broken one. Heavy going on a ladder, but
      a comfort in a press of bodies.
    takeable: true
    tradeable: true
    slot: feet
    wearable: true
    weight: 3.0
    value: 26
    category: armor

  - id: workmans_apron
    name: Heavy Leather Work Apron
    description: >-
      A blackened leather apron scarred with a thousand small burns and spark-
      pits, its pockets stiff with soot. Not armor, exactly, but it has saved
      more foundry hides than any breastplate on the wall.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 2.0
    value: 12
    category: armor

  - id: riveted_belt
    name: Riveted Toolbelt
    description: >-
      A broad belt of doubled leather bristling with iron loops, hooks, and
      riveted pouches. It carries the weight of a working day and cinches down
      tight enough to double as light protection across the waist.
    takeable: true
    tradeable: true
    slot: waist
    wearable: true
    weight: 1.0
    value: 15
    category: armor

  # --- P2.2 Whisperwood: Armor (ranger & forest) ---
  - id: ranger_leather_cuirass
    name: Ranger's Leather Cuirass
    description: >-
      A supple cuirass of oiled greenwood-tanned leather, mottled in browns and
      greys so it fades against bark and shadow. Light enough for a long day's
      walking and quiet enough for the last few steps of a stalk.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 5.0
    value: 45
    category: armor
    quality: fine

  - id: hooded_forest_cloak
    name: Hooded Forest Cloak
    description: >-
      A long cloak of undyed wool, its deep hood lined to break the shape of a
      face in the gloom. Burrs and old pine needles are worked so deep into the
      weave they have become part of the pattern.
    takeable: true
    tradeable: true
    slot: back
    wearable: true
    weight: 2.0
    value: 30
    category: armor
    effects:
      - type: warmth_bonus
        amount: 2

  - id: deerskin_gloves
    name: Deerskin Gloves
    description: >-
      Soft, close-fitting gloves of smoke-tanned deerskin, worn thin at the
      fingertips from bowstrings and buckles. They keep just enough feeling in
      the hands for delicate work on a cold morning.
    takeable: true
    tradeable: true
    slot: hands
    wearable: true
    weight: 0.5
    value: 15
    category: armor

  - id: bark_woven_boots
    name: Bark-Woven Boots
    description: >-
      Odd, sturdy boots with soles of layered bark and uppers of tight-woven
      bast fiber. They shed water, grip wet root and mossy stone, and leave a
      print no city cobbler would recognize.
    takeable: true
    tradeable: true
    slot: feet
    wearable: true
    weight: 1.0
    value: 18
    category: armor

  - id: woven_grass_hat
    name: Wide Woven-Grass Hat
    description: >-
      A broad, conical hat plaited from dried marsh grass, light as a thought
      and wide enough to shed both sun and drizzle. It smells of hay and river
      mud and does nothing at all to stop a blade.
    takeable: true
    tradeable: true
    slot: head
    wearable: true
    weight: 0.3
    value: 6
    category: armor

  - id: leaf_scale_vest
    name: Leaf-Scale Vest
    description: >-
      A curious vest sewn with hundreds of small, lacquered wooden scales,
      overlapping like the leaves of a fern. Fey-work, the forest folk say,
      though it turns a claw or a thorn as well as any tinker's mail.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 4.0
    value: 50
    category: armor
    quality: fine

  # --- P2.2 Port Veridian: Armor (dockside & seagoing) ---
  - id: oilskin_coat
    name: Tarred Oilskin Coat
    description: >-
      A long coat of canvas soaked stiff with oil and tar until it turned near
      waterproof, cracking loudly at every elbow. It stinks of the harbor and
      keeps a body dry through the worst a squall can throw.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 3.0
    value: 35
    category: armor
    effects:
      - type: warmth_bonus
        amount: 3

  - id: sailors_wool_cap
    name: Sailor's Wool Cap
    description: >-
      A snug, close-knit cap of oiled wool, pulled down over the ears against a
      cold watch. It has been darned so many times it is more darn than cap, but
      it has never once let the wet in.
    takeable: true
    tradeable: true
    slot: head
    wearable: true
    weight: 0.3
    value: 8
    category: armor
    effects:
      - type: warmth_bonus
        amount: 1

  - id: dock_workers_boots
    name: Dock Worker's Boots
    description: >-
      Heavy, square-toed boots with iron-shod soles, built to shrug off a
      dropped crate and grip a slick loading plank. The leather is salt-stained
      to the ankle and stiff as a board below it.
    takeable: true
    tradeable: true
    slot: feet
    wearable: true
    weight: 1.5
    value: 15
    category: armor

  - id: salvaged_breastplate
    name: Salvaged Breastplate
    description: >-
      A dented iron breastplate fished from a wreck and hammered roughly back
      into shape, its old owner's crest half worn away by the sea. It patches
      over one shoulder with a plate of a different, brighter metal.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 14.0
    value: 60
    category: armor

  - id: canvas_work_gloves
    name: Canvas Work Gloves
    description: >-
      Stiff sailcloth gloves with leather patches sewn across the palms, meant
      for hauling wet line without flaying your hands to the bone. Cheap,
      ubiquitous, and always drying on some hook near a stove.
    takeable: true
    tradeable: true
    slot: hands
    wearable: true
    weight: 0.4
    value: 6
    category: armor

  - id: storm_hood
    name: Weighted Storm Hood
    description: >-
      A deep hood of doubled oilcloth with a lead-shot hem, so a gale can't tear
      it back off your head. Wearing it, you hear the world as a muffled roar
      and your own breath very close.
    takeable: true
    tradeable: true
    slot: head
    wearable: true
    weight: 0.5
    value: 12
    category: armor
    effects:
      - type: warmth_bonus
        amount: 2

  # --- P2.3 Tools (Cogsworth smithy & foundry) ---
  - id: blacksmith_hammer
    name: Cross-Peen Hammer
    description: >-
      A blacksmith's hammer with a flat face and a wedge-shaped peen, its ash
      handle burnished dark by a working grip. The head rings a clean, true note
      when you tap it against iron — the sound of a tool that has never once
      slipped.
    takeable: true
    tradeable: true
    weight: 3.0
    value: 20
    category: utility

  - id: iron_pickaxe
    name: Iron Pickaxe
    description: >-
      A heavy pickaxe with one pointed end for breaking stone and one chisel end
      for prying it loose. The haft is banded with iron where the head seats, and
      the whole thing smells of rock dust and old sweat.
    takeable: true
    tradeable: true
    weight: 4.0
    value: 25
    category: utility

  - id: steel_shovel
    name: Long-Handled Shovel
    description: >-
      A stout digging shovel with a rolled steel blade and a worn ash shaft. The
      edge has been filed sharp on one side — the mark of someone who has cut a
      lot of roots and expects to cut a lot more.
    takeable: true
    tradeable: true
    weight: 3.5
    value: 18
    category: utility

  - id: pry_bar
    name: Iron Pry Bar
    description: >-
      A four-foot bar of forged iron, flattened and split at one end into a
      goose-neck claw. It opens crates, lifts flagstones, and settles the
      occasional stubborn door that would rather stay shut.
    takeable: true
    tradeable: true
    weight: 2.5
    value: 15
    category: utility

  - id: hand_drill_brace
    name: Brace-and-Bit Hand Drill
    description: >-
      A wooden brace with a sweep handle and a chuck holding a spoon bit, driven
      by the slow, patient crank of a craftsman's arm. It bores a clean hole
      through oak or brass with no need for steam or spark.
    takeable: true
    tradeable: true
    weight: 2.0
    value: 22
    category: utility

  - id: tin_snips
    name: Tin Snips
    description: >-
      A pair of stout, spring-loaded shears with short, hardened jaws, made for
      cutting sheet metal into curves and corners. The handles are wrapped in
      cord where the smith's own grip wore the paint away.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 14
    category: utility

  - id: jewelers_lockpick
    name: Jeweler's Fine Lockpick
    description: >-
      A single, exquisitely thin pick with a turned bone handle, kept in a slip
      of oiled felt. Where a full set brute-forces a lock, this one tool — in the
      right fingers — coaxes it. Cogsworth's finest locksmith made only a few.
    takeable: true
    tradeable: true
    weight: 0.2
    value: 35
    category: utility
    quality: fine

  # --- P2.3 Light sources ---
  - id: pitch_torch
    name: Pitch-Soaked Torch
    description: >-
      A length of hardwood bound at one end with rags soaked in black pitch. Lit,
      it throws a smoky, guttering circle of orange light — enough to walk a dark
      tunnel by, if you don't mind the soot and the smell.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 5
    category: utility
    light: 1

  - id: brass_carry_lantern
    name: Brass Hand Lantern
    description: >-
      A compact brass lantern with a ring handle and four little panes of soot-
      smudged glass, made to hang from a belt or a nail. A twist of the base
      raises the wick; it burns clean and steady where a torch only smokes.
    takeable: true
    tradeable: true
    weight: 2.0
    value: 28
    category: utility
    light: 1
    quality: fine

  - id: beeswax_candle
    name: Beeswax Candle
    description: >-
      A slim, honey-colored candle of pure beeswax, far sweeter-smelling than
      the tallow sort and slow to gutter. It sheds a small, warm light and a
      faint scent of summer hives.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 3
    category: utility
    light: 1

  - id: glowcap_lantern
    name: Glowcap Lantern
    description: >-
      A forester's lantern with no flame at all — just a knot of living
      luminescent fungus sealed behind glass, feeding on a pinch of damp moss.
      It glows a cool, greenish light that never once threatens to set the woods
      alight.
    takeable: true
    tradeable: true
    weight: 1.5
    value: 30
    category: utility
    light: 1
    quality: fine

  - id: pocket_glowstone
    name: Pocket Glowstone
    description: >-
      A river-smoothed pebble that drank the light of the crystal caves and never
      gave it back, shedding a faint blue glimmer from within. Cupped in the hand
      on a black night, it is just bright enough to read a map by.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 20
    category: utility
    light: 1

  # --- P2.3 Containers ---
  - id: leather_backpack
    name: Leather Backpack
    description: >-
      A roomy pack of thick harness leather with two buckled straps and a stiff
      base that keeps its shape. It smells of neatsfoot oil and holds a
      surprising amount without ever quite feeling full.
    takeable: true
    tradeable: true
    weight: 2.0
    value: 25
    category: utility
    capacity: 30.0

  - id: canvas_satchel
    name: Canvas Satchel
    description: >-
      A flat shoulder-satchel of waxed canvas with a single brass buckle, sized
      for papers, tools, and a day's rations. The strap has been shortened and
      re-stitched by at least three different hands.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 15
    category: utility
    capacity: 15.0

  - id: belt_pouch
    name: Drawstring Belt Pouch
    description: >-
      A small leather pouch that cinches shut on a waxed cord and loops onto a
      belt. It carries coins, flint, and the small nameless oddments a traveler
      never wants to be without.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 8
    category: utility
    capacity: 5.0

  - id: foragers_basket
    name: Forager's Basket
    description: >-
      A shallow basket woven from split willow, its handle bound with strips of
      soft bark. Meant for herbs and mushrooms carried loose so they don't
      crush, it still holds the green smell of the last gathering.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 10
    category: utility
    capacity: 12.0

  # --- P2.3 Crafting materials: Cogsworth foundry (metal & mechanism) ---
  - id: iron_ingot
    name: Iron Ingot
    description: >-
      A rough grey bar of pig iron, still bearing the sand-mold's pebbled skin
      and a foundry stamp on one flat. Heavy, plain, and the raw beginning of a
      hundred more finished things.
    takeable: true
    tradeable: true
    weight: 4.0
    value: 12
    category: trade_good

  - id: steel_ingot
    name: Steel Ingot
    description: >-
      A dense, blue-grey billet of crucible steel, its surface ground bright
      enough to catch a smith's approving eye. It costs twice what iron does and
      is worth every extra coin under the hammer.
    takeable: true
    tradeable: true
    weight: 4.0
    value: 20
    category: trade_good

  - id: copper_ingot
    name: Copper Ingot
    description: >-
      A warm, ruddy bar of refined copper, soft enough to dent with a thumbnail.
      It draws into wire, beats into sheet, and alloys into brass — the most
      willing metal on the foundry floor.
    takeable: true
    tradeable: true
    weight: 3.5
    value: 10
    category: trade_good

  - id: brass_ingot
    name: Brass Ingot
    description: >-
      A bright golden bar of cast brass, cool and heavy in the hand. Cogsworth
      runs on the stuff — gears, fittings, lantern frames — and the foundry
      pours it by the crate.
    takeable: true
    tradeable: true
    weight: 3.5
    value: 14
    category: trade_good

  - id: iron_nails_pouch
    name: Pouch of Iron Nails
    description: >-
      A canvas pouch heavy with hand-cut iron nails in a jumble of sizes, from
      tacks to spikes. A few are bent, most are true, and all of them will
      outlast whatever they're driven into.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 4
    category: trade_good

  - id: clockwork_springs
    name: Bundle of Clockwork Springs
    description: >-
      A small bundle of coiled and leaf springs in tempered steel, each one wound
      with a maker's precise tension. Handle them carelessly and one will leap
      from your fingers and be lost forever under the nearest bench.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 8
    category: trade_good

  - id: assorted_gears
    name: Tin of Assorted Gears
    description: >-
      A dented tin rattling with brass and steel gears of every tooth-count,
      sorted by no logic anyone alive can reconstruct. Somewhere in here is
      exactly the cog you need, and finding it is half a tinker's craft.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 10
    category: trade_good

  - id: iron_chain_length
    name: Length of Iron Chain
    description: >-
      A coil of stout iron chain, each link forge-welded and blacked against
      rust. Good for hoisting, hauling, or binding — heavy work that a rope
      would only fray and fail at.
    takeable: true
    tradeable: true
    weight: 3.0
    value: 9
    category: trade_good

  # --- P2.3 Crafting materials: Whisperwood (wood, fiber, crystal) ---
  - id: seasoned_oak_plank
    name: Seasoned Oak Plank
    description: >-
      A hand-planed board of well-dried oak, close-grained and honey-colored,
      free of knots down its whole length. A woodworker would pay fairly for it;
      a fire would be a crime against it.
    takeable: true
    tradeable: true
    weight: 3.0
    value: 6
    category: trade_good

  - id: bundle_of_kindling
    name: Bundle of Kindling
    description: >-
      A faggot of dry twigs and split pine bound with a twist of bark, the sort
      gathered by the armful before a cold night. It smells of resin and catches
      a spark on the first try.
    takeable: true
    tradeable: true
    weight: 2.0
    value: 2
    category: trade_good

  - id: spool_of_flax_thread
    name: Spool of Flax Thread
    description: >-
      A wooden spool wound with strong, waxed flaxen thread, pale gold and faintly
      shining. It mends a torn seam, whips a rope's end, or lashes a fletching —
      a small thing no traveler regrets carrying.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 5
    category: trade_good

  - id: raw_crystal_shard
    name: Raw Crystal Shard
    description: >-
      A rough, unpolished shard of blue-green cavern crystal, cold and faintly
      translucent, with a dull inner spark that has not yet been woken. Cut and
      set, the crystal-cutters say, it might glow like the caverns themselves.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 15
    category: trade_good

  - id: wild_beeswax
    name: Cake of Wild Beeswax
    description: >-
      A knobbled cake of forest beeswax, gold shading to brown, still faintly
      fragrant with honey and smoke. Chandlers render it for candles and
      woodworkers rub it into a finish; either way it is slow, sweet gold.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 4
    category: trade_good

  - id: tanned_hide
    name: Tanned Deer Hide
    description: >-
      A supple, cream-colored hide, scraped and bark-tanned to a soft nap. Folded
      and tied with a thong, it waits to become gloves, a jerkin, or the cover of
      some book not yet written.
    takeable: true
    tradeable: true
    weight: 2.0
    value: 12
    category: trade_good

  - id: sinew_bowstring
    name: Coiled Sinew Bowstring
    description: >-
      A bowstring twisted from dried and pounded deer sinew, waxed and looped at
      both ends, coiled tight in a scrap of leather. It draws hard and true and
      shrugs off the damp far better than any gut string.
    takeable: true
    tradeable: true
    weight: 0.1
    value: 6
    category: trade_good

  # --- P2.3 Crafting materials: Port Veridian (cordage & salvage) ---
  - id: coil_of_tarred_twine
    name: Coil of Tarred Twine
    description: >-
      A tidy coil of thin, tarred marline, black and sticky and impossibly
      strong for its width. Sailors whip it round rope-ends and seize blocks
      with it; ashore, it binds anything that must not come loose.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 4
    category: trade_good

  - id: iron_boat_chain
    name: Heavy Mooring Chain
    description: >-
      A short run of massive galvanized chain, each link as thick as a thumb and
      crusted with old salt. It once held a hull against a running tide and would
      gladly do so again, given a bollard and a strong back.
    takeable: true
    tradeable: true
    weight: 5.0
    value: 12
    category: trade_good

  # --- P2.4 Potions & remedies (consumable via `drink`/`quaff`; healing
  #     potions restore the `hp` meter, buff potions apply a timed EffectDef
  #     registered by the `consumables` feature — see docs/inventory_equipment.md).
  #     Flavor-only remedies below (luckwater, antidote) have no engine effect
  #     yet: there is no luck stat or status-ailment system to key them to. ---
  - id: minor_healing_draught
    name: Minor Healing Draught
    description: >-
      A small vial of rose-colored liquid, corked and sealed with a dab of green
      wax. It smells of crushed herbs and honey, and warms the hand faintly
      through the glass — a field remedy for cuts and bruises.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 20
    category: drink
    effects:
      - type: heal
        meter: hp
        amount: 15
        message: The warmth spreads through you and the worst of your hurts ease.

  - id: healing_tonic
    name: Healing Tonic
    description: >-
      A stoppered flask of deep amber tonic, thick as syrup and bitter on the
      nose. A physician's proper draught, brewed to knit a real wound rather than
      merely take the sting from a scrape.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 40
    category: drink
    quality: fine
    effects:
      - type: heal
        meter: hp
        amount: 40
        message: A deep, knitting warmth closes your wounds.

  - id: major_healing_elixir
    name: Major Healing Elixir
    description: >-
      A heavy crystal phial of luminous crimson elixir that seems to hold a
      slow, coiling light of its own. Rare and dearly bought, it is the sort of
      thing kept for the night everything goes wrong.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 90
    category: drink
    quality: superior
    effects:
      - type: heal
        meter: hp
        amount: 80
        message: Radiant heat floods your body and your wounds seal over.

  - id: stamina_restorative
    name: Stamina Restorative
    description: >-
      A fizzing green cordial that smells sharply of mint and citrus peel. A
      mouthful is said to chase the ache from tired legs and put a second wind
      into a long day's march.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 15
    category: drink
    effects:
      - type: heal
        meter: fatigue
        amount: 40
        message: A second wind chases the ache from your legs.

  - id: clarity_philter
    name: Philter of Clarity
    description: >-
      A vial of pale, faintly silver liquid, so clear it seems to sharpen the
      light passing through it. Scholars swear a sip cuts through mental fog,
      though physicians only raise an eyebrow at the claim.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 30
    category: drink
    quality: fine
    effects:
      - type: apply_effect
        effect_key: keen_minded
        duration_ticks: 60
        payload:
          amount: 2
        message: The fog lifts from your mind and your senses sharpen.

  - id: draught_of_vigor
    name: Draught of Vigor
    description: >-
      A muddy red draught that smells of iron and raw spirits, sold with a wink
      and a warning. The taverns claim it puts fire in the arm; the healers
      claim it mostly puts a fool on the floor.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 30
    category: drink
    effects:
      - type: apply_effect
        effect_key: fortified
        duration_ticks: 60
        payload:
          amount: 2
        message: Fire runs through your arms; you feel suddenly strong.

  - id: luckwater_vial
    name: Vial of Luckwater
    description: >-
      A tiny bottle of water dipped, they say, from a spring on the night of a
      full moon, with a single silver hair coiled inside. Whether it brings
      fortune or only the belief in it, buyers rarely complain either way.
    takeable: true
    tradeable: true
    weight: 0.2
    value: 25
    category: drink
    quality: fine

  - id: antidote_phial
    name: Antidote Phial
    description: >-
      A slim phial of chalky white suspension that must be shaken before use, its
      cork banded with a warning stripe of red. A broad remedy against the
      common poisons a traveler is unlucky enough to meet.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 18
    category: drink

  - id: nightshade_poison
    name: Phial of Nightshade Extract
    description: >-
      A squat black bottle sealed with wax and marked with a crude skull, its
      contents a dark, oily distillate of deadly nightshade. Purely a curiosity
      here — a grim souvenir, not a thing anyone sensible would open.
    takeable: true
    tradeable: true
    weight: 0.2
    value: 15
    category: trade_good

  # --- P2.4 Food ---
  - id: crusty_loaf
    name: Crusty Bread Loaf
    description: >-
      A round loaf with a dark, blistered crust that shatters at a squeeze and a
      soft, warm crumb within. Still faintly steaming, it fills the air around it
      with the plain, perfect smell of a baker's morning.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 3
    category: food

  - id: wheel_of_cheese
    name: Wheel of Farmhouse Cheese
    description: >-
      A small waxed wheel of hard yellow cheese, firm and crumbling and sharp
      enough to make the tongue tingle. Cut a wedge and it keeps for weeks; a
      traveler's staple that never quite gets boring.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 6
    category: food

  - id: basket_of_apples
    name: Basket of Apples
    description: >-
      A little basket of small, russet-skinned apples, tart and crisp and
      speckled with the odd bruise. They rattle pleasantly when carried and
      vanish faster than anyone means them to.
    takeable: true
    tradeable: true
    weight: 1.5
    value: 5
    category: food

  - id: smoked_sausage
    name: Smoked Sausage
    description: >-
      A coil of dark, hard-smoked sausage on a loop of string, glistening with
      fat and flecked with pepper. It keeps without spoiling and rewards a slow
      chew with a deep, smoky richness.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 4
    category: food

  - id: venison_stew_bowl
    name: Bowl of Venison Stew
    description: >-
      A wooden bowl of thick, dark stew, chunks of forest venison falling apart
      among roots and wild onion. It steams richly and tastes of woodsmoke and a
      long, cold day's hunting well ended.
    takeable: true
    tradeable: true
    weight: 0.6
    value: 5
    category: food

  - id: forest_berries
    name: Handful of Forest Berries
    description: >-
      A double handful of ripe wild berries — blackberry, whortleberry, a few
      scarlet ones no one can name — carried in a twist of broad leaf. Sweet,
      sharp, and staining everything they touch a cheerful purple.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 3
    category: food

  - id: honeycomb
    name: Piece of Wild Honeycomb
    description: >-
      A dripping golden slab of wild honeycomb, its wax cells heavy with dark
      forest honey. Sticky beyond all reason and worth every bit of the mess,
      it tastes of a hundred summer flowers at once.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 6
    category: food

  # --- P2.4 Drink ---
  - id: flask_of_spring_water
    name: Flask of Spring Water
    description: >-
      A battered tin flask of cold, clean water drawn from a hill spring, still
      tasting faintly of stone and moss. Unglamorous and entirely essential on
      any road longer than an afternoon.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 1
    category: drink

  - id: tankard_of_ale
    name: Tankard of Brown Ale
    description: >-
      A dented pewter tankard brimming with dark, nutty brown ale, a finger of
      foam clinging to the rim. Honest tavern stuff — not fine, but exactly what
      a tired traveler's throat is asking for.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 3
    category: drink

  - id: bottle_of_wine
    name: Bottle of Red Wine
    description: >-
      A dusty green bottle of dark valley red, the cork sound and the label long
      since soaked away. Whatever vintage it is, it has been waiting patiently
      in some cellar for a reason to be opened.
    takeable: true
    tradeable: true
    weight: 0.8
    value: 10
    category: drink

  - id: hot_cider
    name: Mug of Hot Spiced Cider
    description: >-
      A clay mug of steaming apple cider, mulled with clove and a broken cinnamon
      stick still bobbing in it. It scalds the fingers pleasantly and drives the
      cold clean out of a body in three swallows.
    takeable: true
    tradeable: true
    weight: 0.5
    value: 4
    category: drink

  # --- P2.5 Trait-wearables (grant_trait surfaces in `score`/`traits` while
  #     equipped; the trait names below have no pre-registered TraitDef, so they
  #     display by name with an empty description — expected, see roadmap P2.5) ---
  - id: blessed_amulet
    name: Blessed Amulet
    description: >-
      A worn silver medallion on a fine chain, its face bearing a sun-in-splendor
      device rubbed nearly smooth by generations of thumbs. It is faintly warm
      even on the coldest morning, as though something kind still watches through
      it.
    takeable: true
    tradeable: true
    slot: neck
    wearable: true
    weight: 0.2
    value: 60
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Blessed

  - id: scholars_robes
    name: Scholar's Robes of Insight
    description: >-
      Heavy robes of midnight wool, the deep hood and long sleeves stitched with
      constellations in faded silver thread. To wear them is to feel the quiet
      weight of every scholar who wore them before and left a little of their
      learning behind.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 2.0
    value: 55
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Learned

  - id: rogues_cloak
    name: Rogue's Shadowed Cloak
    description: >-
      A cloak of dark, matte cloth that seems to drink the lamplight rather than
      reflect it, its hem weighted so it never flares to catch an eye. Wrapped
      in it, you find yourself instinctively stepping where the shadows are
      deepest.
    takeable: true
    tradeable: true
    slot: back
    wearable: true
    weight: 1.5
    value: 55
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Stealthy

  - id: rangers_boots
    name: Ranger's Swift Boots
    description: >-
      Soft, high-laced boots of supple green leather, their soles worn thin and
      silent from a lifetime of trails. They seem to find the sure step on their
      own, carrying a walker faster and quieter than boots have any right to.
    takeable: true
    tradeable: true
    slot: feet
    wearable: true
    weight: 1.0
    value: 55
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Swift

  - id: sailors_ring
    name: Sailor's Seaworthy Ring
    description: >-
      A heavy ring of tarnished sea-silver set with a chip of blue-green glass,
      carved on the inner band with a line of soundings only its wearer can
      read. Old salts swear it keeps a body sure-footed on a heaving deck.
    takeable: true
    tradeable: true
    slot: finger
    wearable: true
    weight: 0.1
    value: 50
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Seaworthy

  - id: artificers_gloves
    name: Artificer's Fine Gloves
    description: >-
      Close-fitting gloves of thin kidskin with brass thimble-caps sewn over each
      fingertip, worn shiny at the joints. They lend the hands an uncanny,
      unhurried steadiness — the sort a watchmaker would trade a year's wages for.
    takeable: true
    tradeable: true
    slot: hands
    wearable: true
    weight: 0.5
    value: 65
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Precise
      - type: skill_bonus
        skill: tinkering
        amount: 1

  - id: fey_touched_cloak
    name: Fey-Touched Cloak
    description: >-
      A cloak woven of some grey-green fiber that shifts colour like leaf-shadow
      when you move, hemmed with tiny brass bells that never seem to ring. The
      forest folk left it, they say, for one who did them an unremembered
      kindness.
    takeable: true
    tradeable: true
    slot: back
    wearable: true
    weight: 1.0
    value: 60
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Fey-Touched

  - id: crown_of_focus
    name: Circlet of Focus
    description: >-
      A slender circlet of woven brass wire with a single small lens of ground
      quartz set at the brow. Worn, it lends the thoughts a cool, narrow clarity,
      as though the whole clamouring world had politely agreed to wait its turn.
    takeable: true
    tradeable: true
    slot: head
    wearable: true
    weight: 0.5
    value: 55
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Focused
      - type: stat_bonus
        stat: intellect
        amount: 1

  - id: warden_signet
    name: Warden's Signet
    description: >-
      A broad iron signet ring stamped with the sigil of an old forest wardenry,
      the device a spread oak over crossed arrows. It sits heavy on the hand and
      carries the quiet authority of a charge kept faithfully for a very long
      time.
    takeable: true
    tradeable: true
    slot: finger
    wearable: true
    weight: 0.1
    value: 50
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Warden

  - id: tideglass_pendant
    name: Tideglass Pendant
    description: >-
      A teardrop of pale, wave-worn glass wound in silver wire and hung on a cord
      of braided sinew. Held to the ear, some swear, it carries the far hush of
      surf; worn, it settles the stomach against the worst of a swell.
    takeable: true
    tradeable: true
    slot: neck
    wearable: true
    weight: 0.2
    value: 45
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Tidebound

  - id: forgemasters_bracer
    name: Forgemaster's Bracer
    description: >-
      A single broad bracer of blackened, heat-scarred leather riveted with
      brass, made to guard a smith's forearm from spark and slag. Buckled on, it
      lends a stubborn, anvil-steady resolve — and shrugs off a good deal of heat
      besides.
    takeable: true
    tradeable: true
    slot: hands
    wearable: true
    weight: 1.0
    value: 55
    category: armor
    quality: fine
    effects:
      - type: grant_trait
        trait: Ironhide
      - type: warmth_bonus
        amount: 2

  # --- P2.6 Keys (each opens a new locked exit added this pass) ---
  - id: archive_vault_key
    name: Archive Master-Key
    description: >-
      A long, elaborately warded key of dark iron, its bow cast as the Academy's
      open-book sigil. It opens the spiral stair to the Restricted Archive above
      the library — a key the Headmaster does not lend lightly.
    takeable: true
    tradeable: false
    weight: 0.2
    value: 0

  - id: foundry_strongroom_key
    name: Strongroom Key
    description: >-
      A blunt, heavy key of blackened steel, its teeth cut deep and its shaft
      warm from the foundry air. It throws the great bolt on the strongroom's
      vault door, down past the furnaces where the finished metal is kept.
    takeable: true
    tradeable: false
    weight: 0.3
    value: 0

  - id: bonded_store_key
    name: Customs Seal Key
    description: >-
      A stubby brass key threaded onto a loop of red-waxed cord and stamped with
      the harbormaster's mark. It breaks the seal on the bonded store where
      dutiable cargo waits, and losing it is a matter for the magistrate.
    takeable: true
    tradeable: false
    weight: 0.1
    value: 0

  - id: hollow_oak_key
    name: Root-Iron Key
    description: >-
      A small, curiously soft key that seems grown rather than forged, its metal
      threaded through with a living green root. It fits the concealed door in
      the old dead oak, where the forest keeps what it does not wish found.
    takeable: true
    tradeable: false
    weight: 0.1
    value: 0

  # --- P2.6 Puzzle items ---
  - id: bronze_idol
    name: Weathered Bronze Idol
    description: >-
      A palm-sized idol of green-patinaed bronze, worn to a suggestion of a
      hooded figure with its hands cupped before it. It is heavier than its size
      admits, and its empty cupped hands seem to be waiting for something — or to
      be set somewhere they belong.
    takeable: true
    tradeable: true
    weight: 1.0
    value: 30
    quality: fine
    usable_with:
      - idol_alcove
    combination_side_effects:
      idol_alcove:
        set_flags: [bronze_idol_placed]
        narrate_room: >-
          The idol settles into the alcove with a soft grind of stone on stone,
          and for a moment the standing stones seem to lean fractionally inward,
          as if in acknowledgement.

  - id: idol_alcove
    name: Standing-Stone Alcove
    description: >-
      A niche cut into the base of the tallest standing stone, empty but shaped
      precisely to cradle something small and heavy. The worn stone around it is
      polished by generations of hands, and a faint spiral is incised above the
      hollow.
    takeable: false
    tradeable: false
    weight: 0.0

  - id: carved_bone_tablet
    name: Carved Bone Tablet
    description: >-
      A flat oblong of yellowed bone incised on both faces with dense, spiralling
      script, some of it worn shallow by handling. No scholar in Cogsworth has
      read it, though several have gone grey trying. It hums, very faintly,
      against the palm.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 35
    quality: fine

  # --- P2.6 Lore items (pure flavor; no mechanical use) ---
  - id: dockmasters_diary
    name: Dockmaster's Diary
    description: >-
      A salt-swollen little book crammed with tide tables, cargo tallies, and the
      occasional bitter aside about a captain who never paid. The last dozen pages
      are blank, and the second-to-last simply reads: "gone out on the ebb."
    takeable: true
    tradeable: true
    weight: 0.4
    value: 10

  - id: faded_sea_chart
    name: Faded Sea Chart
    description: >-
      A rolled chart of the coast, its ink browned and its creases worn to holes.
      Soundings and shoals are marked in a careful hand, and one cove far to the
      south is ringed twice in red, with no explanation given.
    takeable: true
    tradeable: true
    weight: 0.2
    value: 15

  - id: ancient_veridian_coin
    name: Ancient Veridian Coin
    description: >-
      A thick, off-round coin of tarnished silver, stamped with a ship under full
      sail and a legend in a script the port no longer uses. It predates the
      current harbor by centuries, and turns up now and then in the tide-wrack,
      bright and strange.
    takeable: true
    tradeable: true
    weight: 0.1
    value: 25
    quality: fine

  - id: foundrymasters_ledger
    name: Foundrymaster's Ledger
    description: >-
      A soot-smudged ledger bound in scorched leather, its columns recording
      pours, alloys, and tempers in a cramped, exacting hand. Every few pages a
      note is struck through hard enough to tear the paper, beside a single word:
      "flawed."
    takeable: true
    tradeable: true
    weight: 0.5
    value: 12

  - id: hermits_field_journal
    name: Hermit's Field Journal
    description: >-
      A twine-bound journal swollen with pressed leaves, charcoal sketches of
      birds, and long observations on the forest's moods. The final entries grow
      stranger — notes on lights among the stones, and a drawing of cupped bronze
      hands.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 10

  # --- P3.2 quest material ---
  - id: brass_shavings
    name: Twist of Brass Shavings
    description: >-
      A greasy paper twist packed with curls of bright brass, swept up from
      beneath a smithy lathe. Fine enough to repack a worn bearing, sharp enough
      to prick a careless thumb. It smells of hot metal and machine oil.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 6
    category: trade_good

# ---------------------------------------------------------------------------
# Room Items — where things are placed at world start
# ---------------------------------------------------------------------------

  # --- Ashmoore Graveyard: tombstones, relics, and funeral gear ---
  - id: paupers_tombstone
    name: Pauper's Tombstone
    aliases: [tombstone, grave, marker, slate]
    description: >-
      A narrow slate marker with a name scratched so shallowly that rain has
      nearly erased it. The earth before it is split by several pale knuckles of
      root, or perhaps by knuckles of another kind.
    takeable: false
    tradeable: false
    context_commands:
      read:
        aliases: [study]
        help: read the pauper's worn tombstone
        say: >-
          You trace the shallow letters: "Edrin Vale, who owed nothing at the end."
          Under the name someone later carved, "Count the bells before midnight."
        side_effects:
          start_quest: graveyard_count_the_bells
          set_flags: ["graveyard:read_pauper_stone"]
      disturb:
        aliases: [tap, knock]
        help: disturb the pauper's grave marker
        say: >-
          The tombstone rocks once. Soil trickles into the sunken grave, and
          something below answers with a patient scrape.
        side_effects:
          set_flags: ["graveyard:disturbed_pauper_stone"]

  - id: varrow_tombstone
    name: Varrow Family Tombstone
    aliases: [tombstone, grave, varrow, marker]
    description: >-
      A black marble marker for the Varrow family, expensive once and resentful
      still. Its inscription is inlaid with tarnished brass, and every birthdate
      has been amended by a later, shakier hand.
    takeable: false
    tradeable: false
    context_commands:
      read:
        aliases: [study]
        help: read the Varrow family tombstone
        say: >-
          The Varrow epitaph promises silence, dignity, and perpetual rest. The
          fresh crack through the word "perpetual" seems pointed.
        side_effects:
          start_quest: graveyard_silence_varrow
          set_flags: ["graveyard:read_varrow_stone"]

  - id: bellfinger_tombstone
    name: Bellfinger Tombstone
    aliases: [tombstone, grave, bell, marker]
    description: >-
      This marker has no name at all, only six tiny bells tied through holes in
      the stone with black thread. Each clapper is carved from a finger bone.
    takeable: false
    tradeable: false
    context_commands:
      read:
        aliases: [listen]
        help: listen to the bellfinger tombstone
        say: >-
          You lean close. The smallest bell rings once inside your skull, and a
          whisper says, "Find the hand that rang us."
        side_effects:
          start_quest: graveyard_find_the_hand
          set_flags: ["graveyard:heard_bellfinger"]

  - id: grave_bell_clapper
    name: Grave-Bell Clapper
    description: >-
      A tiny bell clapper carved from polished bone and drilled through with
      impossible precision. It is cold enough to numb your fingertips.
    takeable: true
    tradeable: false
    weight: 0.1
    value: 6
    category: trade_good

  - id: cracked_funeral_mask
    name: Cracked Funeral Mask
    description: >-
      A thin ceramic mask painted with closed eyes and a peaceful mouth. The
      crack across it gives the expression a worrying second meaning.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 18
    category: trade_good

  - id: bone_lantern
    name: Bone Lantern
    description: >-
      A little lantern made from white ribs wired around smoked glass. Its blue
      flame burns without heat and makes nearby shadows look as if they are
      remembering their owners.
    takeable: true
    tradeable: true
    slot: main_hand
    weight: 1.2
    value: 34
    category: utility
    light: 1
    quality: fine

  - id: grave_wardens_coat
    name: Grave-Warden's Coat
    description: >-
      A long black coat of waxed canvas, reinforced at shoulder and cuff with
      old funeral brass. The inside pockets are sized for chalk, prayer-cords,
      and a knife narrow enough to slip between coffin boards.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 3.2
    value: 52
    category: armor
    quality: fine

  - id: ossuary_keyring
    name: Ossuary Keyring
    description: >-
      A ring of little iron keys, each labeled with a bone-shaped tag and a
      number that no longer matches any door you can find.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 22
    category: trade_good

  # --- Brass Vaults: steampunk machinery, wearables, and quest objects ---
  - id: aether_lantern
    name: Aether Lantern
    description: >-
      A hexagonal brass lantern holding a bead of blue-white vapor inside a
      magnetized glass cage. It hums softly when carried and throws a clean,
      cold light that makes soot and copper shine.
    takeable: true
    tradeable: true
    slot: main_hand
    weight: 1.4
    value: 46
    category: utility
    light: 1
    quality: fine

  - id: smoked_glass_goggles
    name: Smoked-Glass Goggles
    description: >-
      Brass-rimmed goggles with smoked lenses, side shields, and a tiny focusing
      gear above each brow. They make the world look older, sharper, and more
      likely to explode.
    takeable: true
    tradeable: true
    slot: head
    wearable: true
    weight: 0.5
    value: 38
    category: armor
    quality: fine

  - id: pressure_engineers_coat
    name: Pressure Engineer's Coat
    description: >-
      A dark brown leather coat crossed by brass buckles, copper grounding
      braid, and pockets sized for gauges, valves, and emergency biscuits. The
      sleeves are scorched but carefully patched.
    takeable: true
    tradeable: true
    slot: torso
    wearable: true
    weight: 3.6
    value: 78
    category: armor
    quality: fine

  - id: gearlace_gloves
    name: Gearlace Gloves
    description: >-
      Thin black gloves stitched with copper thread and little gear teeth along
      the knuckles. They grip slick brass well and leave faint oil-smudged
      fingerprints shaped like clock faces.
    takeable: true
    tradeable: true
    slot: hands
    wearable: true
    weight: 0.4
    value: 42
    category: armor
    quality: fine

  - id: regulator_boots
    name: Regulator Boots
    description: >-
      Heavy boots with iron soles and spring-loaded heels meant for catwalks,
      wet tile, and sudden pressure drops. Each step lands with a decisive
      engineer's clack.
    takeable: true
    tradeable: true
    slot: feet
    wearable: true
    weight: 2.2
    value: 48
    category: armor
    quality: fine

  - id: springwound_cane
    name: Springwound Cane
    description: >-
      A gentleman's cane of blackwood and brass. The grip winds with a ratchet,
      storing a sharp mechanical snap that could prod a stuck gear or ruin a
      footpad's afternoon.
    takeable: true
    tradeable: true
    slot: main_hand
    weight: 1.1
    value: 54
    category: weapon
    quality: fine

  - id: pressure_gauge
    name: Calibrated Pressure Gauge
    description: >-
      A round brass gauge with a porcelain face, a red danger band, and a needle
      that quivers whenever anyone nearby lies about maintenance.
    takeable: true
    tradeable: true
    weight: 0.8
    value: 24
    category: trade_good

  - id: punched_ticket_roll
    name: Punched Ticket Roll
    description: >-
      A roll of green paper tickets, each punched with a different fare code and
      destination glyph. The ink still smells fresh.
    takeable: true
    tradeable: true
    weight: 0.3
    value: 12
    category: trade_good

  - id: tram_manifest
    name: Pneumatic Tram Manifest
    description: >-
      A stiff card listing capsule times, valve numbers, and handwritten warnings
      about unauthorized cargo, singing boilers, and one missing inspector.
    takeable: true
    tradeable: false
    weight: 0.2
    value: 15
    category: trade_good

  - id: regulator_seal
    name: Regulator Seal
    description: >-
      A brass seal stamped with the buried district's civic crest: a key, a
      kettle, and a clock face all sharing one stern expression.
    takeable: true
    tradeable: false
    weight: 0.2
    value: 20
    category: trade_good

  - id: aetheric_coil
    name: Aetheric Coil
    description: >-
      A tight helix of copper and blue ceramic. It prickles against your palm
      like bottled lightning trying to remember the weather.
    takeable: true
    tradeable: true
    weight: 0.7
    value: 36
    category: trade_good
    quality: fine

  - id: soot_filter
    name: Soot Filter
    description: >-
      A blackened mesh cartridge framed in brass and packed with gray fiber. It
      smells of smoke, hot rain, and machinery breathing through bad lungs.
    takeable: true
    tradeable: true
    weight: 0.9
    value: 16
    category: trade_good

  - id: clockwork_songbird
    name: Clockwork Songbird
    description: >-
      A palm-sized bird of brass feathers, ruby glass eyes, and a spring no
      larger than a thumbnail. It clicks twice when handled, then sings one
      perfect, melancholy note.
    takeable: true
    tradeable: true
    weight: 0.4
    value: 60
    category: trade_good
    quality: superior

  - id: observatory_lens
    name: Observatory Lens
    description: >-
      A thick crystal lens in a copper retaining ring. Look through it and
      ordinary stone shows faint veins of water, root, and buried metal.
    takeable: true
    tradeable: false
    weight: 1.0
    value: 40
    category: trade_good

  - id: boiler_sigil
    name: Boiler Sigil
    description: >-
      A stamped brass charm wired to a strip of red leather. Boiler crews wore
      these when entering pressure galleries and touched them before opening a
      hot valve.
    takeable: true
    tradeable: true
    weight: 0.2
    value: 18
    category: trade_good

  - id: sump_valve_wheel
    name: Sump Valve Wheel
    description: >-
      A small red valve wheel cracked loose from a drainage manifold. It is
      tagged with the number seven and still damp with warm black water.
    takeable: true
    tradeable: true
    weight: 1.3
    value: 14
    category: trade_good

