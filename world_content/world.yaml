dialogue_trees:
  - id: innkeeper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Welcome to the Wandering Crow! What can I do for you?
        side_effects: {}
        choices:
          - label: Any news around town?
            next_node: town_news
          # Moon-gated lore beat (Sprint 54): visible only under a full moon
          # via the celestial feature's moon_phase_is dialogue condition.
          - label: The moon is full tonight. Does the creek really change with it?
            moon_phase_is: full
            next_node: moon_lore
          # Interaction-ability unlock (Sprint 74.7, flavor C): this persuasion
          # option only appears once the `silver_tongue` skill-tree node is
          # trained, which sets `ability.silver_tongue`. Pure data — the gate is
          # the already-shipped `actor_has_flag` dialogue condition, no engine code.
          - label: (Silver Tongue) Surely a woman who hears everything has a room's
              worth of secrets to trade.
            actor_has_flag: [ability.silver_tongue]
            next_node: silver_tongue_confidence
          - label: Nothing, thanks.
            side_effects:
              end_dialogue: true
      silver_tongue_confidence:
        text: >-
          Mira laughs, low and appraising. "Smooth. Most just ask." She leans in.
          "There's a strongbox under the third floorboard past the cellar stair —
          not mine, and the man it belongs to won't be back. You didn't hear it
          from me."
        side_effects:
          set_flags:
            - lore:mira_strongbox
        choices:
          - label: A pleasure doing business.
            side_effects:
              end_dialogue: true
      moon_lore:
        text: >-
          Mira lowers her voice. "Full moon pulls the water hard. At low
          water there's a path of stones below the creek crossing — leads
          out to a little islet. The creek leaves things there. Mind the
          rise coming back; the stones drown quick."
        side_effects:
          set_flags:
            - lore:moonlit_tides
        choices:
          - label: I'll have a look. Thank you, Mira.
            side_effects:
              end_dialogue: true
      town_news:
        text: >-
          Strange lights have been seen near the market stalls at night.
          Nobody dares investigate.
        side_effects:
          set_flags:
            - heard_rumor
          start_quest: investigate_lights
        choices:
          - label: I'll look into it.
            next_node: farewell_quest
          - label: Sounds dangerous. Goodbye.
            side_effects:
              end_dialogue: true
      farewell_quest:
        text: Be careful out there. Come back safe.
        side_effects:
          end_dialogue: true
        choices: []

  # --- Ashmoore shopkeepers ---
  - id: ashmoore_apothecary_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Pella Wren measures a pinch of blue powder on a brass scale without
          looking up. "Remedy, restorative, or something to keep your hands
          steady? Name the trouble and I'll tell you what it costs."
        side_effects: {}
        choices:
          - label: What do you keep behind the counter?
            next_node: stock
          - label: Any advice for the road?
            next_node: advice
          - label: Not today.
            side_effects:
              end_dialogue: true
      stock:
        text: >-
          "Field draughts for small hurts, tonics for worse ones, stamina cordial
          for long roads, and a few stranger bottles for those who insist on
          learning lessons chemically."
        side_effects: {}
        choices:
          - label: I'll look over the bottles.
            side_effects:
              end_dialogue: true
      advice:
        text: >-
          "Do not drink anything because it glows prettily. Do not ignore a cut
          that feels cold. And do not ask the forest for mercy when a candle
          would have done."
        side_effects: {}
        choices:
          - label: Practical enough. Thank you.
            side_effects:
              end_dialogue: true

  - id: ashmoore_smith_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Harl Venn wipes soot from his palms with a rag that gave up long ago.
          "Tools on the left, sharp things on the right, and armor wherever it
          fits without falling on a child. What are you after?"
        side_effects: {}
        choices:
          - label: What do you recommend for leaving town?
            next_node: road_gear
          - label: Do you buy old steel?
            next_node: buys
          - label: Just keeping warm by the forge.
            side_effects:
              end_dialogue: true
      road_gear:
        text: >-
          "Knife first. Spear if you can carry one without poking a friend.
          Padded jack if you've got the coin. Pride weighs less than armor and
          protects worse."
        side_effects: {}
        choices:
          - label: I'll see what is on the rack.
            side_effects:
              end_dialogue: true
      buys:
        text: >-
          "Weapons, armor, useful metal, and tools with life left in them. I
          don't pay for rust unless it is still attached to a story."
        side_effects: {}
        choices:
          - label: Fair.
            side_effects:
              end_dialogue: true

  - id: cora_vale_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Cora Vale taps a pencil against her ledger, already counting the mud on
          your boots as evidence of future purchases. "If it keeps a person fed,
          dry, lit, or less lost, it probably has a shelf here."
        side_effects: {}
        choices:
          - label: What sells fastest?
            next_node: staples
          - label: Do you buy odds and ends?
            next_node: buys
          - label: I'll browse.
            side_effects:
              end_dialogue: true
      staples:
        text: >-
          "Torches before sundown, candles after rain, pouches after market day,
          and backpacks whenever someone decides they are the sort of fool who
          needs both hands free."
        side_effects: {}
        choices:
          - label: Sounds like my kind of fool.
            side_effects:
              end_dialogue: true
      buys:
        text: >-
          "Clean trade goods, serviceable tools, trail food if it has not already
          become an experiment. Bring me curios and I'll price them honestly;
          bring me junk and I'll price them more honestly."
        side_effects: {}
        choices:
          - label: I'll keep that in mind.
            side_effects:
              end_dialogue: true

  - id: lysa_hearthloaf_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Lysa Hearthloaf slides a tray from the oven and closes the iron door
          with one practiced hip. "Bread now, cider hot, apples honest, cheese
          sharp enough to answer back. Eat before the road teaches you manners."
        side_effects: {}
        choices:
          - label: What is fresh?
            next_node: fresh
          - label: What travels best?
            next_node: travel_food
          - label: Maybe later.
            side_effects:
              end_dialogue: true
      fresh:
        text: >-
          "Loaves this hour, cider since dawn, stew if Mira hasn't bought the
          last pot for the inn. The apples are from north slope trees and better
          than they look."
        side_effects: {}
        choices:
          - label: I'll take a look.
            side_effects:
              end_dialogue: true
      travel_food:
        text: >-
          "Cheese, sausage, apples, water. A stew bowl tastes better, but it
          makes a poor companion in a pack."
        side_effects: {}
        choices:
          - label: Sensible.
            side_effects:
              end_dialogue: true

  # --- Cogsworth NPCs ---
  - id: clockmaster_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The tower keeps Cogsworth on time. A responsibility that admits no error.
          What brings you to the clockworks?
        side_effects: {}
        choices:
          - label: Tell me about the tower.
            next_node: tower_lore
          - label: Can I help with maintenance?
            actor_lacks_flag: [tower_bearing_repaired]
            next_node: maintenance_quest
          - label: The eastern bearing is repacked.
            actor_has_flag: [tower_bearing_repaired]
            next_node: bearing_thanks
          - label: Just looking around.
            side_effects:
              end_dialogue: true
      tower_lore:
        text: >-
          This tower has marked the hours for three centuries without fail. Every gear,
          every escapement, every balance wheel is a work of precision. The mechanism is
          alive in its own way—it breathes with steam and speaks in ticks.
        side_effects: {}
        choices:
          - label: That's fascinating.
            side_effects:
              end_dialogue: true
      maintenance_quest:
        text: >-
          The eastern bearing is wearing thin. If you can bring me brass shavings from
          the smithy district, I can repack the bearing properly. It's dangerous work if
          the tower stops.
        side_effects:
          start_quest: repair_tower_bearing
        choices:
          - label: I'll find those shavings for you.
            next_node: quest_accepted
          - label: That sounds risky. Never mind.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: Good. The smiths always have shavings. Return here when you have them.
        side_effects:
          end_dialogue: true
      bearing_thanks:
        text: >-
          Grimlock takes the brass twist, weighs it in his palm, and gives a
          single, satisfied nod. "Packed true. The tower will keep its time for
          another decade on this. Take the watch—it's set to the tower's own beat.
          A Clockmaster does not forget a debt of punctuality."
        side_effects: {}
        choices:
          - label: The tower's in good hands. Farewell.
            side_effects:
              end_dialogue: true

  - id: blacksmith_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          You've got an eye for good steel, or you wouldn't be here. What can I forge for you?
        side_effects: {}
        choices:
          - label: Show me your wares.
            next_node: browse_shop
          - label: Do you take commissions?
            next_node: commission_work
          - label: I can bring you rare materials. Interested?
            actor_lacks_flag: [thorne_commission_done]
            next_node: rare_commission
          - label: I brought that crystal you wanted.
            actor_has_flag: [thorne_commission_done]
            next_node: rare_commission_thanks
          - label: Just browsing.
            side_effects:
              end_dialogue: true
      browse_shop:
        text: >-
          I've got iron, steel, and a few pieces I'm particularly proud of. Everything
          here can take an edge sharp enough to split hairs. Fair prices too.
        side_effects: {}
        choices:
          - label: I'll look around.
            side_effects:
              end_dialogue: true
      commission_work:
        text: >-
          I take commissions for special work. Bring me rare materials and coin, and
          I'll craft something that'll outlast you. That's the Cogsworth promise.
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true
      rare_commission:
        text: >-
          Thorne sets down his hammer and looks you dead in the eye. "There's one
          thing I've never had enough of—raw crystal, the kind that grows wild in
          the caverns under Whisperwood. Bring me a shard, unbroken, and I'll forge
          you a bracer that laughs at a smith's fire. Deal?"
        side_effects:
          start_quest: thornes_rare_commission
        choices:
          - label: I'll bring you a crystal shard.
            side_effects:
              end_dialogue: true
          - label: Not worth the trip.
            side_effects:
              end_dialogue: true
      rare_commission_thanks:
        text: >-
          "Look at that." Thorne holds the shard to the forge-light, and for a
          moment his soot-black face glows crystal-blue. "Wear the bracer with my
          compliments. Cogsworth steel and cavern crystal—nothing you'll meet out
          there is forged half so well."
        side_effects: {}
        choices:
          - label: My thanks, Thorne.
            side_effects:
              end_dialogue: true

  - id: dealer_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Everything here has a story. Most of them are true. Everything has a price—
          and all prices are negotiable.
        side_effects: {}
        choices:
          - label: What's your stock?
            next_node: browse_curiosities
          - label: I'm looking for something specific.
            next_node: hunting
          - label: You buy rare finds? I might have a lead.
            actor_lacks_flag: [found_impossible_thing]
            next_node: collector_commission
          - label: I found the coin you were after.
            actor_has_flag: [found_impossible_thing]
            next_node: collector_thanks
          - label: I'm just looking.
            side_effects:
              end_dialogue: true
      browse_curiosities:
        text: >-
          Rare automatons, books from before the kingdom, artifacts of unknown purpose.
          If it's strange and valuable, I probably have it or can find it.
        side_effects: {}
        choices:
          - label: Fascinating. What else do you have?
            side_effects:
              end_dialogue: true
      hunting:
        text: >-
          Tell me what you seek, and I'll tell you if I have it or if it can be found.
          The rarer the item, the more interesting the price negotiation.
        side_effects: {}
        choices:
          - label: I'll think about it.
            side_effects:
              end_dialogue: true
      collector_commission:
        text: >-
          Vex leans in, voice dropping to a conspirator's hush. "There is a coin—
          Veridian mint, struck before the harbor silted over and the old port
          drowned. They say the tide still turns one up in the pools below the
          lighthouse, once in a blue moon. Bring me that coin and I'll pay you in
          something far stranger than money."
        side_effects:
          start_quest: find_impossible_thing
        choices:
          - label: An old coin? I'll find it.
            side_effects:
              remember: [vex_coin_hunt]
              end_dialogue: true
          - label: Sounds like a fool's errand.
            side_effects:
              end_dialogue: true
      collector_thanks:
        text: >-
          Vex turns the ancient coin over once, twice, and something almost like
          joy crosses that ledger-cold face. "Perfect. Cold as a drowned man's
          purse and twice as old. Keep the cloak—it's helped stranger folk than
          you slip out of tighter rooms."
        side_effects: {}
        choices:
          - label: A pleasure doing business.
            side_effects:
              end_dialogue: true

  # --- Whisperwood NPCs ---
  - id: ranger_elena_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Elena looks up from a coil of rope, her wolf-grey eye tracking you head to
          foot. The other eye is missing entirely, the socket closed over an old
          scar that pulls the corner of her mouth into a permanent half-frown. "Not
          many wander this deep without a reason. What brings you to the clearing?"
        side_effects: {}
        choices:
          - label: Tell me about this forest.
            next_node: forest_lore
          - label: Any work for someone new to these woods?
            actor_lacks_flag: [mapped_north_trail]
            next_node: quest_offer
          - label: I've been walking your trails.
            npc_remembers: [elena_quest_given]
            actor_lacks_flag: [mapped_north_trail]
            next_node: quest_in_progress
          - label: I've mapped the north trail for you.
            actor_has_flag: [mapped_north_trail]
            next_node: quest_done
          - label: Just passing through.
            side_effects:
              end_dialogue: true
      forest_lore:
        text: >-
          "Four trails, four moods," she says, nodding toward the paths radiating
          from the clearing. "North gets dark fast — mind the thicket. South's
          gentle, good walking. East plays tricks on you near the stones. West...
          west just makes you sad. Old mill, flooded quarry. Something happened
          there once and the forest hasn't forgotten it."
        side_effects: {}
        choices:
          - label: Thanks for the warning.
            side_effects:
              end_dialogue: true
      quest_offer:
        text: >-
          "Truth is, nobody's properly mapped these trails in a generation. I know
          them by feel, not by any chart worth trusting. Walk them for me — the old
          oak grove, the wildflower glade, the monolith stones, the mill — and come
          back and tell me what you find. I'll make it worth your time."
        side_effects:
          start_quest: map_forest_trails
          remember: [elena_quest_given]
        choices:
          - label: I'll map the trails for you.
            next_node: quest_accepted
          - label: Maybe another time.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          "Good. Start at the old oak grove, north of here — you'll know it when
          the light goes strange. Come back safe."
        side_effects:
          end_dialogue: true
      quest_in_progress:
        text: >-
          Elena nods slowly. "Good. Take your time—the trails don't reward hurry.
          The old oak grove first, north of here. Come back when the light's
          stopped playing tricks on you."
        side_effects: {}
        choices:
          - label: I'll keep walking.
            side_effects:
              end_dialogue: true
      quest_done:
        text: >-
          For the first time, the corner of her mouth lifts into something like a
          real smile. "You walked the north trail and came back whole. Not
          everyone does. The forest's got your measure now—it'll remember you,
          same as I will."
        side_effects: {}
        choices:
          - label: It was worth the walk.
            side_effects:
              end_dialogue: true

  - id: geomancer_shard_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A figure sits cross-legged among the crystal clusters, skin threaded through
          with faint veins of the same blue-green light. Shard does not open their
          eyes. "The stone remembers what the root forgets, and the root remembers
          what the stone forgets. You are neither, and yet you are here. Speak."
        side_effects: {}
        choices:
          - label: What are you doing down here?
            next_node: hermit_lore
          - label: Tell me about the sealed door east of here.
            actor_lacks_flag: [opened_sealed_vault]
            next_node: vault_lore
          - label: I opened the sealed vault. I read the message.
            actor_has_flag: [opened_sealed_vault]
            next_node: vault_opened
          - label: I'll leave you to your work.
            side_effects:
              end_dialogue: true
      hermit_lore:
        text: >-
          "Listening. The crystal grows a hair's width in a hundred years, and in
          that hair's width it carries every word ever spoken near it. I am merely
          patient enough to hear the echo." A faint smile. "You are not patient.
          That is not an insult. It is an observation."
        side_effects: {}
        choices:
          - label: Tell me about the sealed door east of here.
            next_node: vault_lore
          - label: I should go.
            side_effects:
              end_dialogue: true
      vault_lore:
        text: >-
          "The bone chamber holds a door the forest itself locked, long before your
          kind or mine kept histories. The key was left where the light lives —
          you may already have passed it. What waits beyond is not treasure. It is
          a message. Whether you can read it is your affair, not mine."
        side_effects:
          start_quest: the_sealed_vault
          remember: [shard_vault_told]
        choices:
          - label: I'll see what's inside.
            next_node: quest_accepted
          - label: Not today.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          "East of the bone chamber, then. Bring nothing you are not willing to
          leave behind — the forest is generous, but it does not give without
          asking something in return."
        side_effects:
          end_dialogue: true
      vault_opened:
        text: >-
          Shard's crystal-flecked eyes open fully for the first time, and for a
          long moment they simply regard you. "Then you carry it now, whether you
          understand it or not. The forest asked, and you answered. That is more
          than most manage." A pause. "Go gently. What you read will read you back,
          in time."
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true

  # --- Port Veridian dialogue trees (Phase 1) ---
  - id: captain_iris_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The docks never sleep, and neither do I. What do you need — cargo,
          a berth, or just directions?
        side_effects: {}
        choices:
          - label: Tell me about the cargo work.
            actor_lacks_flag: [cargo_managed]
            next_node: cargo_talk
          - label: The cargo's logged and moved.
            actor_has_flag: [cargo_managed]
            next_node: cargo_thanks
          - label: Any news from the sea?
            next_node: port_news
          - label: Just passing through.
            side_effects:
              end_dialogue: true
      cargo_talk:
        text: >-
          Every crate that comes off those ships needs to be logged, sorted,
          and moved before the next hull ties up. I could use another set of
          hands who can tell a manifest from a mess. Interested?
        side_effects:
          start_quest: manage_cargo_shipments
        choices:
          - label: I'll lend a hand.
            next_node: quest_accepted
          - label: Maybe another time.
            side_effects:
              end_dialogue: true
      port_news:
        text: >-
          Trade's been good since the spring thaw. Word is a warehouse on
          the north row has been locked up tight for weeks — nobody's saying
          why, and I haven't got the key to ask.
        side_effects:
          set_flags:
            - lore:port_veridian_trade
        choices:
          - label: Interesting. Thanks, Captain.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          Good. Start by getting a feel for the warehouses — mind the locked
          one, that's not your business yet.
        side_effects:
          end_dialogue: true
      cargo_thanks:
        text: >-
          Iris scans her manifest, then actually cracks a smile. "Every crate
          logged and stowed before the next hull tied up. You've a dockhand's
          instincts—rare in a wanderer. Keep the spyglass; a good pair of eyes
          earns its keep on these docks. There's always more work when you want it."
        side_effects: {}
        choices:
          - label: I'll be back for it. Fair winds, Captain.
            side_effects:
              end_dialogue: true

  - id: sal_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Welcome to the Salted Anchor. Sit, drink, and if you're lucky I'll
          tell you a tale worth the coin.
        side_effects: {}
        choices:
          - label: What's the tale tonight?
            next_node: story_exchange
          - label: What are you selling?
            next_node: browse_shop
          - label: Got any work for a wandering ear?
            actor_lacks_flag: [sal_stories_gathered]
            next_node: story_quest
          - label: I've walked where your tales pointed me.
            actor_has_flag: [sal_stories_gathered]
            next_node: story_quest_thanks
          - label: Is it true the tide runs strange under a full moon?
            moon_phase_is: full
            next_node: moon_lore
          - label: Just resting here, thanks.
            side_effects:
              end_dialogue: true
      story_exchange:
        text: >-
          Sal leans on the bar. "Heard tell of a wreck out past the
          breakwater — cargo still down there, if you believe the drunks who
          swear they've seen the mast at low tide."
        side_effects:
          set_flags:
            - lore:sal_wreck_tale
        choices:
          - label: I'll keep an eye out.
            side_effects:
              end_dialogue: true
      browse_shop:
        text: >-
          Rum, chowder, hardtack — whatever keeps a sailor upright. Prices
          are fair, and I don't water the rum, whatever they say.
        side_effects: {}
        choices:
          - label: I'll look at your stock.
            side_effects:
              end_dialogue: true
      moon_lore:
        text: >-
          Sal's voice drops. "Full moon tide pulls hard past the breakwater
          — pools open up around the tide pools that you won't see any other
          night. Just don't get caught out there when it turns."
        side_effects:
          set_flags:
            - lore:port_veridian_moon_tide
        choices:
          - label: Thanks for the warning, Sal.
            side_effects:
              end_dialogue: true
      story_quest:
        text: >-
          Sal wipes down the bar, grinning. "Tell you what—a tavern lives on
          tales, and mine are going stale. Walk out to the tide pools where the
          old port drowned, then climb the lighthouse and see the coast the way
          the Keeper does. Come back with what you saw, and the next round's on
          me—and a bottle besides."
        side_effects:
          start_quest: sals_sea_stories
        choices:
          - label: I'll gather your stories.
            side_effects:
              end_dialogue: true
          - label: Maybe later.
            side_effects:
              end_dialogue: true
      story_quest_thanks:
        text: >-
          "The drowned port and the lighthouse both, eh? That's a proper tale."
          Sal slides a dark bottle across the bar. "Here—the good wine, not the
          rum I water down for the regulars. You've earned an honest pour."
        side_effects: {}
        choices:
          - label: Much obliged, Sal.
            side_effects:
              end_dialogue: true

  - id: lighthouse_keeper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The lamp's been lit every night for thirty years and it'll be lit
          tonight too. What brings you up all those stairs?
        side_effects: {}
        choices:
          - label: Tell me about the currents.
            next_node: navigation_lore
          - label: Do you need a scout?
            actor_lacks_flag: [coast_scouted]
            next_node: scouting_quest
          - label: I walked the shoreline for you.
            actor_has_flag: [coast_scouted]
            next_node: scouting_thanks
          - label: Just admiring the view.
            side_effects:
              end_dialogue: true
      navigation_lore:
        text: >-
          The channel looks clear from up here, but there's a sandbar that
          shifts with every storm. More than one captain's learned that the
          hard way. I chart what I can, but the sea doesn't hold still.
        side_effects:
          set_flags:
            - lore:port_veridian_currents
        choices:
          - label: Good to know.
            side_effects:
              end_dialogue: true
      scouting_quest:
        text: >-
          As it happens — I could use someone to walk the shoreline and tell
          me what the last storm turned up. My knees aren't what they were.
        side_effects:
          start_quest: scout_coastal_waters
        choices:
          - label: I'll scout the shoreline for you.
            next_node: quest_accepted
          - label: Not right now.
            side_effects:
              end_dialogue: true
      quest_accepted:
        text: >-
          Much obliged. Start at the tide pools — the sea always leaves
          something behind.
        side_effects:
          end_dialogue: true
      scouting_thanks:
        text: >-
          The Keeper listens without turning from the window, then nods once.
          "So the storm shifted the sandbar again. I'll mark the new channel on my
          chart. Take this pendant—sea-glass off my own sill. It'll remind you the
          coast gives as much as it takes, if you know where to look."
        side_effects: {}
        choices:
          - label: Thank you, Keeper.
            side_effects:
              end_dialogue: true

  - id: shipwright_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Careful where you step — half this yard is scaffolding and the
          other half is splinters. What can I do for you?
        side_effects: {}
        choices:
          - label: Show me your salvage.
            next_node: browse_salvage
          - label: Can you repair ships?
            next_node: repair_talk
          - label: Just looking.
            side_effects:
              end_dialogue: true
      browse_salvage:
        text: >-
          Everything in that drydock came off a wreck or a scrapped hull.
          Good fittings, if you know what to do with them. Cheaper than
          buying new from the city smiths.
        side_effects: {}
        choices:
          - label: I'll take a look.
            side_effects:
              end_dialogue: true
      repair_talk:
        text: >-
          Given enough timber, tar, and time, I can put most anything back
          to sea-worthy. This yard's been under construction longer than
          I'd like to admit — good help is hard to find in a port town.
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true

  # --- P3.2 Quest-giver NPC (new): Academy Headmaster ---
  - id: headmaster_cornelius_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          An old man in a scholar's mantle stands amid toppled shelves, a broken
          catalog-card trembling in one hand. He looks up with watery, stubborn
          eyes. "You've caught the Academy at its lowest hour, I'm afraid. The
          restricted archive was ransacked—its master index scattered to the
          winds. Are you the sort who can put right what others break?"
        side_effects: {}
        choices:
          - label: What happened to the archive?
            next_node: archive_lore
          - label: How can I help restore it?
            actor_lacks_flag: [archive_restored]
            next_node: restore_quest
          - label: I recovered the index rubbing.
            npc_remembers: [cornelius_task_given]
            actor_lacks_flag: [archive_restored]
            next_node: restore_progress
          - label: The archive is open again.
            actor_has_flag: [archive_restored]
            next_node: restore_done
          - label: I'll leave you to your work.
            side_effects:
              end_dialogue: true
      archive_lore:
        text: >-
          "Three centuries of Aetheric scholarship, reduced in one night to a
          snowdrift of loose cards. The vault door locked itself when the alarm
          rang—a small mercy—but without the master index no one can find a thing
          in there, nor even prove what's missing. The runes that keyed the old
          catalog were copied, once, onto a standing stone in the Whisperwood."
        side_effects: {}
        choices:
          - label: A stone rubbing could rebuild the index?
            actor_lacks_flag: [archive_restored]
            next_node: restore_quest
          - label: A grim business. I should go.
            side_effects:
              end_dialogue: true
      restore_quest:
        text: >-
          "You understand it exactly. Travel to the monolith grove in the
          Whisperwood and take a rubbing of the old catalog-stone—the standing
          stone still keeps the index runes. Bring it back and my archivists can
          rebuild the catalog. Do this, and I will entrust you with the archive's
          own key, and the freedom of its shelves."
        side_effects:
          start_quest: restore_the_archive
          remember: [cornelius_task_given]
        choices:
          - label: I'll recover the rubbing.
            side_effects:
              end_dialogue: true
          - label: I'll consider it.
            side_effects:
              end_dialogue: true
      restore_progress:
        text: >-
          "The catalog-rubbing, from the monolith stone—yes. The moment it reaches
          my archivists' hands the archive is as good as restored. Bring it
          straight here; I'll not rest easy until it's done."
        side_effects: {}
        choices:
          - label: I'm on my way.
            side_effects:
              end_dialogue: true
      restore_done:
        text: >-
          Cornelius clasps your hand in both of his, his relief almost boyish.
          "The index rebuilds itself as we speak—row by row, the archive wakes. A
          scholar keeps his word: the vault key is yours, and these robes besides.
          The restricted shelves are open to you now. Use them wisely."
        side_effects: {}
        choices:
          - label: An honor, Headmaster.
            side_effects:
              end_dialogue: true

  # --- P3.1 Shopkeeper NPCs (new) ---
  - id: professor_aldwin_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A stooped man in stained lab robes looks up from a bubbling alembic,
          spectacles fogged with vapor. "Ah—a visitor! Mind the green flask, it
          bites. I am Aldwin, and this is the finest alchemy lab in Cogsworth,
          whatever Mirabel's students may tell you. What do you need?"
        side_effects: {}
        choices:
          - label: Show me your remedies.
            next_node: browse_potions
          - label: Do you need anything gathered?
            actor_lacks_flag: [aldwin_ingredients_done]
            next_node: ingredient_quest
          - label: I've brought your ingredients.
            actor_has_flag: [aldwin_ingredients_done]
            next_node: ingredient_thanks
          - label: Just curious.
            side_effects:
              end_dialogue: true
      browse_potions:
        text: >-
          "Healing draughts, tonics, a philter or two for a clear head—all brewed
          by my own hand, all honestly labeled, which is more than the city
          apothecaries can say. Help yourself; the prices are on the shelf."
        side_effects: {}
        choices:
          - label: I'll take a look.
            side_effects:
              end_dialogue: true
      ingredient_quest:
        text: >-
          Aldwin's eyes light up. "As it happens—yes! My reagent stores are bare.
          I need silverleaf, the pale herb that grows in the Whisperwood meadows,
          and a moonspore mushroom from the fairy rings out east. Bring me both
          and I'll brew you something worth the walk."
        side_effects:
          start_quest: aldwin_ingredients
        choices:
          - label: I'll gather them for you.
            side_effects:
              end_dialogue: true
          - label: Perhaps another day.
            side_effects:
              end_dialogue: true
      ingredient_thanks:
        text: >-
          "Silverleaf and moonspore, both fresh—wonderful!" He presses two vials
          into your hands, one glowing faintly. "A healing elixir and a philter of
          clarity, as promised. Come back any time you find something that grows
          where it shouldn't."
        side_effects: {}
        choices:
          - label: Thank you, Professor.
            side_effects:
              end_dialogue: true

  - id: hunter_sage_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A broad-shouldered woman in oiled leathers sits mending a snare, a
          half-dozen packs and coils of rope hung on the lodge wall behind her.
          "New face. If you're headed into the deep wood you'll want gear that
          won't quit on you. I'm Sage—quartermaster, tracker, and the last word on
          what you'll need out there. Speak up."
        side_effects: {}
        choices:
          - label: Show me your supplies.
            next_node: browse_supplies
          - label: Any scouting work going?
            actor_lacks_flag: [sage_scouting_done]
            next_node: scout_quest
          - label: I've scouted the eastern stones.
            actor_has_flag: [sage_scouting_done]
            next_node: scout_thanks
          - label: Just passing through.
            side_effects:
              end_dialogue: true
      browse_supplies:
        text: >-
          "Packs, satchels, cloaks that shed the rain, lanterns that don't gutter
          in a wind—everything a body needs to come home from the Whisperwood with
          all its fingers. Take your pick; I don't sell junk."
        side_effects: {}
        choices:
          - label: I'll browse the gear.
            side_effects:
              end_dialogue: true
      scout_quest:
        text: >-
          Sage sets down her mending. "The eastern trails have been quiet—too
          quiet. Walk out to the monolith grove and the mushroom circle beyond,
          and tell me nothing's stirring among the old stones. Do that and a good
          pair of boots is yours; you'll have earned them."
        side_effects:
          start_quest: sage_scout_stones
        choices:
          - label: I'll scout the eastern stones.
            side_effects:
              end_dialogue: true
          - label: Not today.
            side_effects:
              end_dialogue: true
      scout_thanks:
        text: >-
          "Both stones walked and nothing amiss—good. That's a weight off." She
          tosses you a supple pair of ranger's boots. "Broken in and quiet on the
          trail. Wear them well, and keep your eyes on those stones."
        side_effects: {}
        choices:
          - label: Thank you, Sage.
            side_effects:
              end_dialogue: true

  # --- P3.3 Flavor / Lore NPCs (no quests, just color) ---

  # Cogsworth undercity — vagrants who trade in old city history
  - id: vagrant_pike_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A gaunt man huddled in a nest of stolen sacking looks up, eyes bright in
          the grate-light. "Careful where you tread, friend. These tunnels were
          streets once, before the city grew a floor over its own head. Whole
          districts down here, if you know the old ways."
        side_effects: {}
        choices:
          - label: What districts?
            next_node: old_city
          - label: Mind yourself.
            side_effects:
              end_dialogue: true
      old_city:
        text: >-
          "Lamp-Row. Tanner's Fall. The Cistern Market, where they sold light in
          jars." He taps a rusted grate fondly. "All of it paved over when the
          steam-works came. The city forgets. We don't—we live in what it forgot."
        side_effects: {}
        choices:
          - label: A strange inheritance. Farewell.
            side_effects:
              end_dialogue: true

  - id: vagrant_needle_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A wiry woman sorting salvaged copper by lantern-light doesn't stop
          working as she speaks. "You hear that? Steam in the old pipes. They say
          it's just pressure. I say the foundry never truly went cold—something
          down deep still stokes it."
        side_effects: {}
        choices:
          - label: You believe that?
            next_node: foundry_tale
          - label: Just passing.
            side_effects:
              end_dialogue: true
      foundry_tale:
        text: >-
          "I believe what keeps me warm on a wet night, and those pipes never
          chill." She finally looks up. "Go down far enough and the dark gets a
          heartbeat. Most folk turn back before they hear it. Wiser ones don't go
          at all."
        side_effects: {}
        choices:
          - label: I'll bear that in mind.
            side_effects:
              end_dialogue: true

  # Cogsworth Academy — courtyard scholars trading gossip
  - id: scholar_finch_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A young scholar with ink on her collar leans conspiratorially close.
          "You didn't hear it from me, but they say the Headmaster hasn't slept
          since the archive was ransacked. Half the faculty thinks it was an
          inside job. The other half won't say what they think at all."
        side_effects: {}
        choices:
          - label: Who would rob an archive?
            next_node: gossip
          - label: I'll not repeat it.
            side_effects:
              end_dialogue: true
      gossip:
        text: >-
          "Someone who wanted a thing found, not stolen—why else scatter the
          index and leave the shelves? That's my theory." She straightens quickly.
          "But I'm a first-year. Nobody listens to first-years. More's the pity."
        side_effects: {}
        choices:
          - label: I'm listening. Thank you.
            side_effects:
              end_dialogue: true

  - id: scholar_dabble_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A stout, breathless student clutches a stack of lecture notes to his
          chest. "Aetheric Resonance at the third bell, and I've read none of it.
          Don't suppose you understand harmonic decay? No? Neither do I, and I've
          a thesis due on it."
        side_effects: {}
        choices:
          - label: Good luck with the thesis.
            next_node: cheer
          - label: Best get reading, then.
            side_effects:
              end_dialogue: true
      cheer:
        text: >-
          "Luck! Ha. In this place luck is what we call it when the maths finally
          agree with you." He manages a wan grin. "If you see Professor Aldwin,
          tell him I'm coming for the reagents I'm owed. He'll know."
        side_effects: {}
        choices:
          - label: I'll pass it along.
            side_effects:
              end_dialogue: true

  # Port Veridian — tavern sailors spinning sea stories
  - id: sailor_bright_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A ruddy old sailor with a gull feather in his cap raises his tankard.
          "Sit, sit. I've sailed the coast forty years and I'll tell you true—the
          sea keeps its own ledger, and it always collects. Ask any man who's
          rounded the breakwater in a blow."
        side_effects: {}
        choices:
          - label: What's the strangest thing you've seen?
            next_node: sea_tale
          - label: Enjoy your drink.
            side_effects:
              end_dialogue: true
      sea_tale:
        text: >-
          "Lights under the water off the old port, moving against the current.
          Whole crew saw 'em. We didn't drop anchor that night, and we didn't
          speak of it neither—till now, and only 'cause you're buying. You are
          buying, aren't you?"
        side_effects: {}
        choices:
          - label: Next round's on me. Thanks for the tale.
            side_effects:
              end_dialogue: true

  - id: sailor_gull_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A young deckhand nurses a chowder in the corner, still green around the
          gills. "First real voyage last week. They didn't tell me the horizon
          moves. Thought I had my sea-legs. Turns out I'd only borrowed them."
        side_effects: {}
        choices:
          - label: It gets easier.
            next_node: reassure
          - label: Rest up, sailor.
            side_effects:
              end_dialogue: true
      reassure:
        text: >-
          "That's what Sal keeps saying. Then he laughs." He manages a smile.
          "Still—I'd not trade it. There's a moment at dawn watch, sea flat as
          glass and pink as the inside of a shell, makes the whole green misery
          worth it."
        side_effects: {}
        choices:
          - label: Fair winds to you.
            side_effects:
              end_dialogue: true

  # Whisperwood — Fey creatures, cryptic and green
  - id: fey_wisp_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A pale mote of light hovers at eye height, resolving, when you squint,
          into a tiny winged figure. Its voice is the sound of dew dropping from a
          leaf. "Lost-thing, found-thing, walking-thing. You wear your name on the
          outside. How very loud of you."
        side_effects: {}
        choices:
          - label: Do you have a name?
            next_node: riddle
          - label: I'll leave you be.
            side_effects:
              end_dialogue: true
      riddle:
        text: >-
          "I have seven, and none, and one I only whisper to the moss." It spirals
          once around your head. "Give the rings a wide berth at moonrise, loud-one.
          What dances there does not always let its dancers leave."
        side_effects: {}
        choices:
          - label: I'll remember that.
            side_effects:
              end_dialogue: true

  - id: fey_thornkin_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Something the shape of a child made of bark and bramble crouches atop a
          standing stone, regarding you with eyes like two black sloe-berries. "You
          touch the stones with your looking. They feel it, you know. They have
          felt every looker since the ice."
        side_effects: {}
        choices:
          - label: What are the stones?
            next_node: stone_lore
          - label: I meant no harm.
            side_effects:
              end_dialogue: true
      stone_lore:
        text: >-
          "Doors. Fences. Teeth. Depends which way you're walking." It bares a
          mouthful of thorns in something that might be a smile. "One remembers a
          rubbing taken, long ago. It has been waiting to be read back. Mind you
          don't wake what the reading wakes."
        side_effects: {}
        choices:
          - label: I'll tread carefully.
            side_effects:
              end_dialogue: true

  - id: fey_gloam_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          In the hush of the mushroom ring, a long-limbed shadow uncurls from
          beneath a toadstool cap, more suggestion than shape. "Twilight-walker.
          You are early, or late, or both. Time pools strangely in the rings.
          Mind you drink none of it."
        side_effects: {}
        choices:
          - label: How would I drink time?
            next_node: warning
          - label: I'll keep to the path.
            side_effects:
              end_dialogue: true
      warning:
        text: >-
          "Eat the pale caps and an hour becomes a hundred years, and the forest
          keeps the difference. Many a merry dancer we have here who came in for
          one song." The shadow settles. "Go home while home still knows your
          face, walker."
        side_effects: {}
        choices:
          - label: Sound advice. Farewell.
            side_effects:
              end_dialogue: true

  # Whisperwood caves — the Skeleton Keeper (pure atmosphere, no true conversation)
  - id: skeleton_keeper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          Propped against the far wall of the bone chamber sits a skeleton in the
          rotted remains of a warden's coat, a rusted lantern hooked on one
          finger-bone. It does not move. It does not speak. And yet you cannot
          shake the certainty that it is, somehow, keeping watch—and has counted
          you as you entered.
        side_effects: {}
        choices:
          - label: Bow your head and pass in silence.
            side_effects:
              end_dialogue: true

  # Whisperwood Canopy City — artisan, steward, and healer color
  - id: weaver_thistle_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A slight woman sits at a loom strung between two living branches, her
          fingers never pausing. "Welcome to the high boughs. I weave the wind's
          patterns—see how the cloth shifts? Half my art is thread, half is
          knowing which way the canopy will sway."
        side_effects: {}
        choices:
          - label: What do you make?
            next_node: craft
          - label: It's beautiful work.
            side_effects:
              end_dialogue: true
      craft:
        text: >-
          "Cloaks that shed the mist, bridge-ropes that sing before they fray to
          warn you, blankets for the cold that lives up here at night." She ties
          off a thread with her teeth. "Everything a bough-dweller needs, and
          nothing that doesn't belong to the trees."
        side_effects: {}
        choices:
          - label: A fine trade. Farewell.
            side_effects:
              end_dialogue: true

  - id: elder_oakwhisper_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          An ancient figure sits in the hollow of the great elder-tree, bark and
          skin grown nearly indistinguishable with the years. "Down-walker. Few
          climb to the high hollow. The trees told me you were coming before the
          rope-bridge did. Sit, if you like. I have all the time the roots do."
        side_effects: {}
        choices:
          - label: How long have you lived here?
            next_node: steward_lore
          - label: I won't keep you, Elder.
            side_effects:
              end_dialogue: true
      steward_lore:
        text: >-
          "Long enough to have planted the bridge you crossed as a seed. The
          canopy is not built, down-walker—it is grown, and tended, and asked
          permission of. Remember that below, where your people build first and
          ask never."
        side_effects: {}
        choices:
          - label: I'll remember. Thank you, Elder.
            side_effects:
              end_dialogue: true

  - id: healer_moss_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A calm, moss-cloaked woman grinds herbs in a bowl carved from a burl,
          her hut fragrant with drying leaves. "Come in, come in—mind the low
          branch. You've the look of someone who's walked farther than they've
          rested. The forest has a cure for that, if you'll let it."
        side_effects: {}
        choices:
          - label: What do you brew?
            next_node: remedies
          - label: Just resting my feet.
            side_effects:
              end_dialogue: true
      remedies:
        text: >-
          "Salves for the trail-sore, tonics for the fevered, a tea that quiets
          bad dreams." She taps the burl-bowl. "All of it grown within a day's
          walk. Silverleaf and moonspore, mostly—the same the city professors pay
          a fortune for and can't grow half so well."
        side_effects: {}
        choices:
          - label: The forest provides. Thank you.
            side_effects:
              end_dialogue: true

  # --- P3.4 Scheduled-movement NPCs (minimal flavor trees) ---
  - id: dock_worker_bram_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A thick-armed dockhand pauses with a crate on one shoulder, sweat
          beading under his cap. "Can't stop long—Iris'll have my hide if the
          north dock's not clear by the tide. Mornings I'm on the quay, evenings
          I'm hauling to the warehouses. Story of my life."
        side_effects: {}
        choices:
          - label: Don't let me keep you.
            side_effects:
              end_dialogue: true

  - id: night_watch_holt_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A broad watchman in a dented brass helm gives you a slow, measuring look
          and a jerk of his chin. "Move along, citizen. Plaza by day, the smithy
          quarter after dark—somebody's got to keep the lamps honest. Nothing here
          that won't keep till morning."
        side_effects: {}
        choices:
          - label: Evening, watchman.
            side_effects:
              end_dialogue: true

  - id: forest_scout_wren_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A lean scout in mottled green crouches to read a scuff in the moss, her
          bow unstrung across her back. "Sage has me walking the loop—clearing at
          dawn, the old oak by midday, the glade come evening. Keeps the trails
          honest. You'll find me wherever the light is, if you need me."
        side_effects: {}
        choices:
          - label: Safe trails, scout.
            side_effects:
              end_dialogue: true

  - id: grave_warden_elsbet_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          The grave-warden shuts a ledger with one gloved finger marking her
          place. "If you're here to mourn, keep to the paths. If you're here to
          help, the dead have been restless since the bells began ringing under
          the hill."
        side_effects: {}
        choices:
          - label: What should I do first?
            next_node: first_work
          - label: Why are the bells ringing?
            next_node: bell_lore
          - label: I'll keep to the paths.
            side_effects:
              end_dialogue: true
      first_work:
        text: >-
          "Read the stones that still allow reading. The pauper row tells you
          who has been waking; the Varrow tomb tells you who refuses shame; the
          bellfinger stone tells you what the crypt wants back."
        side_effects:
          start_quest: graveyard_count_the_bells
        choices:
          - label: I'll read the stones.
            side_effects:
              end_dialogue: true
      bell_lore:
        text: >-
          "Dead-ringer bells were mercy once. Now they are invitation. When a
          grave-bell rings with no hand on the cord, something under the soil
          believes it has been summoned."
        side_effects:
          start_quest: graveyard_find_the_hand
        choices:
          - label: Then I will find the hand.
            side_effects:
              end_dialogue: true

  - id: vault_forewoman_cassia_dialogue
    root_node: greeting
    nodes:
      greeting:
        text: >-
          A woman in a pressure engineer's coat stands beside a brass job board,
          pencil tucked behind one ear and soot on both cuffs. "Station Seven is
          awake, understaffed, and disagreeable. Pick a problem, write your name
          beside it, and try not to vent the district."
        side_effects: {}
        choices:
          - label: I can inspect the station.
            next_node: station_inspection
          - label: I can check the ticket clock.
            next_node: ticket_clock
          - label: I can recover a tram manifest.
            next_node: tram_manifest
          - label: I can audit the regulators.
            next_node: regulator_audit
          - label: I can repair the aetheric coil.
            next_node: coil_repair
          - label: I can clean the soot filters.
            next_node: soot_filters
          - label: I can survey the observatory.
            next_node: observatory_survey
          - label: I can retrieve the songbird.
            next_node: songbird_recovery
          - label: I can map the sump.
            next_node: sump_mapping
          - label: I can walk the full pressure circuit.
            next_node: pressure_circuit
          - label: Not just now.
            side_effects:
              end_dialogue: true
      station_inspection:
        text: >-
          "Start simple. Walk the lift, the station, and the concourse. If the
          district lets you cross those three rooms without screaming, we call
          that a baseline inspection."
        side_effects:
          start_quest: brass_vaults_station_inspection
        choices:
          - label: Baseline inspection, understood.
            side_effects:
              end_dialogue: true
      ticket_clock:
        text: >-
          "The ticket clock has been selling yesterday's fares for tomorrow's
          trains. Bring me a punched roll before it invoices the mayor's
          grandchildren."
        side_effects:
          start_quest: brass_vaults_ticket_clock
        choices:
          - label: I'll fetch the ticket roll.
            side_effects:
              end_dialogue: true
      tram_manifest:
        text: >-
          "A manifest vanished from Station Seven. If it reached the tubes, we
          may have cargo orbiting the hill forever. Find the card before it finds
          a lawyer."
        side_effects:
          start_quest: brass_vaults_manifest_run
        choices:
          - label: I'll recover the manifest.
            side_effects:
              end_dialogue: true
      regulator_audit:
        text: >-
          "Regulator Court is spinning two beats fast. Bring back the civic seal
          from the governor assembly so I know you got close enough to read the
          warning plates."
        side_effects:
          start_quest: brass_vaults_regulator_audit
        choices:
          - label: I'll audit the regulator.
            side_effects:
              end_dialogue: true
      coil_repair:
        text: >-
          "The aetheric engine is arcing blue. Pretty means dangerous. Pull the
          spare coil and keep your fingers out of anything singing hymns."
        side_effects:
          start_quest: brass_vaults_aetheric_coil
        choices:
          - label: I'll bring the coil.
            side_effects:
              end_dialogue: true
      soot_filters:
        text: >-
          "The boilers breathe through soot filters older than most dynasties.
          Bring one up from the works so I can shame procurement with evidence."
        side_effects:
          start_quest: brass_vaults_soot_filter
        choices:
          - label: I'll get a filter.
            side_effects:
              end_dialogue: true
      observatory_survey:
        text: >-
          "The downward telescope has started sketching grave lines under town.
          Fetch its lens and note whether it shows anything with too many teeth."
        side_effects:
          start_quest: brass_vaults_observatory_lens
        choices:
          - label: I'll survey the gantry.
            side_effects:
              end_dialogue: true
      songbird_recovery:
        text: >-
          "A clockwork songbird flew three inches from the bazaar display and
          declared independence. If you find it, cup it gently. It has opinions
          and a delicate mainspring."
        side_effects:
          start_quest: brass_vaults_songbird
        choices:
          - label: I'll recover the bird.
            side_effects:
              end_dialogue: true
      sump_mapping:
        text: >-
          "The sump map dissolved. Bring back the red valve wheel from the bottom
          run, and if the water asks your name, give it mine."
        side_effects:
          start_quest: brass_vaults_sump_valve
        choices:
          - label: I'll map the sump.
            side_effects:
              end_dialogue: true
      pressure_circuit:
        text: >-
          "Full circuit: station, concourse, court, engine, boilers, sootworks,
          sump. Walk it in one piece and I'll sign you as provisionally useful."
        side_effects:
          start_quest: brass_vaults_pressure_circuit
        choices:
          - label: I'll walk the circuit.
            side_effects:
              end_dialogue: true

