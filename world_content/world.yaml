    takeable: true
    tradeable: true
    value: 12
    category: trade_good

  - id: gear_small_brass
    name: Small Brass Gear
    description: >-
      A precision-cut gear of polished brass, about the size of your palm. It's
      perfectly balanced and would mesh precisely with other gears. A curious
      souvenir or valuable component.
    takeable: true
    tradeable: true
    value: 18
    category: trade_good

  # --- Cogsworth: Trade Goods & Consumables ---
  - id: oil_can_industrial
    name: Industrial Oil Can
    description: >-
      A sealed metal can of high-grade machine oil. The label bears Cogsworth's
      seal and a date stamp from this year. Essential for machinery maintenance.
    takeable: true
    tradeable: true
    value: 8
    category: trade_good

  - id: ale_brass_barrel
    name: Cogsworth Ale
    description: >-
      A tankard of dark, robust ale brewed in a Cogsworth brewery. The flavor
      has notes of copper and smoke. Warming and potent.
    takeable: true
    tradeable: true
    value: 5
    category: trade_good

  - id: mechanical_components
    name: Bag of Mechanical Components
    description: >-
      A cloth bag filled with bolts, springs, small gears, and screws. Useful
      for tinkerers and craftspeople. The exact contents are a bit mysterious.
    takeable: true
    tradeable: true
    value: 22
    category: trade_good

  # --- Cogsworth: Rare/Collectible ---
  - id: pocket_watch_cogsworth
    name: Cogsworth Pocket Watch
    description: >-
      An intricate pocket watch with a face of white enamel and hands of gold.
      The case is engraved with the city's skyline. It keeps perfect time,
      synchronized with the great clock tower above.
    takeable: true
    tradeable: true
    value: 150
    category: trade_good
    quality: superior

  - id: blueprint_scroll
    name: Rolled Blueprint
    description: >-
      A tightly rolled scroll of technical drawings—architectural plans for
