    description: >-
      A gaunt man wrapped in layers of stolen sacking, his face lit sharp by the
      grate-light. He speaks of the buried city as if it were still bustling, and
      knows every forgotten door in the undercity.
    home_room_id: sewer_junction_main
    current_room_id: sewer_junction_main
    dialogue_tree_id: vagrant_pike_dialogue
    behavior: passive

  - id: vagrant_needle
    name: Needle
    description: >-
      A wiry woman forever sorting salvaged copper by lantern-light, quick-fingered
      and quicker-eyed. She swears the deep foundry never truly went cold and warms
      her hands at pipes that ought to be chill.
    home_room_id: sewer_tunnel_west
    current_room_id: sewer_tunnel_west
    dialogue_tree_id: vagrant_needle_dialogue
    behavior: passive

  - id: scholar_finch
    name: Scholar Finch
    description: >-
      A young academic with ink permanently smudged along her collar and an
      insatiable appetite for faculty gossip. She has a theory about the archive
      robbery and no one senior enough to take it seriously.
    home_room_id: academy_courtyard
    current_room_id: academy_courtyard
    dialogue_tree_id: scholar_finch_dialogue
    behavior: passive

  - id: scholar_dabble
    name: Student Dabble
    description: >-
      A stout, perpetually breathless student buried under a landslide of lecture
      notes. He is always late, always unread, and always somehow cheerful about
      his impending academic doom.
    home_room_id: academy_courtyard
    current_room_id: academy_courtyard
    dialogue_tree_id: scholar_dabble_dialogue
    behavior: passive

  - id: sailor_bright
    name: Old Bright
    description: >-
      A ruddy, weather-cured sailor with a gull feather in his cap and forty years
      of coast in his squint. His stories cost a round of drinks and are worth at
      least half of it.
    home_room_id: maritime_tavern
    current_room_id: maritime_tavern
    dialogue_tree_id: sailor_bright_dialogue
    behavior: passive

  - id: sailor_gull
    name: Young Gull
    description: >-
      A green-gilled deckhand fresh off his first real voyage, still startled that
      the horizon moves. Seasick, homesick, and quietly, stubbornly in love with
      the sea anyway.
    home_room_id: maritime_tavern
    current_room_id: maritime_tavern
    dialogue_tree_id: sailor_gull_dialogue
    behavior: passive

  - id: fey_wisp
    name: A Drifting Wisp
    description: >-
      A pale mote of light that resolves, when you squint, into a tiny winged
      figure. It speaks in the sound of dew dropping from a leaf and finds your
      solidity faintly rude.
    home_room_id: mushroom_circle
    current_room_id: mushroom_circle
    dialogue_tree_id: fey_wisp_dialogue
    behavior: passive

  - id: fey_thornkin
    name: A Thornkin
    description: >-
      Something the shape of a child made of bark and bramble, perched atop a
      standing stone. Its sloe-black eyes hold the patience of things that have
      watched since the ice withdrew.
    home_room_id: monolith_grove
    current_room_id: monolith_grove
    dialogue_tree_id: fey_thornkin_dialogue
    behavior: passive

  - id: fey_gloam
    name: A Gloaming Shade
    description: >-
      A long-limbed shadow that uncurls from beneath a toadstool cap, more
      suggestion than shape. It counts the hours in a currency you would be unwise
      to spend.
    home_room_id: mushroom_circle
    current_room_id: mushroom_circle
    dialogue_tree_id: fey_gloam_dialogue
    behavior: passive

  - id: skeleton_keeper
    name: The Skeleton Keeper
    description: >-
      A skeleton in the rotted remains of a warden's coat, propped against the
      chamber wall with a rusted lantern hooked on one finger-bone. It never moves
      and never speaks—yet you are certain it keeps watch, and has counted you.
    home_room_id: bone_chamber
    current_room_id: bone_chamber
    dialogue_tree_id: skeleton_keeper_dialogue
    behavior: passive
    triggers:
      - on: encounter
        do:
          - narrate_room: "The Skeleton Keeper does not stir, and yet the empty sockets seem to follow you across the chamber."

  - id: weaver_thistle
    name: Weaver Thistle
    description: >-
      A slight woman at a loom strung between two living branches, her fingers
      never pausing. Half her art is thread and half is knowing which way the
      canopy will sway.
    home_room_id: weaver_platform
    current_room_id: weaver_platform
    dialogue_tree_id: weaver_thistle_dialogue
    behavior: passive

  - id: elder_oakwhisper
    name: Elder Oakwhisper
    description: >-
      An ancient figure seated in the hollow of the great elder-tree, bark and
      skin grown nearly indistinguishable with the years. The trees announce
      visitors to Oakwhisper before the rope-bridges do.
    home_room_id: elder_tree_hub
    current_room_id: elder_tree_hub
    dialogue_tree_id: elder_oakwhisper_dialogue
    behavior: passive

  - id: healer_moss
    name: Healer Moss
    description: >-
      A calm, moss-cloaked woman grinding herbs in a burl-carved bowl, her hut
      fragrant with drying leaves. She grows within a day's walk what the city
      professors pay a fortune to import.
    home_room_id: healer_nest
    current_room_id: healer_nest
    dialogue_tree_id: healer_moss_dialogue
    behavior: passive

  # -------------------------------------------------------------------------
  # P3.4 — Scheduled-movement NPCs. `schedule` teleports current_room_id to
  # target_room_id on the world clock's HOUR_CHANGED event (not a walked path).
  # -------------------------------------------------------------------------

  - id: dock_worker_bram
    name: Bram the Dockhand
    description: >-
      A thick-armed longshoreman with a permanent stoop from a lifetime of crates
      and a cap gone grey with salt. He works the quay by morning and the
      warehouses by evening, and grumbles about both.
    home_room_id: docks_main
    current_room_id: docks_main
    dialogue_tree_id: dock_worker_bram_dialogue
    behavior: passive
    schedule:
      - game_hour: 8
        target_room_id: docks_main
      - game_hour: 18
        target_room_id: warehouse_district

  - id: night_watch_holt
    name: Watchman Holt
    description: >-
      A broad, unhurried watchman in a dented brass helm, keys and a shuttered
      lantern at his belt. He keeps the grand plaza by day and the smithy quarter
      after dark, and has waved off more trouble than he's ever had to chase.
    home_room_id: grand_plaza
    current_room_id: grand_plaza
    dialogue_tree_id: night_watch_holt_dialogue
    behavior: defensive
    schedule:
      - game_hour: 8
        target_room_id: grand_plaza
      - game_hour: 20
        target_room_id: smithy_district

  - id: forest_scout_wren
    name: Scout Wren
    description: >-
      A lean, quiet-footed scout in mottled green, one of Hunter Sage's rangers.
      She walks a daily circuit of the forest-floor clearings, reading the moss
      and the light, and is never quite where you last saw her.
    home_room_id: whispering_clearing
    current_room_id: whispering_clearing
    dialogue_tree_id: forest_scout_wren_dialogue
    behavior: passive
    ai:
      mode: route
      route: [whispering_clearing, old_oak_grove, wildflower_glade]
      dwell_ticks: 4
      travel_ticks: 3
      reverses: false
      loop: true

  # -------------------------------------------------------------------------
  # AREA: ashmoore_graveyard — Graveyard NPCs and undead templates
  # -------------------------------------------------------------------------

  - id: grave_warden_elsbet
    name: Grave-Warden Elsbet
    description: >-
      A narrow woman in a waxed black coat, with silver hair pinned under a
      hatband of mourning ribbon. She carries a ledger, a shovel, and the tired
      authority of someone who has argued with the dead and won often enough.
    home_room_id: caretakers_shed
    current_room_id: caretakers_shed
    dialogue_tree_id: grave_warden_elsbet_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "Elsbet marks a line in her ledger, then looks up as if she had already counted you."

  - id: tombstone_skeleton
    name: Tombstone Skeleton
    description: >-
      A yellowed skeleton with grave soil packed into every joint and a chip of
      slate wedged between its ribs. It moves with the stiff indignation of
      someone woken before dawn.
    home_room_id: pauper_rows
    current_room_id: pauper_rows
    behavior: defensive
    max_hp: 35
    loot_table:
      bone_fragment: 1
      grave_bell_clapper: 1
    triggers:
      - on: encounter
        do:
          - narrate_room: "Soil spills from a nearby grave as a skeleton hauls itself upright."
    ai:
      mode: wander
      move_every: 4
      area: ashmoore_graveyard

  - id: bell_ghost
    name: Bell Ghost
    description: >-
      A translucent mourner whose outline shivers with the sound of tiny bells.
      Its face is hidden by a veil of moon-pale vapor, and its hands are turned
      palms-up as if still waiting for burial coins.
    home_room_id: bell_crypt
    current_room_id: bell_crypt
    behavior: defensive
    max_hp: 28
    loot_table:
      grave_bell_clapper: 1
      cracked_funeral_mask: 1
    triggers:
      - on: encounter
        do:
          - narrate_room: "A bell rings under the floor, and a pale ghost drifts from the nearest tombstone."
    ai:
      mode: wander
      move_every: 5
      area: ashmoore_graveyard

  - id: crypt_wight
    name: Crypt Wight
    description: >-
      A hunched undead thing in scraps of burial finery, its fingers black with
      old silver polish and its jaw wired shut with funeral thread. Brass bells
      have been sewn into its sleeves, but they make no sound when it moves.
    home_room_id: cracked_mausoleum
    current_room_id: cracked_mausoleum
    behavior: defensive
    max_hp: 60
    loot_table:
      cracked_funeral_mask: 1
      ossuary_keyring: 1
    triggers:
      - on: encounter
        do:
          - narrate_room: "A sealed tomb cracks open with a sigh, and something old steps out."
    ai:
      mode: patrol
      move_every: 6
      route: [cracked_mausoleum, bell_crypt, angel_overlook, ossuary]

  # -------------------------------------------------------------------------
  # AREA: brass_vaults — Steampunk NPCs and mobile hazards
  # -------------------------------------------------------------------------

  - id: vault_forewoman_cassia
    name: Forewoman Cassia Vane
    description: >-
      A practical engineer with soot-dark cuffs, a brass whistle, and an
      expression calibrated to find faults in people and pressure systems with
      equal speed. Her job board is more organized than the district it governs.
    home_room_id: copper_concourse
    current_room_id: copper_concourse
    dialogue_tree_id: vault_forewoman_cassia_dialogue
    behavior: defensive
    triggers:
      - on: encounter
        do:
          - narrate_room: "Forewoman Cassia taps her pencil against the job board and adds one more problem to the list."

  - id: brass_patrolman
    name: Brass Patrolman
    description: >-
      A man-height automaton in municipal blue enamel, with a whistle built into
      its chest and waxed mustaches bolted beneath its glass eyes. Its baton arm
      ratchets one click every time it sees a rule being bent.
    home_room_id: regulator_court
    current_room_id: regulator_court
    behavior: defensive
    max_hp: 55
    loot_table:
      gear_small_brass: 1
      regulator_seal: 1
    triggers:
      - on: encounter
        do:
          - narrate_room: "A brass patrolman turns toward you and emits a questioning whistle."
    ai:
      mode: patrol
      move_every: 3
      route: [copper_concourse, regulator_court, pressure_lock, aetheric_engine_room, boiler_gallery]

  - id: soot_crawler
    name: Soot Crawler
    description: >-
      A low maintenance automaton on eight jointed legs, half broom and half
      spider. Its belly is packed with soot, and its copper feelers taste the air
      for ash, heat, and unfiled work orders.
    home_room_id: sootworks
    current_room_id: sootworks
    behavior: defensive
    max_hp: 32
    loot_table:
      soot_filter: 1
      mechanical_components: 1
    triggers:
      - on: encounter
        do:
          - narrate_room: "A soot crawler skitters out from under a pipe, feelers clicking."
    ai:
      mode: wander
      move_every: 4
      area: brass_vaults

  - id: aetheric_warden
    name: Aetheric Warden
    description: >-
      A floating brass cage surrounding a blue-white core of captive vapor. It
      speaks in static, warning chimes, and the little lightning crawling over
      its ribs seems to disapprove of organic uncertainty.
    home_room_id: aetheric_engine_room
    current_room_id: aetheric_engine_room
    behavior: defensive
    max_hp: 48
    loot_table:
      aetheric_coil: 1
      pressure_gauge: 1
    triggers:
      - on: encounter
        do:
          - narrate_room: "Blue light flares as an aetheric warden pivots in the air."
    ai:
      mode: patrol
      move_every: 5
      route: [aetheric_engine_room, pressure_lock, regulator_court, boiler_gallery, sootworks]

economy:
  regions:
    # Sprint 71.2: economy pricing keys off `zone`. Ashmoore's former town/
    # wilderness/cave rows collapsed into one row at the baseline 1.0 (its sole
    # shop — the innkeeper — sat in a town/1.0 room; the wilderness/cave
    # multipliers never applied to a transaction).
    - zone: ashmoore
      region_mult: 1.0
    - zone: ashmoore_graveyard
      region_mult: 0.9
    - zone: brass_vaults
      region_mult: 1.15
    - zone: cogsworth
      region_mult: 1.1
    - zone: whisperwood
      region_mult: 1.05
    - zone: port_veridian
      region_mult: 0.95

# Sprint 73: XP/leveling policy (data-driven, admin-tunable). `base`/`step` feed
# the Tier 1 LevelCurve (cost to reach level n+1 = base + step*(n-1)); the reward
# fields say what crossing one level grants. Live-editable via the admin console
# (POST /admin/progression/config) with no restart.
progression:
  base: 100
  step: 50
  coins_per_level: 25
  skill_points_per_level: 1

quests:
  - id: investigate_lights
    title: Lights in the Square
    description: >-
      Mira the innkeeper mentioned strange lights near the market stalls.
    stages:
      - id: visit_market
        description: Visit the market stalls east of the village square.
        conditions:
          - type: room_visited
            room_id: market_stalls
        completion_flags:
          investigated_market: true
        rewards:
          xp: 50

  - id: map_forest_trails
    title: Map the Forest Trails
    description: >-
      Ranger Elena asked you to walk the forest's trails and report what lies
      along them, starting with the old oak grove north of the clearing.
    stages:
      - id: visit_old_oak_grove
        description: Follow the north trail to the old oak grove.
        conditions:
          - type: room_visited
            room_id: old_oak_grove
        completion_flags:
          mapped_north_trail: true
        rewards:
          xp: 40

  - id: the_sealed_vault
    title: The Sealed Vault
    description: >-
      Geomancer Shard spoke of a stone door in the bone chamber, locked by the
      forest itself, and a key hidden somewhere in the crystal cavern's glow.
    stages:
      - id: open_the_vault
        description: Find the root-bound key and open the sealed vault east of the bone chamber.
        conditions:
          - type: room_visited
            room_id: sealed_vault
        completion_flags:
          opened_sealed_vault: true
        rewards:
          xp: 60

  # --- P3.1 Shopkeeper quest offers ---
  - id: find_impossible_thing
    title: A Coin for the Collector
    description: >-
      Dealer Vex covets an ancient Veridian coin, struck before the old port
      drowned. They say the tide still turns one up in the pools below the
      lighthouse.
    stages:
      - id: recover_ancient_coin
        description: Find the ancient Veridian coin in the tide pools below the lighthouse and bring it to Vex.
        conditions:
          - type: item_in_inventory
            item_id: ancient_veridian_coin
        completion_flags:
          found_impossible_thing: true
        rewards:
          items: [rogues_cloak, copper_coin]
          xp: 45

  - id: thornes_rare_commission
    title: Cavern Crystal for the Forge
    description: >-
      Blacksmith Thorne wants an unbroken raw crystal shard from the caverns
      beneath Whisperwood, to forge a bracer that laughs at a smith's fire.
    stages:
      - id: gather_crystal_shard
        description: Recover a raw crystal shard from the crystal cavern and bring it to Thorne.
        conditions:
          - type: item_in_inventory
            item_id: raw_crystal_shard
        completion_flags:
          thorne_commission_done: true
        rewards:
          items: [forgemasters_bracer, copper_coin]
          xp: 55

  - id: aldwin_ingredients
    title: Ingredients for the Lab
    description: >-
      Professor Aldwin's reagent stores are bare. He needs silverleaf from the
      Whisperwood meadows and a moonspore mushroom from the eastern fairy rings.
    stages:
      - id: gather_silverleaf
        description: Pick silverleaf herb in the Whisperwood meadows.
        conditions:
          - type: item_in_inventory
            item_id: silverleaf_herb
      - id: gather_moonspore
        description: Gather a moonspore mushroom from the mushroom circle east of the clearing.
        conditions:
          - type: item_in_inventory
            item_id: moonspore_mushroom
        completion_flags:
          aldwin_ingredients_done: true
        rewards:
          items: [major_healing_elixir, clarity_philter]
          xp: 50

  - id: sals_sea_stories
    title: Tales for the Salted Anchor
    description: >-
      Tavern Keeper Sal wants fresh sea stories: walk out to the drowned port's
      tide pools, then climb the lighthouse and see the coast as the Keeper does.
    stages:
      - id: visit_tide_pools
        description: Walk out to the tide pools where the old port drowned.
        conditions:
          - type: room_visited
            room_id: tide_pools
      - id: visit_lighthouse
        description: Climb the lighthouse for a view of the coast.
        conditions:
          - type: room_visited
            room_id: lighthouse
        completion_flags:
          sal_stories_gathered: true
        rewards:
          items: [bottle_of_wine, copper_coin]
          xp: 40

  - id: sage_scout_stones
    title: The Eastern Stones
    description: >-
      Hunter Sage wants the quiet eastern trails scouted—the monolith grove and
      the mushroom circle beyond—to be sure nothing is stirring among the old
      stones.
    stages:
      - id: scout_monolith_grove
        description: Scout the monolith grove east of the clearing.
        conditions:
          - type: room_visited
            room_id: monolith_grove
      - id: scout_mushroom_circle
        description: Continue to the mushroom circle and check the fairy rings.
        conditions:
          - type: room_visited
            room_id: mushroom_circle
        completion_flags:
          sage_scouting_done: true
        rewards:
          items: [rangers_boots, copper_coin]
          xp: 45

  # --- P3.2 Quest-giver quests ---
  - id: restore_the_archive
    title: Restore the Archive
    description: >-
      The Academy's restricted archive was ransacked and its master index
      scattered. Headmaster Cornelius needs a rubbing of the old catalog-stone in
      the Whisperwood monolith grove to rebuild it. The archive vault key is his
      to give in gratitude.
    stages:
      - id: recover_index_rubbing
        description: Take a rubbing of the catalog-stone at the monolith grove and bring it to the Headmaster.
        conditions:
          - type: item_in_inventory
            item_id: standing_stone_rubbing
        completion_flags:
          archive_restored: true
        rewards:
          items: [archive_vault_key, scholars_robes]
          xp: 65

  - id: repair_tower_bearing
    title: The Eastern Bearing
    description: >-
      Clockmaster Grimlock needs brass shavings from the smithy district to
      repack the clock tower's worn eastern bearing before it seizes.
    stages:
      - id: collect_brass_shavings
        description: Gather a twist of brass shavings from the smithy district and bring it to the Clockmaster.
        conditions:
          - type: item_in_inventory
            item_id: brass_shavings
        completion_flags:
          tower_bearing_repaired: true
        rewards:
          items: [pocket_watch_cogsworth, copper_coin]
          xp: 60

  - id: manage_cargo_shipments
    title: Cargo and Manifests
    description: >-
      Captain Iris needs a hand logging and moving freight: get a feel for the
      warehouse district, then haul a trade-goods crate to prove you can tell a
      manifest from a mess.
    stages:
      - id: survey_warehouses
        description: Walk the warehouse district and learn its layout.
        conditions:
          - type: room_visited
            room_id: warehouse_district
      - id: move_a_crate
        description: Take up a trade-goods crate and haul it for the Captain.
        conditions:
          - type: item_in_inventory
            item_id: trade_goods_crate
        completion_flags:
          cargo_managed: true
        rewards:
          items: [captains_spyglass, copper_coin]
          xp: 55

  - id: scout_coastal_waters
    title: What the Storm Turned Up
    description: >-
      The Lighthouse Keeper wants the shoreline walked after the last storm—start
      at the tide pools below the lighthouse and see what the sea left behind.
    stages:
      - id: walk_the_tide_pools
        description: Walk the shoreline to the tide pools below the lighthouse.
        conditions:
          - type: room_visited
            room_id: tide_pools
        completion_flags:
          coast_scouted: true
        rewards:
          items: [sea_glass_pendant, copper_coin]
          xp: 40

  # --- Ashmoore Graveyard quests ---
  - id: graveyard_count_the_bells
    title: Count the Grave-Bells
    description: >-
      Grave-Warden Elsbet asked you to read the pauper stones and account for
      the bell that keeps ringing below the old hill graveyard.
    stages:
      - id: read_pauper_rows
        description: Read the pauper's tombstone in the graveyard rows.
        conditions:
          - type: flag_set
            flag: "graveyard:read_pauper_stone"
      - id: recover_grave_bell_clapper
        description: Recover a grave-bell clapper from the pauper rows or the dead that rise there.
        conditions:
          - type: item_in_inventory
            item_id: grave_bell_clapper
        completion_flags:
          graveyard_bells_counted: true
        rewards:
          items: [bone_lantern, copper_coin]
          xp: 45

  - id: graveyard_silence_varrow
    title: The Varrow Silence
    description: >-
      The Varrow mausoleum promises perpetual rest, but its broken tombstone
      says otherwise.
    stages:
      - id: read_varrow_marker
        description: Read the Varrow family tombstone.
        conditions:
          - type: flag_set
            flag: "graveyard:read_varrow_stone"
      - id: enter_cracked_mausoleum
        description: Enter the cracked mausoleum and face whatever wakes there.
        conditions:
          - type: room_visited
            room_id: cracked_mausoleum
        completion_flags:
          varrow_tomb_quieted: true
        rewards:
          items: [grave_wardens_coat, copper_coin]
          xp: 50

  - id: graveyard_find_the_hand
    title: The Hand That Rang the Bell
    description: >-
      The bellfinger tombstone whispered that the crypt wants its missing hand
      returned.
    stages:
      - id: hear_bellfinger_stone
        description: Listen to the bellfinger tombstone in the bell crypt.
        conditions:
          - type: flag_set
            flag: "graveyard:heard_bellfinger"
      - id: reach_ossuary
        description: Climb to the ossuary and search the bone-house.
        conditions:
          - type: room_visited
            room_id: ossuary
      - id: carry_ossuary_keys
        description: Carry the ossuary keyring back from the bone-house.
        conditions:
          - type: item_in_inventory
            item_id: ossuary_keyring
        completion_flags:
          bellfinger_hand_found: true
        rewards:
          items: [cracked_funeral_mask, copper_coin]
          xp: 55

  # --- Brass Vaults quests ---
  - id: brass_vaults_station_inspection
    title: Station Seven Baseline
    description: >-
      Forewoman Cassia wants a quick inspection of the lift, station, and copper
      concourse before deeper repairs begin.
    stages:
      - id: visit_pneumatic_station
        description: Inspect Pneumatic Station Seven.
        conditions:
          - type: room_visited
            room_id: pneumatic_station
      - id: visit_copper_concourse
        description: Inspect the Copper Concourse.
        conditions:
          - type: room_visited
            room_id: copper_concourse
        completion_flags:
          brass_station_inspected: true
        rewards:
          items: [punched_ticket_roll, copper_coin]
          xp: 35

  - id: brass_vaults_ticket_clock
    title: The Ticket Clock Is Wrong
    description: >-
      The Ticket Clock is stamping the wrong fares. Cassia needs a punched roll
      to prove it.
    stages:
      - id: collect_punched_ticket_roll
        description: Recover the punched ticket roll from the Ticket Clock.
        conditions:
          - type: item_in_inventory
            item_id: punched_ticket_roll
        completion_flags:
          brass_ticket_clock_audited: true
        rewards:
          items: [smoked_glass_goggles, copper_coin]
          xp: 40

