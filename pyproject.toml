[project]
name = "lorecraft"
version = "0.1.0"
description = "Persistent multiplayer text adventure engine."
requires-python = ">=3.12"
dependencies = [
    "sqlmodel>=0.0.22",
]

[project.optional-dependencies]
dev = [
    "basedpyright",
    "pytest",
    "ruff",
]

[tool.basedpyright]
include = ["src"]
pythonVersion = "3.12"
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
