[project]
name = "lorecraft"
version = "0.1.0"
description = "Persistent multiplayer text adventure engine."
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.115.0",
    "pyyaml>=6.0.0",
    "starlette>=0.46.0,<1.0.0",
    "sqlmodel>=0.0.22",
]

[project.optional-dependencies]
dev = [
    "basedpyright",
    "pytest",
    "ruff",
]

[tool.setuptools.package-data]
lorecraft = ["web/*"]

[tool.basedpyright]
include = ["src"]
pythonVersion = "3.12"
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
