- id: issue-fd64ee3e
  type: bug
  title: Can we make the help easier to read? bold/color/formatting?
  description: |-
    Can we make the help easier to read? bold/color/formatting?

    UPDATE 2026-07-11: Sprint 71.4 shipped a fix for this (MessageType.HELP
    tagging in commands/meta.py, .msg-help CSS rule in custom.css, v0.91.0,
    commit 357c533/c29fea1) and its e2e test (test_help_output_gets_bold_accent_styling,
    which checks computed font-weight via a real headless browser, not just
    class presence) passes in CI. But live-tested on neo via Tailscale
    (`neo.tail80db2c.ts.net:8000/game`) after a full server restart, `help`
    output still renders with no bold/color, identical in appearance to
    plain narrative text.

    Ruled out during live debugging:
    - Browser caching (tried incognito — no change)
    - Stale server process (killed and restarted — no change)
    - Wrong host (confirmed Tailscale points at the correct host/port)
    - Stale code checkout (confirmed on neo: `git log -1` = 49e2a0f;
      `grep -c msg-help custom.css` = 6, matching the source tree exactly;
      `curl localhost:8000/static/css/custom.css` on neo itself also
      returns the correct content, so the running process is serving the
      right file)

    Not yet confirmed: whether the `msg-help` class actually appears in the
    live-rendered HTML for a real command (would settle server-logic vs.
    CSS-cascade as the cause) — attempted via `view-source:` on mobile
    Brave but couldn't get it working. Session ended here; needs either a
    desktop-browser repro (inspect element on the real `.msg` div) or
    server-side logging of the actual `feed_msgs` dicts passed into
    feed_items.html for a `help` command, to see if `msg_type` is present
    at render time.
  created_by: player-1
  created_at: '2026-07-05T19:41:22.531174Z'
  updated_at: '2026-07-11T20:35:00.000000Z'
  status: open
  priority: normal
  component: player-report
  tags:
  - player-report
  assigned_to: ''
  links: []
