<div id="body-panel" class="flex-1 overflow-y-auto bg-feed-bg min-h-0 p-3 text-xs">
    <div class="mb-2 flex items-center justify-between text-[10px] uppercase tracking-wider text-text-muted">
        <span>Body</span>
        <button
            hx-get="/partials/body"
            hx-target="#body-panel"
            hx-swap="outerHTML"
            class="text-emerald-500 hover:text-emerald-400 transition-colors"
            title="Refresh body view">refresh</button>
    </div>

    <div class="space-y-3">
        {% for part in body_view %}
        <section class="border border-border/70 rounded bg-panel/40 overflow-hidden">
            <div class="px-2.5 py-1.5 border-b border-border/70 flex items-center justify-between">
                <span class="font-semibold text-text">{{ part.label }}</span>
            </div>
            <div class="divide-y divide-border/50">
                {% for slot in part.slots %}
                <div class="px-2.5 py-1.5 flex items-start justify-between gap-2">
                    <span class="text-text-muted">{{ slot.label }}</span>
                    {% if slot.item %}
                    <span class="text-right text-text">{{ slot.item.name }}</span>
                    {% else %}
                    <span class="text-right text-text-muted italic">empty</span>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
    </div>
</div>
