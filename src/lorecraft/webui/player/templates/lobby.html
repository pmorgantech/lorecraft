{% extends "base.html" %}

{% block title %}Lorecraft • Lobby{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-3.5rem)] bg-zinc-950 text-zinc-200 p-6" x-data="{ tab: 'join' }">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter text-emerald-400">LORECRAFT</h1>
                <p class="text-zinc-500">A living multiplayer world</p>
            </div>
            {% if player %}
            <div class="text-right">
                <div class="text-sm text-zinc-500">Welcome back,</div>
                <div class="font-semibold text-emerald-400">{{ player.username }}</div>
            </div>
            {% endif %}
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-zinc-800 mb-6">
            <button @click="tab = 'join'"
                    :class="tab === 'join' ? 'border-b-2 border-emerald-500 text-emerald-400' : 'text-zinc-500'"
                    class="px-6 py-3 text-sm font-medium transition-colors">Log In</button>
            <button @click="tab = 'create'"
                    :class="tab === 'create' ? 'border-b-2 border-emerald-500 text-emerald-400' : 'text-zinc-500'"
                    class="px-6 py-3 text-sm font-medium transition-colors">Create New Character</button>
        </div>

        <!-- LOG IN -->
        <div class="space-y-4 max-w-md" x-show="tab === 'join'">
            <h2 class="text-xl font-semibold mb-4">Log In</h2>
            <form method="post" action="/lobby/enter" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
                <div>
                    <label for="enter-username" class="block text-sm text-zinc-400 mb-1">Character name</label>
                    <input type="text" id="enter-username" name="username" required minlength="3" maxlength="30"
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-zinc-200 focus:outline-none focus:border-emerald-600"
                           placeholder="Your character name">
                </div>
                <div>
                    <label for="enter-password" class="block text-sm text-zinc-400 mb-1">Password</label>
                    <input type="password" id="enter-password" name="password" required minlength="1"
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-zinc-200 focus:outline-none focus:border-emerald-600"
                           placeholder="••••••••">
                </div>
                <button type="submit"
                        class="w-full px-5 py-2 bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold rounded-lg transition-colors">
                    Enter
                </button>
            </form>
        </div>

        <!-- CREATE CHARACTER -->
        <div class="space-y-4 max-w-md" x-show="tab === 'create'">
            <h2 class="text-xl font-semibold mb-4">Create a New Character</h2>
            <form method="post" action="/lobby/create" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">
                <div>
                    <label for="username" class="block text-sm text-zinc-400 mb-1">Character name</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="30"
                           pattern="[A-Za-z0-9_-]{3,30}"
                           title="3-30 characters: letters, numbers, - or _ only"
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-zinc-200 focus:outline-none focus:border-emerald-600"
                           placeholder="e.g. Ashen_Wanderer">
                    <p class="text-xs text-zinc-500 mt-1">3-30 characters: letters, numbers, - or _ only.</p>
                </div>
                <div>
                    <label for="create-password" class="block text-sm text-zinc-400 mb-1">Password</label>
                    <input type="password" id="create-password" name="password" required minlength="1"
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-zinc-200 focus:outline-none focus:border-emerald-600"
                           placeholder="••••••••">
                </div>
                <button type="submit"
                        class="w-full px-5 py-2 bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold rounded-lg transition-colors">
                    Create &amp; Enter
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
