name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test (coverage-gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install -e ".[dev]"
      - run: make lint
      - run: make typecheck
      - run: make test-cov

  simulation:
    name: Multi-player simulation harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install -e ".[dev]"
      - run: make test-simulation

  e2e:
    name: Browser end-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install -e ".[e2e]"
      # --with-deps (not `make test-e2e`'s plain `playwright install chromium`,
      # which is deliberately dev-machine-friendly and skips the sudo apt-get
      # step) pulls in the shared libraries headless Chromium needs on a bare
      # ubuntu-latest runner.
      - run: playwright install --with-deps chromium
      - run: pytest tests/e2e -m e2e -v
